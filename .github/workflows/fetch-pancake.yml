name: Fetch Pancake Revenue

# Chạy mỗi 30 phút — fetch đơn hàng từ Pancake POS, tổng hợp doanh thu theo SP
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:            # cho phép chạy thủ công từ tab Actions

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Pancake fetch script
        env:
          PANCAKE_API_KEY: ${{ secrets.PANCAKE_API_KEY }}
          PANCAKE_SHOP_ID: ${{ secrets.PANCAKE_SHOP_ID }}
        run: python scripts/fetch_pancake_revenue.py

      - name: Commit updated revenue data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/product-revenue.json)" ]; then
            git add data/product-revenue.json
            git commit -m "chore: update pancake revenue snapshot"
            # Retry + rebase để tránh race condition với fetch-google-ads chạy cùng lúc
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && exit 0
              echo "[retry $i] push bị reject, chờ $((i*5))s rồi rebase lại..."
              sleep $((i*5))
            done
            echo "Push vẫn fail sau 5 lần retry"
            exit 1
          else
            echo "No revenue changes to commit."
          fi
