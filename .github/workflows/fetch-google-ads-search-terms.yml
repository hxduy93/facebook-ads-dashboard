name: Fetch Google Ads Search Terms

# Cron mỗi 60 phút phút 10 — lệch cron của fetch-google-ads (5,35) và fetch-pancake (0,30)
# tránh race condition khi push đồng thời.
on:
  schedule:
    - cron: "10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run search terms fetch script
        env:
          WINDSOR_API_KEY: ${{ secrets.WINDSOR_API_KEY }}
        run: python scripts/fetch_google_ads_search_terms.py

      - name: Commit updated search terms snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/google-ads-search-terms.json)" ]; then
            git add data/google-ads-search-terms.json
            git commit -m "chore: auto-sync Google Ads search terms (Windsor.ai)"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && exit 0
              echo "[retry $i] push bị reject, chờ $((i*5))s rồi rebase lại..."
              sleep $((i*5))
            done
            echo "Push vẫn fail sau 5 lần retry"
            exit 1
          else
            echo "No search terms changes to commit."
          fi
