name: List Pancake sources (one-shot debug)

# Workflow tạm — list toàn bộ order sources Pancake để map FB ad account -> source ID.
# Sau khi user paste log + xác định mapping, sẽ XÓA file workflow này.

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: List Pancake order sources
        env:
          PANCAKE_API_KEY: ${{ secrets.PANCAKE_API_KEY }}
          PANCAKE_SHOP_ID: ${{ secrets.PANCAKE_SHOP_ID }}
        run: python scripts/list_pancake_sources.py
