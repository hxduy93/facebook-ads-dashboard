name: Update Facebook Ads Dashboard

# Chạy mỗi 30 phút trong khoảng 9:00 - 23:30 giờ Việt Nam (UTC+7)
# = 02:00 - 16:30 UTC
# Workflow này chỉ fetch FB Ads insights + build lại index.html.
# KHÔNG rebuild product costs (chỉ update khi user gửi file mới — xem workflow "Update Product Costs").
# KHÔNG scrape competitor history (chỉ chạy thứ 2 9h sáng trong workflow "Weekly Competitor + Radar").
on:
  schedule:
    - cron: "*/30 2-16 * * *"
  workflow_dispatch:        # cho phép chạy thủ công từ tab Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run update script (FB Ads insights + rebuild index.html)
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: python update_dashboard.py

      - name: Commit + push updated index.html (trigger Cloudflare deploy)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain index.html data/)" ]; then
            git add index.html data/
            git commit -m "chore: auto-update FB Ads dashboard (every 30min)"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && exit 0
              echo "[retry $i] push reject, chờ $((i*5))s rồi rebase..."
              sleep $((i*5))
            done
            exit 1
          else
            echo "No changes to commit."
          fi
