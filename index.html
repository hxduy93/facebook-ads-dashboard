    const d = row.date
    const sp = Number(row.spend) || 0
    if (!microSpend[target]) return
    microSpend[target].by_date[d] = (microSpend[target].by_date[d] || 0) + sp
    microSpend[target]._total += sp
    microSpend[target].campaigns.add(name)
  })

  const computeRows = (STATUSES_KEEP) => {
    const rows = GOOGLE_CATEGORIES.map(cat => {
      let revenueC = 0, unitsC = 0, ordersC = 0, costTotal = 0
      // Micro + Misc category không có product mapping → không tính revenue Pancake
      if (g && !cat.isMisc && !cat.isMicro) {
        cat.products.forEach(p => {
          STATUSES_KEEP.forEach(stKey => {
            const pData = g.products_by_status?.[stKey]?.[p]
            if (!pData) return
            Object.entries(pData.by_date || {}).forEach(([d, v]) => {
              if (isInRange(d)) revenueC += (v || 0)
            })
            let unitsProd = 0
            if (pData.units_by_date) {
              Object.entries(pData.units_by_date).forEach(([d, u]) => {
                if (isInRange(d)) unitsProd += (u || 0)
              })
            } else if (pData.units && pData.total > 0) {
              const inRangeRev = Object.entries(pData.by_date || {})
                .filter(([d]) => isInRange(d)).reduce((s, [, v]) => s + (v || 0), 0)
              const ratio = pData.total > 0 ? inRangeRev / pData.total : 0
              unitsProd = Math.round((pData.units || 0) * ratio)
            }
            unitsC += unitsProd
            const costEntry = productCosts[p] || {}
            const costPerUnit = Number(costEntry.gia_nhap_vnd) || 0
            costTotal += costPerUnit * unitsProd
            if (pData.orders_by_date) {
              Object.entries(pData.orders_by_date).forEach(([d, c]) => {
                if (isInRange(d)) ordersC += (c || 0)
              })
            }
          })
        })
      }

      // Google Ads spend — micro/misc lấy từ microSpend (re-categorize), main lấy từ by_category
      let spendC = 0
      if (cat.isMicro || cat.key === "OTHER_MISC") {
        const bucket = microSpend[cat.key]
        if (bucket && bucket.by_date) {
          Object.entries(bucket.by_date).forEach(([d, v]) => {
            if (isInRange(d)) spendC += (v || 0)
          })
        }
      } else {
        const bucket = googleAds.by_category[cat.key]
        if (bucket && bucket.by_date) {
          Object.entries(bucket.by_date).forEach(([d, v]) => {
            if (isInRange(d)) spendC += (v || 0)
          })
        }
      }

      const vat = revenueC * VAT_RATE
      const profit = revenueC - vat - spendC - costTotal
      const margin = revenueC > 0 ? (profit / revenueC) * 100 : null
      return {
        cat: cat.key,
        label: cat.label,
        products: cat.products,
        isMisc: !!cat.isMisc,
        isMicro: !!cat.isMicro,
        units: unitsC,
        orders: ordersC,
        revenue: revenueC,
        vat,
        adSpend: spendC,
        totalCost: costTotal,
        profit,
        margin,
      }
    })
    const tot = rows.reduce((a, r) => ({
      revenue: a.revenue + r.revenue,
      vat: a.vat + r.vat,
      adSpend: a.adSpend + r.adSpend,
      totalCost: a.totalCost + r.totalCost,
      profit: a.profit + r.profit,
      units: a.units + r.units,
      orders: a.orders + r.orders,
    }), { revenue: 0, vat: 0, adSpend: 0, totalCost: 0, profit: 0, units: 0, orders: 0 })
    const totMargin = tot.revenue > 0 ? (tot.profit / tot.revenue) * 100 : null
    return { rows, tot, totMargin }
  }

  const beforeReturns = computeRows(["delivered", "returning", "other", "returned"])
  // SAU HOÀN: khớp Pancake POS — chỉ giữ delivered + other. Loại returning + returned + canceled.
  const afterReturns  = computeRows(["delivered", "other"])
  const lossByReturns = beforeReturns.tot.profit - afterReturns.tot.profit

  const renderTable = (data) => (
    <div className="overflow-x-auto bg-white rounded-lg border border-gray-200 mb-2">
      <table className="w-full text-xs">
        <thead>
          <tr className="bg-gray-50 border-b-2 border-gray-200 text-gray-700">
            <th className="py-2 px-3 text-left font-semibold">Nhóm SP</th>
            <th className="py-2 px-3 text-right font-semibold">SL bán</th>
            <th className="py-2 px-3 text-right font-semibold">Đơn</th>
            <th className="py-2 px-3 text-right font-semibold">DT Website</th>
            <th className="py-2 px-3 text-right font-semibold text-amber-700">VAT 10%</th>
            <th className="py-2 px-3 text-right font-semibold text-blue-700">Google Ads</th>
            <th className="py-2 px-3 text-right font-semibold">Σ Giá nhập</th>
            <th className="py-2 px-3 text-right font-bold border-l border-gray-300">LỢI NHUẬN</th>
            <th className="py-2 px-3 text-right font-semibold">Biên LN</th>
          </tr>
        </thead>
        <tbody>
          {data.rows.map(r => {
            const hasData = r.revenue > 0 || r.adSpend > 0
            return (
              <tr key={r.cat} className={`border-b border-gray-100 ${hasData ? "" : "opacity-40"} hover:bg-gray-50/60`}>
                <td className="py-2 px-3 font-semibold text-gray-900 max-w-[300px]">
                  <span className="inline-flex items-center gap-1.5 flex-wrap">
                    <span>{r.label}</span>
                    <button
                      onClick={() => setCampModal({ category: r.cat, isMisc: r.isMisc, isMicro: r.isMicro })}
                      className="text-[9px] px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 font-bold hover:bg-blue-600 hover:text-white border border-blue-300 tracking-wider"
                      title={`Xem campaign Google Ads nhóm ${r.label}`}
                    >
                      CAMP
                    </button>
                  </span>
                  {!r.isMisc && !r.isMicro && r.products.length > 0 && (
                    <div className="text-[10px] text-gray-500 mt-0.5 font-normal">{r.products.join(", ")}</div>
                  )}
                  {r.isMicro && (
                    <div className="text-[10px] text-gray-500 mt-0.5 font-normal italic">1 camp Search + 1 camp Remarketing</div>
                  )}
                </td>
                <td className="py-2 px-3 text-right text-gray-800">{r.units > 0 ? fmtNum(r.units) : "—"}</td>
                <td className="py-2 px-3 text-right text-gray-600">{r.orders > 0 ? fmtNum(r.orders) : "—"}</td>
                <td className="py-2 px-3 text-right font-semibold text-gray-900">{r.revenue > 0 ? fmtVNDFull(r.revenue) + "₫" : "—"}</td>
                <td className="py-2 px-3 text-right text-amber-700">{r.vat > 0 ? "-" + fmtVNDFull(r.vat) + "₫" : "—"}</td>
                <td className="py-2 px-3 text-right text-blue-700">{r.adSpend > 0 ? "-" + fmtVNDFull(r.adSpend) + "₫" : "—"}</td>
                <td className="py-2 px-3 text-right text-gray-700">{r.totalCost > 0 ? "-" + fmtVNDFull(r.totalCost) + "₫" : "—"}</td>
                <td className={`py-2 px-3 text-right font-extrabold border-l border-gray-300 ${r.profit > 0 ? "text-emerald-700" : r.profit < 0 ? "text-red-600" : "text-gray-400"}`}>
                  {hasData ? fmtVNDFull(r.profit) + "₫" : "—"}
                </td>
                <td className={`py-2 px-3 text-right font-semibold ${r.margin == null ? "text-gray-300" : r.margin > 0 ? "text-emerald-700" : "text-red-600"}`}>
                  {r.margin == null ? "—" : r.margin.toFixed(1) + "%"}
                </td>
              </tr>
            )
          })}
          <tr className="bg-gray-100 border-t-2 border-gray-300">
            <td className="py-3 px-3 font-extrabold text-gray-900">TỔNG</td>
            <td className="py-3 px-3 text-right font-bold text-gray-900">{fmtNum(data.tot.units)}</td>
            <td className="py-3 px-3 text-right font-bold text-gray-900">{fmtNum(data.tot.orders)}</td>
            <td className="py-3 px-3 text-right font-bold text-gray-900">{fmtVNDFull(data.tot.revenue)}₫</td>
            <td className="py-3 px-3 text-right font-bold text-amber-700">-{fmtVNDFull(data.tot.vat)}₫</td>
            <td className="py-3 px-3 text-right font-bold text-blue-700">-{fmtVNDFull(data.tot.adSpend)}₫</td>
            <td className="py-3 px-3 text-right font-bold text-gray-800">-{fmtVNDFull(data.tot.totalCost)}₫</td>
            <td className={`py-3 px-3 text-right font-extrabold border-l border-gray-300 ${data.tot.profit > 0 ? "text-emerald-700" : "text-red-600"}`}>{fmtVNDFull(data.tot.profit)}₫</td>
            <td className={`py-3 px-3 text-right font-bold ${data.totMargin == null ? "text-gray-400" : data.totMargin > 0 ? "text-emerald-700" : "text-red-600"}`}>
              {data.totMargin == null ? "—" : data.totMargin.toFixed(1) + "%"}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  )

  return (
    <div className="mb-6 rounded-xl border-2 border-emerald-300 bg-emerald-50 p-5 shadow-sm">
      <div className="flex items-start justify-between mb-4 flex-wrap gap-2">
        <div>
          <h2 className="text-lg font-bold text-gray-900 tracking-tight flex items-center gap-2">
            <DollarSign className="w-5 h-5 text-emerald-600" /> Lợi nhuận — Google Ads / Website
          </h2>
          <p className="text-xs text-gray-600 mt-1">
            Doanh thu: <span className="font-semibold">Pancake nguồn Website</span> · Chi phí: <span className="font-semibold">Google Ads TK {googleAds.account_name || "MHDI"}</span> · {fmtDate(dateRange.start)} → {fmtDate(dateRange.end)}
            {" · "}
            <span className="font-mono text-[10px] bg-white/80 px-1.5 py-0.5 rounded border border-gray-200">
              LN = DT − DT×10% VAT − Google Ads − Giá nhập × SL
            </span>
          </p>
        </div>
        <button
          onClick={onClose}
          className="text-xs px-3 py-1.5 rounded-md bg-white border border-gray-300 hover:bg-gray-100 text-gray-600"
          title="Đóng (quay về Team Ads FB)"
        >
          ✕ Đóng
        </button>
      </div>

      {/* BẢNG 1 — TRƯỚC HOÀN */}
      <div className="mb-2">
        <div className="flex items-center gap-2 mb-2 flex-wrap">
          <span className="text-xs font-bold text-amber-900 bg-amber-100 px-2 py-1 rounded border border-amber-300">📊 LN TRƯỚC HOÀN</span>
          <span className="text-[11px] text-gray-600">Gồm <span className="font-semibold">Đã giao + Đang hoàn + Đang xử lý + Đã hoàn</span> · loại Đã hủy</span>
        </div>
        {renderTable(beforeReturns)}
      </div>

      <div className="my-3 px-4 py-3 bg-white rounded-lg border-2 border-dashed border-gray-300 flex flex-wrap items-center justify-center gap-x-4 gap-y-2 text-sm">
        <span className="text-gray-700">
          LN trước hoàn: <span className={`font-extrabold ${beforeReturns.tot.profit > 0 ? "text-emerald-700" : "text-red-600"}`}>{fmtVNDFull(beforeReturns.tot.profit)}₫</span>
        </span>
        <span className="text-gray-400 text-lg">→</span>
        <span className="text-gray-700">
          Hoàn mất: <span className={`font-extrabold ${lossByReturns > 0 ? "text-red-600" : "text-gray-500"}`}>-{fmtVNDFull(Math.abs(lossByReturns))}₫</span>
        </span>
        <span className="text-gray-400 text-lg">→</span>
        <span className="text-gray-700">
          LN sau hoàn: <span className={`font-extrabold ${afterReturns.tot.profit > 0 ? "text-emerald-700" : "text-red-600"}`}>{fmtVNDFull(afterReturns.tot.profit)}₫</span>
        </span>
      </div>

      {/* BẢNG 2 — SAU HOÀN */}
      <div className="mt-2">
        <div className="flex items-center gap-2 mb-2 flex-wrap">
          <span className="text-xs font-bold text-white bg-emerald-600 px-2 py-1 rounded border border-emerald-700">✅ LN SAU HOÀN</span>
          <span className="text-[11px] text-gray-600">Gồm <span className="font-semibold">Đã giao + Đang hoàn + Đang xử lý</span> · <span className="text-red-600 font-semibold">ĐÃ LOẠI Đã hoàn + Đã hủy</span></span>
        </div>
        {renderTable(afterReturns)}
      </div>

      <p className="text-[11px] text-gray-600 mt-3 italic">
        * Doanh thu = Pancake nguồn Website (không kể Zalo OA + Hotline) · Google Ads spend = TK MHDI, category detect từ tên campaign (RMK/Search/Shopping) · 4 dòng đầu (Máy dò/Định vị/Ghi âm/Camera gọi 2 chiều) có mapping SP → tính LN thật. 5 dòng micro (Camera 4G/WiFi/NLMT, Chống ghi âm, Máy cạo râu) + "Khác" = SP không có DT từ nguồn Website → LN = 0 − spend. Data Google Ads sync từ Windsor.ai — cập nhật thủ công qua file <code className="bg-white px-1 rounded border">data/google-ads-spend.json</code>.
      </p>

      {campModal && (
        <GoogleCampaignsModal
          category={campModal.category}
          isMisc={campModal.isMisc}
          isMicro={campModal.isMicro}
          dateRange={dateRange}
          onClose={() => setCampModal(null)}
        />
      )}
    </div>
  )
}

function GoogleCampaignsModal({ category, isMisc, isMicro, dateRange, onClose }) {
  const googleAds = (typeof DATA !== "undefined" ? DATA.google_ads : null) || { campaigns_raw: [] }
  const raw = googleAds.campaigns_raw || []

  // Micro / OTHER_MISC → match campaign theo regex của category (không filter theo r.category).
  // Main category (MAYDO/DINHVI/GHIAM/CAMCALL) → filter r.category === category.
  // OTHER_MISC → chỉ các campaign thuộc source keys "OTHER_*" + KHÔNG match regex micro nào.
  const catDef = GOOGLE_CATEGORIES.find(c => c.key === category)
  const isOtherMisc = category === "OTHER_MISC"
  const microCats = GOOGLE_CATEGORIES.filter(c => c.isMicro)

  const byCampaign = {}
  raw.forEach(r => {
    if (r.date < dateRange.start || r.date > dateRange.end) return
    let match = false
    if (isMicro && catDef && catDef.campaignTest) {
      // Chỉ các campaign thuộc source "OTHER_*" + match regex của micro category này
      if (GOOGLE_OTHER_SOURCE_KEYS.includes(r.category) && catDef.campaignTest(r.campaign || "")) {
        match = true
      }
    } else if (isOtherMisc) {
      // Các campaign source "OTHER_*" không match regex micro nào
      if (GOOGLE_OTHER_SOURCE_KEYS.includes(r.category)) {
        const matchedMicro = microCats.some(c => c.campaignTest && c.campaignTest(r.campaign || ""))
        if (!matchedMicro) match = true
      }
    } else if (isMisc) {
      // (backward compat — không còn dùng sau refactor, nhưng giữ an toàn)
      if (GOOGLE_OTHER_SOURCE_KEYS.includes(r.category)) match = true
    } else {
      // Main category
      if (r.category === category) match = true
    }
    if (!match) return

    const key = r.campaign
    byCampaign[key] = byCampaign[key] || { name: key, category: r.category, spend: 0, clicks: 0, impressions: 0 }
    byCampaign[key].spend += (r.spend || 0)
    byCampaign[key].clicks += (r.clicks || 0)
    byCampaign[key].impressions += (r.impressions || 0)
  })
  const rows = Object.values(byCampaign).sort((a, b) => b.spend - a.spend)
  const total = rows.reduce((s, r) => s + r.spend, 0)
  const title = isOtherMisc
    ? "Google Ads — KHÁC (Cam Mini / Sim 4G / máy khác)"
    : (catDef ? `Google Ads — ${catDef.label}` : `Google Ads — ${category}`)

  return (
    <div className="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-xl shadow-2xl max-w-4xl w-full max-h-[85vh] overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="px-5 py-4 border-b border-gray-200 flex items-center justify-between bg-gradient-to-r from-emerald-50 to-teal-50">
          <div className="min-w-0">
            <h3 className="font-bold text-gray-900 text-base">📊 {title}</h3>
            <p className="text-[11px] text-gray-600 mt-0.5">
              {fmtDate(dateRange.start)} → {fmtDate(dateRange.end)} · {rows.length} campaign · Tổng: <span className="font-bold text-blue-700">{fmtVND(total)}₫</span>
            </p>
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-xl font-bold w-8 h-8 flex items-center justify-center rounded hover:bg-gray-100 flex-shrink-0 ml-2">✕</button>
        </div>
        <div className="overflow-y-auto flex-1 p-4">
          {rows.length === 0 ? (
            <p className="text-sm text-gray-500 text-center py-12 italic">
              Không có campaign Google Ads nào thuộc nhóm này trong range {fmtDate(dateRange.start)} → {fmtDate(dateRange.end)}.
            </p>
          ) : (
            <table className="w-full text-xs">
              <thead>
                <tr className="bg-gray-50 border-b-2 border-gray-200 text-gray-700">
                  <th className="py-2 px-2 text-left font-semibold w-8">#</th>
                  <th className="py-2 px-2 text-left font-semibold">Campaign</th>
                  <th className="py-2 px-2 text-left font-semibold">Category</th>
                  <th className="py-2 px-2 text-right font-semibold">Clicks</th>
                  <th className="py-2 px-2 text-right font-semibold">Spend</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => (
                  <tr key={r.name} className="border-b border-gray-100 hover:bg-emerald-50/40">
                    <td className="py-2 px-2 text-gray-500">{i + 1}</td>
                    <td className="py-2 px-2 font-semibold text-gray-900 break-words">{r.name}</td>
                    <td className="py-2 px-2 text-[10px] text-gray-500 font-mono">{r.category}</td>
                    <td className="py-2 px-2 text-right text-gray-600">{fmtNum(r.clicks)}</td>
                    <td className="py-2 px-2 text-right font-bold text-blue-700 whitespace-nowrap">{fmtVND(r.spend)}₫</td>
                  </tr>
                ))}
                <tr className="bg-gray-100 border-t-2 border-gray-300">
                  <td colSpan="4" className="py-3 px-3 font-extrabold text-gray-900 text-right">TỔNG</td>
                  <td className="py-3 px-3 text-right font-extrabold text-blue-800 whitespace-nowrap">{fmtVND(total)}₫</td>
                </tr>
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  )
}

function RevenueByStaffBreakdown({ dateRange, selectedStaff, onSelectStaff }) {
  const revenue = (typeof DATA !== "undefined" ? DATA.revenue : null) || {}
  const groups = revenue.source_groups || {}
  const adSpendByStaff = (typeof DATA !== "undefined" ? DATA.ad_spend_by_staff : null) || {}
  const googleAds = (typeof DATA !== "undefined" ? DATA.google_ads : null) || { by_category: {} }
  const handleClick = onSelectStaff || (() => {})

  if (!Object.keys(groups).length) return null

  // 13 SP chính (mở rộng 2026-04-19 để cover nguồn Website: máy dò D1 Pro/D2/D3/D4/D8 Pro, ghi âm DR4 Plus, định vị DV1 Pro)
  const PRODUCTS = [
    "D1", "D1 Pro", "D2", "D3", "D4", "D8 Pro",
    "DR1", "DR4 Plus",
    "DV1 Pro",
    "DA8.1", "DA8.1 Pro",
    "Noma 911", "Noma 922",
  ]

  // Mapping nhân sự → danh sách source key + màu thương hiệu
  const STAFF = [
    {
      key: "DUY",
      label: "Nhân sự Duy",
      shortLabel: "Duy",
      subSources: [{ key: "DUY", label: "DUY" }],
      color: { bg: "bg-blue-50", border: "border-blue-300", text: "text-blue-700", bar: "bg-blue-500", sub: "bg-blue-100 text-blue-700" },
    },
    {
      key: "PHUONG_NAM",
      label: "Nhân sự Phương Nam",
      shortLabel: "Phương Nam",
      subSources: [{ key: "PHUONG_NAM", label: "PHƯƠNG NAM" }],
      color: { bg: "bg-purple-50", border: "border-purple-300", text: "text-purple-700", bar: "bg-purple-500", sub: "bg-purple-100 text-purple-700" },
    },
    {
      key: "WEBSITE_STAFF",
      label: "WEBSITE",
      shortLabel: "WEBSITE",
      subSources: [
        { key: "WEBSITE", label: "Website" },
        { key: "ZALO_OA", label: "Zalo OA" },
        { key: "HOTLINE", label: "Hotline" },
      ],
      color: { bg: "bg-emerald-50", border: "border-emerald-300", text: "text-emerald-700", bar: "bg-emerald-500", sub: "bg-emerald-100 text-emerald-700" },
    },
    {
      key: "FB_PAGE",
      label: "Page Facebook",
      shortLabel: "Page FB",
      subSources: [{ key: "FB_PAGE", label: "Page Facebook (organic)" }],
      color: { bg: "bg-pink-50", border: "border-pink-300", text: "text-pink-700", bar: "bg-pink-500", sub: "bg-pink-100 text-pink-700" },
    },
  ]

  const isInRange = (ymd) => {
    if (!dateRange?.start || !dateRange?.end) return true
    return ymd >= dateRange.start && ymd <= dateRange.end
  }

  // KHỚP POS PANCAKE — chỉ giữ 2 status: delivered (đã giao) + other (đang xử lý: mới/duyệt/ship/đóng/pending).
  // Loại returning (đang hoàn) + returned (đã hoàn) + canceled (đã hủy) — POS không tính 3 nhóm này vào doanh thu.
  const STATUSES_KEEP = ["delivered", "other"]

  // Tính revenue/orders cho 1 source group (DUY / PHUONG_NAM / WEBSITE / ZALO_OA / HOTLINE)
  // - totalRev       — doanh thu THỰC THU (total_price_after_sub_discount), CHƯA tính hoàn/hủy.
  //                    Nguồn: order_revenue_by_status_by_date — không bó hẹp 6 SP chính → khớp Pancake.
  // - totalOrders    — số đơn của 3 status keep, từ order_count_by_status_by_date.
  // - prodTotals     — {product: doanh thu 6 SP chính, đã loại hoàn hủy}
  // - prodOrders     — {product: số đơn có sản phẩm đó, đã loại hoàn hủy}
  // - fallbackXxx    — true khi JSON cũ chưa có field mới → fallback gross/all-status
  const computeSourceTotals = (srcKey) => {
    const g = groups[srcKey]
    if (!g) return { totalRev: 0, totalOrders: 0, prodTotals: {}, prodOrders: {}, hasData: false }

    const hasOrderRev   = !!g.order_revenue_by_status_by_date
    const hasOrderCount = !!g.order_count_by_status_by_date

    // ── Tổng doanh thu nhân sự (THỰC THU, loại hoàn hủy) ──
    let totalRev = 0
    if (hasOrderRev) {
      STATUSES_KEEP.forEach(st => {
        Object.entries(g.order_revenue_by_status_by_date[st] || {}).forEach(([d, v]) => {
          if (isInRange(d)) totalRev += v
        })
      })
    } else {
      // Fallback: snapshot cũ — sum products[p].by_date 6 SP (không tách status nổi)
      PRODUCTS.forEach(p => {
        const pData = g.products?.[p] || {}
        Object.entries(pData.by_date || {}).forEach(([d, v]) => { if (isInRange(d)) totalRev += v })
      })
    }

    // ── Tổng đơn nhân sự (loại hoàn hủy) ──
    let totalOrders = 0
    if (hasOrderCount) {
      STATUSES_KEEP.forEach(st => {
        Object.entries(g.order_count_by_status_by_date[st] || {}).forEach(([d, c]) => {
          if (isInRange(d)) totalOrders += c
        })
      })
    } else if (g.total_orders_by_date) {
      // Fallback: tất cả status
      Object.entries(g.total_orders_by_date).forEach(([d, c]) => { if (isInRange(d)) totalOrders += c })
    } else {
      totalOrders = g.total_orders || 0
    }

    // ── Per-product cells (6 SP chính) — cũng loại hoàn hủy để consistent ──
    const prodTotals = {}
    const prodOrders = {}
    PRODUCTS.forEach(p => {
      let sum = 0
      let ord = 0
      if (g.products_by_status) {
        STATUSES_KEEP.forEach(st => {
          const pData = g.products_by_status[st]?.[p] || {}
          Object.entries(pData.by_date || {}).forEach(([d, v]) => { if (isInRange(d)) sum += v })
          Object.entries(pData.orders_by_date || {}).forEach(([d, c]) => { if (isInRange(d)) ord += c })
        })
      } else {
        // Fallback: dùng products tổng (gross)
        const pData = g.products?.[p] || {}
        Object.entries(pData.by_date || {}).forEach(([d, v]) => { if (isInRange(d)) sum += v })
        if (pData.orders_by_date) {
          Object.entries(pData.orders_by_date).forEach(([d, c]) => { if (isInRange(d)) ord += c })
        } else {
          ord = pData.orders || 0
        }
      }
      prodTotals[p] = sum
      prodOrders[p] = ord
    })

    return {
      totalRev,
      totalOrders,
      prodTotals,
      prodOrders,
      hasData: true,
      fallbackOrders: !hasOrderCount,
    }
  }

  // Helper: ad spend của 1 staff trong dateRange
  // - DUY / PHUONG_NAM → FB Ads (DATA.ad_spend_by_staff)
  // - WEBSITE_STAFF → Google Ads (DATA.google_ads.by_category, gộp tất cả category)
  const adSpendForStaff = (staffKey) => {
    if (staffKey === "WEBSITE_STAFF") {
      let total = 0
      Object.values(googleAds.by_category || {}).forEach(bucket => {
        Object.entries(bucket.by_date || {}).forEach(([d, v]) => {
          if (isInRange(d)) total += (v || 0)
        })
      })
      return { spend: total, adKind: "Google Ads" }
    }
    // FB Ads: aggregate across all products for this staff
    let total = 0
    const buckets = adSpendByStaff[staffKey] || {}
    Object.values(buckets).forEach(b => {
      Object.entries(b.by_date || {}).forEach(([d, v]) => {
        if (isInRange(d)) total += (v || 0)
      })
    })
    return { spend: total, adKind: "FB Ads" }
  }

  // Aggregate per staff (gộp sub-sources nếu có nhiều)
  const staffRows = STAFF.map(st => {
    const subTotals = st.subSources.map(s => ({
      key: s.key,
      label: s.label,
      ...computeSourceTotals(s.key),
    }))
    const totalRev = subTotals.reduce((s, x) => s + x.totalRev, 0)
    const totalOrders = subTotals.reduce((s, x) => s + x.totalOrders, 0)
    const prodTotals = {}
    const prodOrders = {}
    PRODUCTS.forEach(p => {
      prodTotals[p] = subTotals.reduce((s, x) => s + (x.prodTotals[p] || 0), 0)
      prodOrders[p] = subTotals.reduce((s, x) => s + (x.prodOrders?.[p] || 0), 0)
    })
    const fallbackOrders = subTotals.some(x => x.fallbackOrders)
    const { spend: adSpend, adKind } = adSpendForStaff(st.key)
    const cir = totalRev > 0 ? (adSpend / totalRev * 100) : null
    return { ...st, totalRev, totalOrders, prodTotals, prodOrders, subTotals, fallbackOrders, adSpend, adKind, cir }
  })

  const grandRev = staffRows.reduce((s, r) => s + r.totalRev, 0)
  const grandOrders = staffRows.reduce((s, r) => s + r.totalOrders, 0)
  const anyFallback = staffRows.some(r => r.fallbackOrders)

  // Max per product column (để scale mini bar)
  const productMax = {}
  PRODUCTS.forEach(p => {
    productMax[p] = Math.max(1, ...staffRows.map(r => r.prodTotals[p] || 0))
  })

  return (
    <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm mb-6">
      <div className="flex items-center justify-between mb-4">
        <div>
          <h2 className="text-lg font-bold text-red-700 tracking-tight">👥 Doanh thu theo nhân sự — 4 nhóm</h2>
          <p className="text-xs text-gray-500 mt-1">
            Doanh thu thực thu (đã trừ giảm giá đơn) · <span className="font-semibold text-emerald-700">Khớp POS Pancake — delivered + other, loại đang hoàn / đã hoàn / đã hủy</span> · WEBSITE = Website + Zalo OA + Hotline · Page Facebook = đơn nhắn tin organic qua page (nguồn -1)
          </p>
        </div>
        <div className="text-right">
          <div className="text-xs text-gray-500">Tổng các nhóm</div>
          <div className="text-xl font-extrabold text-gray-900">{fmtVNDFull(grandRev)}₫</div>
          <div className="text-[11px] text-gray-500">{grandOrders.toLocaleString("vi-VN")} đơn</div>
        </div>
      </div>

      {/* Cards nhân sự — click để lọc source + status + mở bảng Lợi nhuận */}
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
        {staffRows.map(r => {
          const pct = grandRev > 0 ? (r.totalRev / grandRev * 100) : 0
          const isSelected = selectedStaff === r.key
          return (
            <button
              key={r.key}
              type="button"
              onClick={() => handleClick(r.key)}
              className={`text-left rounded-lg border p-4 transition cursor-pointer hover:shadow-md ${r.color.border} ${r.color.bg} ${isSelected ? "ring-2 ring-offset-2 ring-red-500 shadow-lg" : ""}`}
              title="Click để lọc nguồn/status + xem bảng Lợi nhuận chi tiết"
            >
              <div className={`text-xs font-bold uppercase tracking-wide ${r.color.text} mb-1 flex items-center justify-between`}>
                <span>{r.label}</span>
                <span className={`text-[10px] font-medium ${isSelected ? "text-red-600" : "text-gray-400"}`}>{isSelected ? "● ĐÃ CHỌN" : "👆 click xem LN"}</span>
              </div>
              <div className="text-2xl font-extrabold text-gray-900 leading-tight">{fmtVNDFull(r.totalRev)}₫</div>
              <div className="text-xs text-gray-600 mt-1">{r.totalOrders.toLocaleString("vi-VN")} đơn · <span className="font-semibold">{pct.toFixed(1)}% tổng</span></div>
              {/* Share bar */}
              <div className="mt-2 h-2 bg-white/60 rounded-full overflow-hidden">
                <div className={`h-full ${r.color.bar}`} style={{ width: pct + "%" }}></div>
              </div>
              {/* Ad spend + CIR per staff */}
              <div className="mt-3 pt-2 border-t border-white/50 space-y-0.5">
                <div className="flex items-center justify-between text-[11px]">
                  <span className="text-gray-500">💸 Chi phí QC ({r.adKind})</span>
                  <span className="font-bold text-gray-800">{fmtVNDFull(r.adSpend)}₫</span>
                </div>
                <div className="flex items-center justify-between text-[11px]">
                  <span className="text-gray-500">📊 CIR (QC / DT)</span>
                  <span className={`font-bold ${r.cir == null ? "text-gray-400" : r.cir < 20 ? "text-emerald-700" : r.cir < 40 ? "text-amber-700" : "text-red-600"}`}>
                    {r.cir == null ? "—" : r.cir.toFixed(1) + "%"}
                  </span>
                </div>
              </div>
              {/* Sub-source pills (chỉ hiện nếu > 1 sub) */}
              {r.subTotals.length > 1 && (
                <div className="mt-3 space-y-1">
                  {r.subTotals.map(s => {
                    const subPct = r.totalRev > 0 ? (s.totalRev / r.totalRev * 100) : 0
                    return (
                      <div key={s.key} className="flex items-center justify-between text-[11px]">
                        <span className={`px-1.5 py-0.5 rounded font-semibold ${r.color.sub}`}>{s.label}</span>
                        <span className="text-gray-700">
                          <span className="font-semibold">{fmtVNDFull(s.totalRev)}₫</span>
                          <span className="text-gray-500 ml-1">· {subPct.toFixed(0)}%</span>
                        </span>
                      </div>
                    )
                  })}
                </div>
              )}
            </button>
          )
        })}
      </div>

      {/* Bảng chi tiết: row = nhân sự (+ sub nếu WEBSITE), col = 6 products + tổng.
          Mỗi cell product hiện "N đơn · Y₫" — đều filter theo dateRange. */}
      <div className="overflow-x-auto">
        <table className="w-full text-xs">
          <thead>
            <tr className="bg-gray-50 border-b-2 border-gray-200">
              <th className="py-2 px-3 text-left font-semibold text-gray-700">Nhân sự / Nguồn</th>
              {PRODUCTS.map(p => (
                <th key={p} className="py-2 px-3 text-right font-semibold text-gray-700">{p}</th>
              ))}
              <th className="py-2 px-3 text-right font-bold text-gray-900 border-l border-gray-300">Tổng</th>
            </tr>
          </thead>
          <tbody>
            {staffRows.map(r => (
              <React.Fragment key={r.key}>
                {/* Row tổng của staff */}
                <tr className={`border-b border-gray-200 ${r.color.bg}`}>
                  <td className={`py-2.5 px-3 font-bold ${r.color.text}`}>
                    {r.label}
                    <span className="ml-2 text-[10px] font-normal text-gray-500">({r.totalOrders.toLocaleString("vi-VN")} đơn)</span>
                  </td>
                  {PRODUCTS.map(p => {
                    const v = r.prodTotals[p] || 0
                    const ord = r.prodOrders[p] || 0
                    const pct = productMax[p] > 0 ? (v / productMax[p]) * 100 : 0
                    return (
                      <td key={p} className="py-2.5 px-3 text-right">
                        {v > 0 ? (
                          <div className="flex flex-col items-end gap-0.5">
                            <span className="font-semibold text-gray-800">{fmtVNDFull(v)}</span>
                            <span className="text-[10px] text-gray-500">{ord.toLocaleString("vi-VN")} đơn</span>
                            <div className="w-10 h-1 bg-white/60 rounded-full overflow-hidden">
                              <div className={`h-full ${r.color.bar}`} style={{ width: pct + "%" }}></div>
                            </div>
                          </div>
                        ) : <span className="text-gray-300">—</span>}
                      </td>
                    )
                  })}
                  <td className={`py-2.5 px-3 text-right font-extrabold ${r.color.text} border-l border-gray-300`}>{fmtVNDFull(r.totalRev)}</td>
                </tr>
                {/* Sub-rows (chỉ khi có nhiều hơn 1 sub-source) */}
                {r.subTotals.length > 1 && r.subTotals.map((s, idx) => (
                  <tr key={r.key + ":" + s.key} className="border-b border-gray-100 hover:bg-gray-50/60">
                    <td className="py-2 px-3 pl-8 text-gray-600">
                      <span className="text-gray-400 mr-1">{idx === r.subTotals.length - 1 ? "└─" : "├─"}</span>
                      {s.label}
                      <span className="ml-2 text-[10px] font-normal text-gray-400">({s.totalOrders.toLocaleString("vi-VN")} đơn)</span>
                    </td>
                    {PRODUCTS.map(p => {
                      const v = s.prodTotals[p] || 0
                      const ord = s.prodOrders?.[p] || 0
                      return (
                        <td key={p} className="py-2 px-3 text-right text-gray-600">
                          {v > 0 ? (
                            <div className="flex flex-col items-end">
                              <span>{fmtVNDFull(v)}</span>
                              <span className="text-[10px] text-gray-400">{ord.toLocaleString("vi-VN")} đơn</span>
                            </div>
                          ) : <span className="text-gray-300">—</span>}
                        </td>
                      )
                    })}
                    <td className="py-2 px-3 text-right font-semibold text-gray-700 border-l border-gray-200">{fmtVNDFull(s.totalRev)}</td>
                  </tr>
                ))}
              </React.Fragment>
            ))}
            {/* Row tổng cuối */}
            <tr className="bg-gray-100 border-t-2 border-gray-300">
              <td className="py-3 px-3 font-extrabold text-gray-900">
                TỔNG CÁC NHÓM
                <span className="ml-2 text-[10px] font-normal text-gray-600">({grandOrders.toLocaleString("vi-VN")} đơn)</span>
              </td>
              {PRODUCTS.map(p => {
                const v = staffRows.reduce((s, r) => s + (r.prodTotals[p] || 0), 0)
                const ord = staffRows.reduce((s, r) => s + (r.prodOrders[p] || 0), 0)
                return (
                  <td key={p} className="py-3 px-3 text-right font-bold text-gray-900">
                    {v > 0 ? (
                      <div className="flex flex-col items-end">
                        <span>{fmtVNDFull(v)}</span>
                        <span className="text-[10px] font-normal text-gray-500">{ord.toLocaleString("vi-VN")} đơn</span>
                      </div>
                    ) : <span className="text-gray-300">—</span>}
                  </td>
                )
              })}
              <td className="py-3 px-3 text-right font-extrabold text-red-700 border-l border-gray-300 text-sm">{fmtVNDFull(grandRev)}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <p className="text-[11px] text-gray-500 mt-3">
        * Doanh thu + số đơn theo bộ lọc thời gian phía trên · loại "Đã hoàn" + "Đã hủy".
        Cell mỗi sản phẩm = doanh thu của 6 SP chính (D1, DR1, Noma 911/922, DA8.1/Pro);
        Cột "Tổng" = tổng doanh thu thực thu mọi SKU (khớp Pancake POS).
        {anyFallback && (
          <span className="block text-amber-600 mt-1">
            ⚠ Snapshot JSON cũ chưa có order_revenue_by_status_by_date — đang dùng số xấp xỉ.
            Sẽ tự cập nhật trong vòng 15 phút (workflow Pancake chạy cron).
          </span>
        )}
      </p>
    </div>
  )
}

// =============================================================
// SUB-COMPONENT: Revenue breakdown theo 5 source group
// (DUY · PHƯƠNG NAM · Website · Zalo OA · Hotline)
// + Filter theo NHÂN SỰ: Tất cả / Duy / Phương Nam / WEBSITE
//   - Tất cả         → show 5 nguồn
//   - Duy            → chỉ show nguồn DUY
//   - Phương Nam     → chỉ show nguồn PHUONG_NAM
//   - WEBSITE        → show Website + Zalo OA + Hotline (3 nguồn con)
// =============================================================
function RevenueBySourceBreakdown({ dateRange, staffFilter, setStaffFilter }) {
  const revenue = (typeof DATA !== "undefined" ? DATA.revenue : null) || {}
  const groupsOrder = revenue.source_groups_order || []
  const groups = revenue.source_groups || {}

  if (!groupsOrder.length || !Object.keys(groups).length) {
    return null
  }

  // Product list (match PRODUCT_LIST trong fetch script) — 13 SP
  const PRODUCTS = [
    "D1", "D1 Pro", "D2", "D3", "D4", "D8 Pro",
    "DR1", "DR4 Plus",
    "DV1 Pro",
    "DA8.1", "DA8.1 Pro",
    "Noma 911", "Noma 922",
  ]

  // Mapping staff → source group keys để lọc
  const STAFF_FILTER_MAP = {
    ALL:           { label: "Tất cả",         sourceKeys: groupsOrder },
    DUY:           { label: "Duy",            sourceKeys: ["DUY"] },
    PHUONG_NAM:    { label: "Phương Nam",     sourceKeys: ["PHUONG_NAM"] },
    WEBSITE_STAFF: { label: "WEBSITE",        sourceKeys: ["WEBSITE", "ZALO_OA", "HOTLINE"] },
    FB_PAGE:       { label: "Page Facebook",  sourceKeys: ["FB_PAGE"] },
  }
  const STAFF_FILTER_ORDER = ["ALL", "DUY", "PHUONG_NAM", "WEBSITE_STAFF", "FB_PAGE"]

  // Brand color cho từng group
  const GROUP_COLOR = {
    "DUY":        { bg: "bg-blue-50",   border: "border-blue-300",   text: "text-blue-700",   bar: "bg-blue-500"   },
    "PHUONG_NAM": { bg: "bg-purple-50", border: "border-purple-300", text: "text-purple-700", bar: "bg-purple-500" },
    "WEBSITE":    { bg: "bg-emerald-50",border: "border-emerald-300",text: "text-emerald-700",bar: "bg-emerald-500"},
    "ZALO_OA":    { bg: "bg-amber-50",  border: "border-amber-300",  text: "text-amber-700",  bar: "bg-amber-500"  },
    "HOTLINE":    { bg: "bg-red-50",    border: "border-red-300",    text: "text-red-700",    bar: "bg-red-500"    },
    "FB_PAGE":    { bg: "bg-pink-50",   border: "border-pink-300",   text: "text-pink-700",   bar: "bg-pink-500"   },
  }

  // Helper: filter by_date theo dateRange
  const isInRange = (ymd) => {
    if (!dateRange?.start || !dateRange?.end) return true
    return ymd >= dateRange.start && ymd <= dateRange.end
  }

  // Danh sách nguồn được show dựa theo staffFilter
  const activeSourceKeys = STAFF_FILTER_MAP[staffFilter].sourceKeys

  // KHỚP POS PANCAKE — chỉ giữ delivered + other (loại returning/returned/canceled).
  // Match RevenueByStaffBreakdown.STATUSES_KEEP để 2 bảng consistent.
  const STATUSES_KEEP = ["delivered", "other"]

  // Tính revenue + orders mỗi group trong range, kèm breakdown theo product
  const rows = activeSourceKeys.map(key => {
    const g = groups[key]
    if (!g) return null
    const prodTotals = {}
    const prodOrders = {}
    let totalRev = 0

    // Field mới (có tách status) vs field cũ (fallback)
    const hasProductsByStatus = !!g.products_by_status
    const hasOrderCountByStatus = !!g.order_count_by_status_by_date
    const hasOrderRevByStatus = !!g.order_revenue_by_status_by_date
    const hasOrdersByDate = !!g.total_orders_by_date

    PRODUCTS.forEach(p => {
      let sum = 0
      let ord = 0
      if (hasProductsByStatus) {
        STATUSES_KEEP.forEach(st => {
          const pData = g.products_by_status[st]?.[p] || {}
          Object.entries(pData.by_date || {}).forEach(([d, v]) => {
            if (isInRange(d)) sum += (v || 0)
          })
          Object.entries(pData.orders_by_date || {}).forEach(([d, c]) => {
            if (isInRange(d)) ord += (c || 0)
          })
        })
      } else {
        // Fallback: snapshot cũ — dùng products merged (all status). Không khớp POS 100%.
        const pData = g.products?.[p] || {}
        Object.entries(pData.by_date || {}).forEach(([d, v]) => {
          if (isInRange(d)) sum += (v || 0)
        })
        if (pData.orders_by_date) {
          Object.entries(pData.orders_by_date).forEach(([d, c]) => {
            if (isInRange(d)) ord += (c || 0)
          })
        } else {
          ord = pData.orders || 0
        }
      }
      prodTotals[p] = sum
      prodOrders[p] = ord
    })

    // Tổng doanh thu nguồn (không bó 13 SP chính) — match POS:
    if (hasOrderRevByStatus) {
      totalRev = 0
      STATUSES_KEEP.forEach(st => {
        Object.entries(g.order_revenue_by_status_by_date[st] || {}).forEach(([d, v]) => {
          if (isInRange(d)) totalRev += (v || 0)
        })
      })
    } else {
      // Fallback: sum 13 SP (kém chính xác vì bỏ SP phụ)
      totalRev = PRODUCTS.reduce((s, p) => s + (prodTotals[p] || 0), 0)
    }

    // Tổng đơn nguồn (loại hoàn/hủy)
    let totalOrders = 0
    if (hasOrderCountByStatus) {
      STATUSES_KEEP.forEach(st => {
        Object.entries(g.order_count_by_status_by_date[st] || {}).forEach(([d, c]) => {
          if (isInRange(d)) totalOrders += (c || 0)
        })
      })
    } else if (hasOrdersByDate) {
      Object.entries(g.total_orders_by_date).forEach(([d, c]) => {
        if (isInRange(d)) totalOrders += c
      })
    } else {
      totalOrders = g.total_orders || 0
    }

    return {
      key,
      label: g.label || key,
      totalRev,
      totalOrders,
      prodTotals,
      prodOrders,
      color: GROUP_COLOR[key] || GROUP_COLOR["DUY"],
      fallbackOrders: !hasOrderCountByStatus && !hasOrdersByDate,
    }
  }).filter(Boolean)

  // Grand total (sum các group đang hiển thị) để tính % share
  const grandRev = rows.reduce((s, r) => s + r.totalRev, 0)
  const grandOrders = rows.reduce((s, r) => s + r.totalOrders, 0)
  const anyFallback = rows.some(r => r.fallbackOrders)
  // Product totals (across all groups đang hiển thị) for column bar scale
  const productMax = {}
  PRODUCTS.forEach(p => {
    productMax[p] = Math.max(1, ...rows.map(r => r.prodTotals[p] || 0))
  })

  // Grid column count tùy số nguồn đang hiển thị
  const gridColsCls = rows.length >= 5 ? "md:grid-cols-5"
                    : rows.length === 3 ? "md:grid-cols-3"
                    : rows.length === 2 ? "md:grid-cols-2"
                    : "md:grid-cols-1"

  return (
    <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm mb-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h2 className="text-lg font-bold text-red-700 tracking-tight">💰 Doanh thu theo nguồn — 6 kênh bán hàng</h2>
          <p className="text-xs text-gray-500 mt-1">
            Pancake POS · lọc theo nhân sự: <span className="font-semibold text-gray-700">{STAFF_FILTER_MAP[staffFilter].label}</span>
            {" · "}{rows.length} nguồn
          </p>
        </div>
        <div className="text-right">
          <div className="text-xs text-gray-500">Tổng</div>
          <div className="text-xl font-extrabold text-gray-900">{fmtVNDFull(grandRev)}₫</div>
          <div className="text-[11px] text-gray-500">{grandOrders.toLocaleString("vi-VN")} đơn</div>
        </div>
      </div>

      {/* Toggle filter theo NHÂN SỰ */}
      <div className="mb-4">
        <p className="text-[11px] font-semibold text-gray-500 uppercase tracking-wide mb-2">Chọn nhân sự</p>
        <div className="flex flex-wrap gap-2">
          {STAFF_FILTER_ORDER.map(k => (
            <button
              key={k}
              onClick={() => setStaffFilter(k)}
              className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition border ${
                staffFilter === k
                  ? "bg-red-600 text-white border-red-600 shadow-sm"
                  : "bg-white text-gray-700 border-gray-200 hover:bg-red-50 hover:border-red-200"
              }`}
            >
              {STAFF_FILTER_MAP[k].label}
            </button>
          ))}
        </div>
      </div>

      {/* Card hàng ngang: 1 card / group đang hiển thị */}
      <div className={`grid grid-cols-1 ${gridColsCls} gap-3 mb-5`}>
        {rows.map(r => {
          const pct = grandRev > 0 ? (r.totalRev / grandRev * 100) : 0
          return (
            <div key={r.key} className={`rounded-lg border ${r.color.border} ${r.color.bg} p-3`}>
              <div className={`text-xs font-bold uppercase tracking-wide ${r.color.text} mb-1`}>{r.label}</div>
              <div className="text-xl font-extrabold text-gray-900 leading-tight">{fmtVNDFull(r.totalRev)}₫</div>
              <div className="text-[11px] text-gray-600 mt-1">{r.totalOrders.toLocaleString("vi-VN")} đơn · {pct.toFixed(1)}%</div>
              <div className="mt-2 h-1.5 bg-white/60 rounded-full overflow-hidden">
                <div className={`h-full ${r.color.bar}`} style={{ width: pct + "%" }}></div>
              </div>
            </div>
          )
        })}
      </div>

      {/* Bảng chi tiết: row = product, col = group đang hiển thị. Cell: N đơn · Y₫ */}
      <div className="overflow-x-auto">
        <table className="w-full text-xs">
          <thead>
            <tr className="bg-gray-50 border-b border-gray-200">
              <th className="py-2 px-3 text-left font-semibold text-gray-700">Sản phẩm</th>
              {rows.map(r => (
                <th key={r.key} className={`py-2 px-3 text-right font-bold ${r.color.text}`}>{r.label}</th>
              ))}
              <th className="py-2 px-3 text-right font-semibold text-gray-900 border-l border-gray-200">Tổng</th>
            </tr>
          </thead>
          <tbody>
            {PRODUCTS.map(p => {
              const rowTotal = rows.reduce((s, r) => s + (r.prodTotals[p] || 0), 0)
              const rowOrders = rows.reduce((s, r) => s + (r.prodOrders[p] || 0), 0)
              if (rowTotal === 0 && rowOrders === 0) return null
              return (
                <tr key={p} className="border-b border-gray-100 hover:bg-gray-50">
                  <td className="py-2 px-3 font-medium text-gray-800">{p}</td>
                  {rows.map(r => {
                    const v = r.prodTotals[p] || 0
                    const ord = r.prodOrders[p] || 0
                    const pct = productMax[p] > 0 ? (v / productMax[p]) * 100 : 0
                    return (
                      <td key={r.key} className="py-2 px-3 text-right">
                        {v > 0 || ord > 0 ? (
                          <div className="flex flex-col items-end gap-0.5">
                            <span className="font-semibold text-gray-800">{v > 0 ? fmtVNDFull(v) : "—"}</span>
                            <span className="text-[10px] text-gray-500">{ord.toLocaleString("vi-VN")} đơn</span>
                            {v > 0 && (
                              <div className="w-10 h-1 bg-gray-100 rounded-full overflow-hidden">
                                <div className={`h-full ${r.color.bar}`} style={{ width: pct + "%" }}></div>
                              </div>
                            )}
                          </div>
                        ) : <span className="text-gray-300">—</span>}
                      </td>
                    )
                  })}
                  <td className="py-2 px-3 text-right font-bold text-gray-900 border-l border-gray-200">
                    <div className="flex flex-col items-end">
                      <span>{fmtVNDFull(rowTotal)}</span>
                      <span className="text-[10px] font-normal text-gray-500">{rowOrders.toLocaleString("vi-VN")} đơn</span>
                    </div>
                  </td>
                </tr>
              )
            })}
            {/* Tổng cột cuối */}
            <tr className="bg-gray-50 border-t-2 border-gray-300">
              <td className="py-2 px-3 font-bold text-gray-900">Tổng nguồn</td>
              {rows.map(r => (
                <td key={r.key} className={`py-2 px-3 text-right font-bold ${r.color.text}`}>
                  <div className="flex flex-col items-end">
                    <span>{fmtVNDFull(r.totalRev)}</span>
                    <span className="text-[10px] font-normal text-gray-500">{r.totalOrders.toLocaleString("vi-VN")} đơn</span>
                  </div>
                </td>
              ))}
              <td className="py-2 px-3 text-right font-extrabold text-gray-900 border-l border-gray-200">
                <div className="flex flex-col items-end">
                  <span>{fmtVNDFull(grandRev)}</span>
                  <span className="text-[10px] font-normal text-gray-600">{grandOrders.toLocaleString("vi-VN")} đơn</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <p className="text-[11px] text-gray-500 mt-3">
        * Doanh thu + số đơn theo bộ lọc thời gian phía trên (mọi trạng thái — giao / đang hoàn / đã hoàn / hủy / xử lý).
        {anyFallback && (
          <span className="block text-amber-600 mt-1">
            ⚠ Số đơn đang hiển thị tổng 90 ngày (snapshot cũ chưa có orders_by_date) — sẽ tự cập nhật sau khi workflow Pancake chạy lần kế.
          </span>
        )}
      </p>
    </div>
  )
}

// =============================================================
// SUB-COMPONENT: Revenue breakdown theo STATUS (đã giao / đang hoàn / đã hoàn / …)
// React theo dateRange + staffFilter (cùng filter với box Doanh thu theo nguồn).
// Khi staffFilter khác ALL → tự compute lại từ DATA.revenue.source_groups[KEY].products_by_status
// =============================================================
function RevenueStatusBreakdown({ dateRange, staffFilter }) {
  const productOrder = [
    "D1", "D1 Pro", "D2", "D3", "D4", "D8 Pro",
    "DR1", "DR4 Plus",
    "DV1 Pro",
    "DA8.1", "DA8.1 Pro",
    "Noma 911", "Noma 922",
  ]

  const STATUS_META = [
    { key: "delivered", label: "Đã giao",     color: "text-emerald-600", bg: "bg-emerald-50" },
    { key: "returning", label: "Đang hoàn",   color: "text-amber-600",   bg: "bg-amber-50"   },
    { key: "returned",  label: "Đã hoàn",     color: "text-red-600",     bg: "bg-red-50"     },
    { key: "canceled",  label: "Đã hủy",      color: "text-gray-500",    bg: "bg-gray-100"   },
    { key: "other",     label: "Đang xử lý",  color: "text-blue-600",    bg: "bg-blue-50"    }
  ]

  // Mapping nhân sự → danh sách source keys để gộp
  const STAFF_TO_SOURCES = {
    ALL:           ["DUY", "PHUONG_NAM", "WEBSITE", "ZALO_OA", "HOTLINE", "FB_PAGE"],
    DUY:           ["DUY"],
    PHUONG_NAM:    ["PHUONG_NAM"],
    WEBSITE_STAFF: ["WEBSITE", "ZALO_OA", "HOTLINE"],
    FB_PAGE:       ["FB_PAGE"],
  }
  const STAFF_LABEL = {
    ALL: "Tất cả nhân sự",
    DUY: "Nhân sự Duy",
    PHUONG_NAM: "Nhân sự Phương Nam",
    WEBSITE_STAFF: "Nhân sự WEBSITE (Website + Zalo OA + Hotline)",
    FB_PAGE: "Page Facebook (đơn organic)",
  }

  // Self-compute revenueByStatus theo staffFilter + dateRange
  // - Doanh thu per cell: lấy từ source_groups[KEY].products_by_status[status][product].by_date
  // - Số đơn per cell:    lấy từ source_groups[KEY].products_by_status[status][product].orders_by_date
  const { revenueByStatus, anyFallback } = React.useMemo(() => {
    const revenue = (typeof DATA !== "undefined" ? DATA.revenue : null) || {}
    const groups = revenue.source_groups || {}
    const sourceKeys = STAFF_TO_SOURCES[staffFilter] || STAFF_TO_SOURCES.ALL
    const statusKeys = ["delivered", "returning", "returned", "canceled", "other"]
    const isInRange = (d) => {
      if (!dateRange?.start || !dateRange?.end) return true
      return d >= dateRange.start && d <= dateRange.end
    }

    const result = {}
    let sawOrdersByDate = false
    let sawNoOrdersByDate = false

    statusKeys.forEach(sk => {
      const products = {}       // {product: revenue}
      const productsOrders = {} // {product: orders}
      let total = 0
      let totalOrders = 0

      productOrder.forEach(p => {
        let sum = 0
        let ord = 0
        sourceKeys.forEach(srcKey => {
          const g = groups[srcKey]
          if (!g) return
          const pData = g.products_by_status?.[sk]?.[p] || {}
          // Doanh thu theo date
          Object.entries(pData.by_date || {}).forEach(([d, v]) => {
            if (isInRange(d)) sum += v || 0
          })
          // Số đơn theo date (nếu có)
          if (pData.orders_by_date) {
            sawOrdersByDate = true
            Object.entries(pData.orders_by_date).forEach(([d, c]) => {
              if (isInRange(d)) ord += c || 0
            })
          } else if (pData.orders != null) {
            // Fallback: tổng 90d (snapshot cũ)
            sawNoOrdersByDate = true
            ord += pData.orders || 0
          }
        })
        products[p] = sum
        productsOrders[p] = ord
        total += sum
        totalOrders += ord
      })
      result[sk] = { products, productsOrders, total, totalOrders }
    })

    return {
      revenueByStatus: result,
      anyFallback: sawNoOrdersByDate && !sawOrdersByDate,
    }
  }, [dateRange, staffFilter])

  // Hàng "Tổng đã tạo" = cộng dồn 5 status
  const totalByProduct = {}
  const totalOrdersByProduct = {}
  productOrder.forEach(p => {
    totalByProduct[p]       = STATUS_META.reduce((s, st) => s + (revenueByStatus[st.key]?.products?.[p] || 0), 0)
    totalOrdersByProduct[p] = STATUS_META.reduce((s, st) => s + (revenueByStatus[st.key]?.productsOrders?.[p] || 0), 0)
  })
  const grandTotal  = Object.values(totalByProduct).reduce((s, v) => s + v, 0)
  const grandOrders = Object.values(totalOrdersByProduct).reduce((s, v) => s + v, 0)

  return (
    <div className="mb-6 bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
      <div className="flex items-center justify-between flex-wrap gap-2 mb-1">
        <h2 className="text-lg font-semibold text-gray-900 flex items-center gap-2">
          <Package className="w-5 h-5 text-red-600" />
          Doanh thu theo trạng thái — Pancake
        </h2>
        <div className="text-right">
          <div className="text-[11px] text-gray-500">Tổng đã tạo</div>
          <div className="text-base font-extrabold text-red-600">{fmtVNDFull(grandTotal)}₫</div>
          <div className="text-[11px] text-gray-500">{grandOrders.toLocaleString("vi-VN")} đơn</div>
        </div>
      </div>
      <p className="text-xs text-gray-500 mb-4">
        Bóc tách doanh thu + số đơn theo status · Khoảng: <span className="font-semibold text-gray-700">{fmtDate(dateRange.start)} → {fmtDate(dateRange.end)}</span> · Nhân sự: <span className="font-semibold text-gray-700">{STAFF_LABEL[staffFilter] || "Tất cả"}</span>
      </p>
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b-2 border-gray-200 text-gray-600">
              <th className="py-2 px-3 text-left font-semibold">Trạng thái</th>
              {productOrder.map(p => (
                <th key={p} className="py-2 px-3 text-right font-semibold">{p}</th>
              ))}
              <th className="py-2 px-3 text-right font-bold bg-gray-50">Tổng</th>
            </tr>
          </thead>
          <tbody>
            {STATUS_META.map(st => {
              const row = revenueByStatus[st.key] || { products: {}, productsOrders: {}, total: 0, totalOrders: 0 }
              return (
                <tr key={st.key} className="border-b border-gray-100 hover:bg-gray-50">
                  <td className={`py-2 px-3 font-medium ${st.color}`}>
                    <span className={`inline-block w-2 h-2 rounded-full mr-2 ${st.bg}`} style={{ border: "2px solid currentColor" }} />
                    {st.label}
                    <span className="ml-2 text-[10px] font-normal text-gray-400">({row.totalOrders.toLocaleString("vi-VN")} đơn)</span>
                  </td>
                  {productOrder.map(p => {
                    const v = row.products?.[p] || 0
                    const ord = row.productsOrders?.[p] || 0
                    return (
                      <td key={p} className="py-2 px-3 text-right">
                        {v > 0 || ord > 0 ? (
                          <div className="flex flex-col items-end">
                            <span className={`font-medium ${v > 0 ? "text-gray-900" : "text-gray-400"}`}>{v > 0 ? fmtVNDFull(v) + "₫" : "—"}</span>
                            <span className="text-[10px] text-gray-500">{ord.toLocaleString("vi-VN")} đơn</span>
                          </div>
                        ) : <span className="text-gray-300">—</span>}
                      </td>
                    )
                  })}
                  <td className={`py-2 px-3 text-right font-bold ${row.total > 0 ? st.color : "text-gray-300"} bg-gray-50`}>
                    {row.total > 0 ? (
                      <div className="flex flex-col items-end">
                        <span>{fmtVNDFull(row.total)}₫</span>
                        <span className="text-[10px] font-normal text-gray-500">{row.totalOrders.toLocaleString("vi-VN")} đơn</span>
                      </div>
                    ) : "—"}
                  </td>
                </tr>
              )
            })}
            <tr className="border-t-2 border-gray-300 bg-gray-50">
              <td className="py-3 px-3 font-bold text-gray-900">
                Tổng đã tạo
                <span className="ml-2 text-[10px] font-normal text-gray-600">({grandOrders.toLocaleString("vi-VN")} đơn)</span>
              </td>
              {productOrder.map(p => {
                const v = totalByProduct[p] || 0
                const ord = totalOrdersByProduct[p] || 0
                return (
                  <td key={p} className={`py-3 px-3 text-right font-bold ${v > 0 ? "text-gray-900" : "text-gray-300"}`}>
                    {v > 0 || ord > 0 ? (
                      <div className="flex flex-col items-end">
                        <span>{v > 0 ? fmtVNDFull(v) + "₫" : "—"}</span>
                        <span className="text-[10px] font-normal text-gray-500">{ord.toLocaleString("vi-VN")} đơn</span>
                      </div>
                    ) : "—"}
                  </td>
                )
              })}
              <td className="py-3 px-3 text-right font-bold text-red-600 bg-red-50">
                {grandTotal > 0 ? (
                  <div className="flex flex-col items-end">
                    <span>{fmtVNDFull(grandTotal)}₫</span>
                    <span className="text-[10px] font-normal text-gray-600">{grandOrders.toLocaleString("vi-VN")} đơn</span>
                  </div>
                ) : "—"}
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <p className="text-[11px] text-gray-400 mt-3 italic">
        * Phản ứng theo bộ lọc thời gian + filter nhân sự ở box "Doanh thu theo nguồn" phía trên.
        "Tổng đã tạo" = cộng cả 5 status — khớp với KPI "Doanh thu (Pancake)" khi filter = Tất cả.
        {anyFallback && (
          <span className="block text-amber-600 mt-1 not-italic">
            ⚠ Số đơn đang hiển thị tổng 90 ngày (snapshot cũ chưa có orders_by_date) — sẽ tự cập nhật sau khi workflow Pancake chạy lần kế.
          </span>
        )}
      </p>
    </div>
  )
}

// =============================================================
// SUB-COMPONENT: Performance Analysis (text insights)
// =============================================================
function PerformanceAnalysis({ kpis, weekComp, productsData, campaignsFiltered, timeFilter, dateRange }) {
  const filterLabel = TIME_FILTERS.find(f => f.key === timeFilter)?.label || ""

  // ============ HELPER: split daily array into first half / second half
  const splitHalves = (daily) => {
    if (!daily || daily.length < 2) return null
    const mid = Math.floor(daily.length / 2)
    const first = daily.slice(0, mid)
    const second = daily.slice(mid)
    const sumIt = (arr) => arr.reduce((a, d) => ({
      spend: a.spend + (d.spend||0),
      reg: a.reg + (d.registrations||0),
      clicks: a.clicks + (d.clicks||0),
      imp: a.imp + (d.impressions||0)
    }), { spend:0, reg:0, clicks:0, imp:0 })
    return { first: sumIt(first), second: sumIt(second), days: daily.length }
  }

  // ============ PRODUCT DEEP-DIVE ANALYSIS
  const productDiagnoses = productsData.map(p => {
    const t = p.totals
    const cpl = t.registrations ? t.spend / t.registrations : null
    const ctr = t.impressions ? (t.clicks / t.impressions * 100) : 0
    const cpc = t.clicks ? (t.spend / t.clicks) : 0
    const cvr = t.clicks ? (t.registrations / t.clicks * 100) : 0  // click → reg
    const cpm = t.impressions ? (t.spend / t.impressions * 1000) : 0

    // Trend within selected period
    const halves = splitHalves(p.daily)
    let trend = null
    if (halves && halves.days >= 4) {
      const cpl1 = halves.first.reg ? halves.first.spend / halves.first.reg : null
      const cpl2 = halves.second.reg ? halves.second.spend / halves.second.reg : null
      if (cpl1 != null && cpl2 != null) {
        const delta = ((cpl2 - cpl1) / cpl1 * 100)
        trend = { cpl1, cpl2, delta, regDelta: halves.second.reg - halves.first.reg }
      } else if (cpl1 == null && cpl2 != null) {
        trend = { cpl1: null, cpl2, delta: -100, regDelta: halves.second.reg - halves.first.reg, status: "improving" }
      } else if (cpl1 != null && cpl2 == null) {
        trend = { cpl1, cpl2: null, delta: 999, regDelta: halves.second.reg - halves.first.reg, status: "declining" }
      }
    }

    // ============ DIAGNOSIS LOGIC
    // Benchmarks: CTR ≥1.5% tốt, CPL <200K tốt, CVR ≥2% tốt
    const symptoms = []
    const actions = []
    let severity = "good" // good | warn | bad

    if (!t.registrations) {
      severity = "bad"
      symptoms.push(`Đã chi ${fmtVND(t.spend)}₫ nhưng chưa có đăng ký nào`)
      if (ctr < 1) symptoms.push(`CTR rất thấp ${ctr.toFixed(2)}% → creative không hấp dẫn`)
      if (cpc > 5000) symptoms.push(`CPC cao ${fmtVND(cpc)}₫ → đối tượng cạnh tranh hoặc creative kém`)
      actions.push("Tạm dừng ngay các campaign đang chạy của sản phẩm này")
      actions.push("Thay creative mới (hook 3 giây đầu, CTA rõ ràng) trước khi chạy lại")
      actions.push("Xem lại form đăng ký: số trường, tốc độ tải, mobile UX")
    } else {
      // Has conversions — diagnose CPL
      const isHighCpl = cpl > 300000
      const isLowCtr = ctr < 1.2
      const isLowCvr = cvr < 1.5
      const isGoodCtr = ctr >= 1.5
      const isGoodCpl = cpl < 200000

      if (isGoodCpl && isGoodCtr) {
        severity = "good"
        symptoms.push(`CPL tốt ${fmtVND(cpl)}₫ · CTR khoẻ ${ctr.toFixed(2)}% · CVR ${cvr.toFixed(1)}%`)
        actions.push("Tăng ngân sách 20–30% để scale, theo dõi CPL không vượt 1.3x")
        actions.push("Nhân bản campaign sang Lookalike audience để mở rộng quy mô")
      } else if (isHighCpl && isLowCtr) {
        severity = "bad"
        symptoms.push(`CPL cao ${fmtVND(cpl)}₫ + CTR thấp ${ctr.toFixed(2)}% → creative không hút`)
        actions.push("Refresh creative: thử 3–5 hook khác (pain point, social proof, demo nhanh)")
        actions.push("Test format mới: video dọc 9:16 ≤15s, carousel so sánh, UGC")
        actions.push("Thu hẹp/đổi targeting nếu CPM > 80K")
      } else if (isHighCpl && !isLowCtr && isLowCvr) {
        severity = "warn"
        symptoms.push(`CTR ổn ${ctr.toFixed(2)}% nhưng CVR chỉ ${cvr.toFixed(1)}% → click vào nhưng không đăng ký`)
        actions.push("Vấn đề ở landing page/form, không phải quảng cáo")
        actions.push("Rút gọn form (≤4 trường), thêm mã giảm/ưu đãi rõ ràng")
        actions.push("Kiểm tra tốc độ tải mobile, lỗi pixel, redirect")
      } else if (isHighCpl) {
        severity = "warn"
        symptoms.push(`CPL ${fmtVND(cpl)}₫ cao hơn benchmark`)
        actions.push("A/B test 2 nhóm creative khác phong cách, giữ targeting")
        actions.push("Đặt CBO + tối ưu cho conversion, để ML phân bổ ngân sách")
      } else {
        severity = "good"
        symptoms.push(`CPL ${fmtVND(cpl)}₫ trong ngưỡng tốt · CTR ${ctr.toFixed(2)}% · CVR ${cvr.toFixed(1)}%`)
        actions.push("Duy trì creative, scale ngân sách từ từ 15–20%/tuần")
      }

      // Trend overrides
      if (trend && trend.delta > 30) {
        severity = severity === "good" ? "warn" : severity
        symptoms.push(`⚠️ CPL đang xấu đi: nửa đầu kỳ ${trend.cpl1 ? fmtVND(trend.cpl1) : "—"}₫ → nửa cuối ${trend.cpl2 ? fmtVND(trend.cpl2) : "—"}₫ (+${trend.delta.toFixed(0)}%)`)
        actions.push("Dấu hiệu audience fatigue: refresh creative trong 3 ngày tới hoặc rotate audience")
      } else if (trend && trend.delta < -20) {
        symptoms.push(`📈 CPL đang cải thiện: ${trend.cpl1 ? fmtVND(trend.cpl1) : "—"}₫ → ${trend.cpl2 ? fmtVND(trend.cpl2) : "—"}₫ (${trend.delta.toFixed(0)}%)`)
        actions.push("Đà tốt — không thay đổi creative, tăng nhẹ budget 10–15%")
      }
    }

    return { name: p.name, t, cpl, ctr, cpc, cvr, cpm, trend, severity, symptoms, actions }
  }).sort((a, b) => (b.t.spend - a.t.spend))

  // ============ CAMPAIGN TREND ANALYSIS
  const campsWithTrend = campaignsFiltered.map(c => {
    const halves = splitHalves(c._daily)
    if (!halves || halves.days < 4) return { ...c, _trend: null }
    const cpl1 = halves.first.reg ? halves.first.spend / halves.first.reg : null
    const cpl2 = halves.second.reg ? halves.second.spend / halves.second.reg : null
    let status = "stable", delta = 0
    if (cpl1 != null && cpl2 != null) {
      delta = ((cpl2 - cpl1) / cpl1 * 100)
      status = delta < -15 ? "improving" : delta > 25 ? "declining" : "stable"
    } else if (cpl1 == null && cpl2 != null && halves.second.reg > 0) {
      status = "improving"; delta = -100
    } else if (cpl1 != null && cpl2 == null && halves.first.reg > 0) {
      status = "declining"; delta = 999
    }
    return { ...c, _trend: { status, delta, cpl1, cpl2, reg1: halves.first.reg, reg2: halves.second.reg } }
  })

  const improving = campsWithTrend.filter(c => c._trend?.status === "improving" && c._spend > 100000).sort((a,b) => (a._trend.delta - b._trend.delta)).slice(0, 4)
  const declining = campsWithTrend.filter(c => c._trend?.status === "declining" && c._spend > 100000).sort((a,b) => (b._trend.delta - a._trend.delta)).slice(0, 4)

  // ============ OVERALL STATS
  const wastedSpend = campaignsFiltered.filter(c => c._reg === 0).reduce((s, c) => s + c._spend, 0)
  const wastedPct = kpis.spend ? (wastedSpend / kpis.spend * 100) : 0
  const overallCtr = kpis.impressions ? (kpis.clicks / kpis.impressions * 100) : 0
  const overallCvr = kpis.clicks ? (kpis.registrations / kpis.clicks * 100) : 0
  const spendDelta = weekComp.prev.spend ? ((weekComp.last.spend - weekComp.prev.spend) / weekComp.prev.spend * 100) : 0
  const regDelta = weekComp.prev.registrations ? ((weekComp.last.registrations - weekComp.prev.registrations) / weekComp.prev.registrations * 100) : 0

  // Sản phẩm cần tối ưu (severity bad/warn)
  const needsFix = productDiagnoses.filter(p => p.severity !== "good")

  return (
    <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm mb-6">
      <h2 className="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
        <Lightbulb className="w-5 h-5 text-amber-500" />
        Phân tích hiệu quả & đề xuất tối ưu — {filterLabel}
        <span className="text-xs font-normal text-gray-400 ml-1">
          ({dateRange.start === dateRange.end ? fmtDate(dateRange.start) : `${fmtDate(dateRange.start)} → ${fmtDate(dateRange.end)}`})
        </span>
      </h2>

      {/* TỔNG QUAN KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-6 gap-3 mb-5">
        <div className="bg-blue-50 rounded-lg p-3 border border-blue-100">
          <p className="text-[10px] uppercase font-semibold text-blue-700">Chi tiêu</p>
          <p className="text-lg font-bold text-blue-900 mt-1">{fmtVND(kpis.spend)}₫</p>
        </div>
        <div className="bg-emerald-50 rounded-lg p-3 border border-emerald-100">
          <p className="text-[10px] uppercase font-semibold text-emerald-700">Đăng ký</p>
          <p className="text-lg font-bold text-emerald-900 mt-1">{kpis.registrations}</p>
        </div>
        <div className="bg-amber-50 rounded-lg p-3 border border-amber-100">
          <p className="text-[10px] uppercase font-semibold text-amber-700">CPL TB</p>
          <p className="text-lg font-bold text-amber-900 mt-1">{kpis.registrations ? fmtVND(kpis.cpl) + "₫" : "—"}</p>
        </div>
        <div className="bg-cyan-50 rounded-lg p-3 border border-cyan-100">
          <p className="text-[10px] uppercase font-semibold text-cyan-700">CTR</p>
          <p className="text-lg font-bold text-cyan-900 mt-1">{overallCtr.toFixed(2)}%</p>
        </div>
        <div className="bg-indigo-50 rounded-lg p-3 border border-indigo-100">
          <p className="text-[10px] uppercase font-semibold text-indigo-700">CVR (click→ĐK)</p>
          <p className="text-lg font-bold text-indigo-900 mt-1">{overallCvr.toFixed(2)}%</p>
        </div>
        <div className="bg-purple-50 rounded-lg p-3 border border-purple-100">
          <p className="text-[10px] uppercase font-semibold text-purple-700">% chi hiệu quả</p>
          <p className="text-lg font-bold text-purple-900 mt-1">{kpis.spend ? (100 - wastedPct).toFixed(0) : "0"}%</p>
        </div>
      </div>

      {/* TÓM TẮT XU HƯỚNG TUẦN */}
      <div className="bg-gradient-to-r from-slate-50 to-blue-50 border border-slate-200 rounded-lg p-4 mb-5">
        <h3 className="text-sm font-bold text-slate-800 mb-2 flex items-center gap-2">
          📊 Tổng quan xu hướng (7 ngày gần nhất vs 7 ngày trước đó)
        </h3>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs text-slate-700">
          <div>
            <span className="font-semibold">Chi tiêu:</span> {fmtVND(weekComp.prev.spend)}₫ → {fmtVND(weekComp.last.spend)}₫{" "}
            <span className={spendDelta > 0 ? "text-blue-700 font-bold" : "text-orange-700 font-bold"}>
              ({spendDelta > 0 ? "+" : ""}{spendDelta.toFixed(0)}%)
            </span>
          </div>
          <div>
            <span className="font-semibold">Đăng ký:</span> {weekComp.prev.registrations} → {weekComp.last.registrations}{" "}
            <span className={regDelta > 0 ? "text-emerald-700 font-bold" : "text-red-700 font-bold"}>
              ({regDelta > 0 ? "+" : ""}{regDelta.toFixed(0)}%)
            </span>
          </div>
          <div className="md:col-span-2 text-slate-600 italic mt-1">
            {regDelta > spendDelta + 10
              ? "✅ Hiệu quả cải thiện: số đăng ký tăng nhanh hơn chi tiêu — đang scale tốt."
              : regDelta < spendDelta - 10
              ? "⚠️ Hiệu quả giảm: chi tăng nhưng đăng ký không theo kịp — kiểm tra audience fatigue và creative."
              : "Hiệu quả ổn định: tỉ lệ đăng ký/chi tiêu ngang tuần trước."}
          </div>
        </div>
      </div>

      {/* PHÂN TÍCH TỪNG SẢN PHẨM */}
      <h3 className="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2">
        <Package className="w-4 h-4 text-blue-600" />
        Chẩn đoán & đề xuất tối ưu cho từng sản phẩm
      </h3>
      <div className="space-y-3 mb-5">
        {productDiagnoses.map(p => {
          const borderColor = p.severity === "good" ? "border-emerald-200 bg-emerald-50/40"
            : p.severity === "warn" ? "border-amber-200 bg-amber-50/40"
            : "border-red-200 bg-red-50/40"
          const badgeColor = p.severity === "good" ? "bg-emerald-100 text-emerald-700"
            : p.severity === "warn" ? "bg-amber-100 text-amber-700"
            : "bg-red-100 text-red-700"
          const badgeText = p.severity === "good" ? "✅ TỐT — SCALE"
            : p.severity === "warn" ? "⚠️ CẦN ĐIỀU CHỈNH"
            : "🔴 CẦN HÀNH ĐỘNG NGAY"
          return (
            <div key={p.name} className={`rounded-lg border ${borderColor} p-4`}>
              <div className="flex items-start justify-between mb-3 flex-wrap gap-2">
                <div className="flex items-center gap-2">
                  <span className="w-3 h-3 rounded-full" style={{ backgroundColor: PRODUCT_COLOR[p.name] }} />
                  <h4 className="font-bold text-gray-900 text-base">{p.name}</h4>
                  <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${badgeColor}`}>{badgeText}</span>
                </div>
              </div>

              {/* Metrics row */}
              <div className="grid grid-cols-3 md:grid-cols-6 gap-2 mb-3 text-xs">
                <div className="bg-white rounded p-2 border border-gray-100">
                  <p className="text-[9px] text-gray-500 uppercase">Spend</p>
                  <p className="font-bold text-gray-900">{fmtVND(p.t.spend)}₫</p>
                </div>
                <div className="bg-white rounded p-2 border border-gray-100">
                  <p className="text-[9px] text-gray-500 uppercase">Đăng ký</p>
                  <p className="font-bold text-emerald-600">{p.t.registrations}</p>
                </div>
                <div className="bg-white rounded p-2 border border-gray-100">
                  <p className="text-[9px] text-gray-500 uppercase">CPL</p>
                  <p className="font-bold text-gray-900">{p.cpl ? fmtVND(p.cpl) + "₫" : "—"}</p>
                </div>
                <div className="bg-white rounded p-2 border border-gray-100">
                  <p className="text-[9px] text-gray-500 uppercase">CTR</p>
                  <p className={`font-bold ${p.ctr >= 1.5 ? "text-emerald-600" : p.ctr >= 1 ? "text-amber-600" : "text-red-600"}`}>{p.ctr.toFixed(2)}%</p>
                </div>
                <div className="bg-white rounded p-2 border border-gray-100">
                  <p className="text-[9px] text-gray-500 uppercase">CPC</p>
                  <p className="font-bold text-gray-900">{fmtVND(p.cpc)}₫</p>
                </div>
                <div className="bg-white rounded p-2 border border-gray-100">
                  <p className="text-[9px] text-gray-500 uppercase">CVR</p>
                  <p className={`font-bold ${p.cvr >= 2 ? "text-emerald-600" : p.cvr >= 1 ? "text-amber-600" : "text-red-600"}`}>{p.cvr.toFixed(1)}%</p>
                </div>
              </div>

              {/* Symptoms */}
              <div className="mb-2">
                <p className="text-[10px] uppercase font-semibold text-gray-500 mb-1">🔍 Dấu hiệu chẩn đoán</p>
                <ul className="text-xs text-gray-700 space-y-0.5 ml-1">

                <p className="text-[10px] uppercase font-semibold text-gray-500 mb-1">💡 Đề xuất tối ưu</p>
                <ul className="text-xs text-gray-800 space-y-0.5 ml-1">

          </h4>
          {improving.length ? (
            <ul className="text-xs space-y-2">
              {improving.map(c => (

                    CPL {c._trend.cpl1 ? fmtVND(c._trend.cpl1) + "₫" : "—"} → {c._trend.cpl2 ? fmtVND(c._trend.cpl2) + "₫" : "—"}{" "}
                    <span className="text-emerald-700 font-bold">({c._trend.delta === -100 ? "mới có ĐK" : c._trend.delta.toFixed(0) + "%"})</span>

                </li>
