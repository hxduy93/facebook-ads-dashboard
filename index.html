<script>
// ═══ LOADING SCREEN — runs immediately, before React ═══
(function() {
  if (typeof THREE === 'undefined') { document.getElementById('loading-overlay').style.display='none'; return; }

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.z = 4.2;
  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.getElementById('loading-three').appendChild(renderer.domElement);
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Build globe dotted cloud
  const RADIUS=1.3, TOTAL=3500, PHI=(1+Math.sqrt(5))/2;
  function noise(x,y,z){
    let n=0;
    n+=Math.sin(x*2.8+1.3)*Math.cos(y*3.2-0.6);
    n+=Math.sin(y*4.1+2.1)*Math.cos(z*2.9+1.7);
    n+=Math.sin(z*3.5-0.8)*0.85;
    n+=Math.cos(x*5.6)*Math.sin(z*4.2)*0.55;
    n+=Math.sin(x*1.3)*Math.cos(y*1.1)*0.7;
    return n;
  }
  const cloud=[], nodes=[];
  for (let i=0;i<TOTAL;i++){
    const y=1-(i/(TOTAL-1))*2, r=Math.sqrt(1-y*y), t=(2*Math.PI*i)/PHI;
    const x=Math.cos(t)*r, z=Math.sin(t)*r;
    if (noise(x,y,z)>0.1) {
      const px=x*RADIUS, py=y*RADIUS, pz=z*RADIUS;
      cloud.push(px,py,pz);
      if (Math.random()<0.018) nodes.push(px,py,pz);
    }
  }
  const keptDots = cloud.length/3;

  const cloudGeom = new THREE.BufferGeometry();
  cloudGeom.setAttribute('position', new THREE.Float32BufferAttribute(cloud,3));
  const cloudPts = new THREE.Points(cloudGeom, new THREE.PointsMaterial({
    color:0x00a8d8, size:0.017, transparent:true, opacity:0.75, sizeAttenuation:true,
    depthWrite:false, blending:THREE.AdditiveBlending
  }));
  const nodeGeom = new THREE.BufferGeometry();
  nodeGeom.setAttribute('position', new THREE.Float32BufferAttribute(nodes,3));
  const nodePts = new THREE.Points(nodeGeom, new THREE.PointsMaterial({
    color:0x9df9ff, size:0.08, transparent:true, opacity:1.0, sizeAttenuation:true,
    depthWrite:false, blending:THREE.AdditiveBlending
  }));
  const innerSphere = new THREE.Mesh(
    new THREE.SphereGeometry(RADIUS*0.94,32,32),
    new THREE.MeshBasicMaterial({ color:0x001020, transparent:true, opacity:0.6, depthWrite:false })
  );
  const linesGroup = new THREE.Group();
  function rebuildLines(){
    while(linesGroup.children.length) linesGroup.remove(linesGroup.children[0]);
    const nC = nodes.length/3;
    for (let i=0;i<28;i++){
      const a=Math.floor(Math.random()*nC), b=Math.floor(Math.random()*nC);
      if (a===b) continue;
      const pa=new THREE.Vector3(nodes[a*3],nodes[a*3+1],nodes[a*3+2]);
      const pb=new THREE.Vector3(nodes[b*3],nodes[b*3+1],nodes[b*3+2]);
      const d=pa.distanceTo(pb);
      if (d>1.7 || d<0.3) continue;
      linesGroup.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([pa,pb]),
        new THREE.LineBasicMaterial({ color:0x00d4ff, transparent:true, opacity:0.25+Math.random()*0.45 })
      ));
    }
  }
  rebuildLines();
  const linesInt = setInterval(rebuildLines, 900);

  const outer = new THREE.Mesh(
    new THREE.SphereGeometry(RADIUS*1.06,24,16),
    new THREE.MeshBasicMaterial({ color:0x003855, wireframe:true, transparent:true, opacity:0.12 })
  );
  const globe = new THREE.Group();
  globe.add(innerSphere); globe.add(cloudPts); globe.add(nodePts); globe.add(linesGroup); globe.add(outer);
  globe.rotation.x = 0.35;
  scene.add(globe);

  document.getElementById('loading-nodeCount').innerHTML = 'NODES ═ ' + keptDots.toLocaleString() + ' / ' + TOTAL.toLocaleString() + '<div class="dash">NETWORK ACTIVE</div>';
  const clockInt = setInterval(() => {
    document.getElementById('loading-clock').textContent = new Date().toTimeString().slice(0,8);
  }, 500);

  let rafId;
  function animate(){
    rafId = requestAnimationFrame(animate);
    globe.rotation.y += 0.0028;
    renderer.render(scene,camera);
  }
  animate();

  // ── Typing effect ──
  function typeText(el, text, msPerChar, keepCursor, done){
    let i=0;
    el.innerHTML='<span class="type-cursor"></span>';
    const iv=setInterval(()=>{
      i++;
      el.innerHTML=text.substring(0,i)+'<span class="type-cursor"></span>';
      if (i>=text.length){
        clearInterval(iv);
        if (!keepCursor) el.innerHTML=text;
        if (done) done();
      }
    }, msPerChar);
  }

  let dotsInt;
  setTimeout(()=>{
    typeText(document.getElementById('loading-prefix'), '> PROJECT', 50, false, ()=>{
      setTimeout(()=>{
        typeText(document.getElementById('loading-brand'), 'DOSCOM', 90, false, ()=>{
          const t = document.getElementById('loading-trailer');
          let n=0; t.innerHTML='LOADING';
          dotsInt = setInterval(()=>{ n=(n+1)%4; t.textContent='LOADING'+'.'.repeat(n); }, 220);
        });
      }, 120);
    });
  }, 150);

  // ── Progress bar — 3s total ──
  let p=0;
  const fill = document.getElementById('loading-fill');
  const pct  = document.getElementById('loading-pct');
  function tick(){
    p += Math.random()*3 + 2;
    if (p>100) p=100;
    fill.style.width = p + '%';
    pct.textContent = Math.floor(p) + '%';
    if (p<100) setTimeout(tick, 65);
    else setTimeout(fadeOut, 400);
  }
  setTimeout(tick, 200);

  function fadeOut(){
    const ov = document.getElementById('loading-overlay');
    ov.classList.add('hide');
    // Clean up after transition
    setTimeout(()=>{
      clearInterval(linesInt);
      clearInterval(clockInt);
      if (dotsInt) clearInterval(dotsInt);
      cancelAnimationFrame(rafId);
      renderer.dispose();
      if (ov.parentNode) ov.parentNode.removeChild(ov);
    }, 700);
  }
})();
</script>

    var el = document.getElementById("boot-error");
    if (!el) return;

  });
  // Sanity check — show which libs loaded
  window.addEventListener("DOMContentLoaded", function() {
    var missing = [];
    if (typeof React === "undefined") missing.push("React");
    if (typeof ReactDOM === "undefined") missing.push("ReactDOM");
    if (typeof Recharts === "undefined") missing.push("Recharts");
    if (typeof Babel === "undefined") missing.push("Babel");
    if (missing.length) {
      var el = document.getElementById("boot-error");
      el.style.display = "block";
      el.textContent = "Thiếu thư viện: " + missing.join(", ") + "\n\nKiểm tra kết nối internet và mở lại trang.";

  });
</script>

const fmtVND = (n) => {
  if (n == null || isNaN(n)) return "—"
  const sign = n < 0 ? "-" : ""
  const a = Math.abs(n)
  if (a >= 1e9) return sign + (a / 1e9).toFixed(2) + " tỷ"
  if (a >= 1e6) return sign + (a / 1e6).toFixed(1) + " tr"
  if (a >= 1e3) return sign + (a / 1e3).toFixed(0) + "K"
  return sign + Math.round(a).toString()
}

// Get date range based on filter key.
// IMPORTANT: all Date math is done in UTC to avoid the browser-local-timezone
// bug where `new Date("2026-04-09T00:00:00")` in a UTC+7 browser becomes
// 2026-04-08T17:00Z, causing .toISOString() to return the wrong day.
function getDateRange(filterKey, customRange) {
  const today = new Date(TODAY + "T00:00:00Z")  // parse as UTC, not local
  if (filterKey === "custom") {
    const s = customRange && customRange.start
    const e = customRange && customRange.end
    if (!s || !e) {
      // Default: last 7 days khi chưa chọn
      const start = new Date(today); start.setUTCDate(start.getUTCDate() - 6)
      return { start: start.toISOString().slice(0, 10), end: TODAY }
    }
    // Swap nếu user nhập end < start
    return { start: s <= e ? s : e, end: s <= e ? e : s }
  }
  if (filterKey === "today") {
    return { start: TODAY, end: TODAY }
  }
  if (filterKey === "yesterday") {
    const y = new Date(today); y.setUTCDate(y.getUTCDate() - 1)
    const ys = y.toISOString().slice(0, 10)
    return { start: ys, end: ys }
  }
  if (filterKey === "lastweek") {
    // Tuần trước: thứ 2 → chủ nhật của tuần liền trước (theo lịch ISO, tính ở UTC)
    const dow = today.getUTCDay() // 0=CN, 1=T2, ..., 6=T7
    const toMon = (dow === 0 ? 6 : dow - 1)
    const monThis = new Date(today); monThis.setUTCDate(monThis.getUTCDate() - toMon)
    const monLast = new Date(monThis); monLast.setUTCDate(monLast.getUTCDate() - 7)
    const sunLast = new Date(monLast); sunLast.setUTCDate(sunLast.getUTCDate() + 6)
    return { start: monLast.toISOString().slice(0, 10), end: sunLast.toISOString().slice(0, 10) }
  }
  if (filterKey === "thismonth") {
    // Ngày 1 của tháng hiện tại → hôm nay
    const y = today.getUTCFullYear(), m = today.getUTCMonth()
    const first = new Date(Date.UTC(y, m, 1))
    return { start: first.toISOString().slice(0, 10), end: TODAY }
  }
  if (filterKey === "lastmonth") {
    // Ngày 1 đến ngày cuối của tháng trước
    const y = today.getUTCFullYear(), m = today.getUTCMonth()
    const first = new Date(Date.UTC(y, m - 1, 1))
    const last  = new Date(Date.UTC(y, m, 0))  // day 0 của tháng này = ngày cuối tháng trước
    return { start: first.toISOString().slice(0, 10), end: last.toISOString().slice(0, 10) }
  }
  const f = TIME_FILTERS.find(f => f.key === filterKey)
  const start = new Date(today); start.setUTCDate(start.getUTCDate() - (f.days - 1))
  return { start: start.toISOString().slice(0, 10), end: TODAY }
}

// Filter daily array by date range
function filterDaily(daily, range) {
  return daily.filter(d => d.date >= range.start && d.date <= range.end)
}

// Sum daily metrics
function sumDaily(daily) {
  return daily.reduce((acc, d) => ({
    spend: acc.spend + (d.spend || 0),
    impressions: acc.impressions + (d.impressions || 0),
    clicks: acc.clicks + (d.clicks || 0),
    reach: acc.reach + (d.reach || 0),
    registrations: acc.registrations + (d.registrations || 0)
  }), { spend: 0, impressions: 0, clicks: 0, reach: 0, registrations: 0 })
}

// JS port của detect_profit_product() trong update_dashboard.py — PHẢI giữ đồng bộ.
function detectProfitProduct(name) {
  if (!name) return null
  let n = name.toLowerCase().replace(/_/g, " ").replace(/-/g, " ")
  n = n.split(/\s+/).filter(Boolean).join(" ")
  if (n.includes("da8.1 pro") || n.includes("da 8.1 pro") || n.includes("da8 1 pro")) return "DA8.1 Pro"
  if (n.includes("da8.1") || n.includes("da 8.1") || n.includes("da8 1")) return "DA8.1"
  if (n.includes("noma 922") || n.includes("noma922")) return "Noma 922"
  if (n.includes("noma 911") || n.includes("noma911")) return "Noma 911"
  if (n.includes("dr4 plus") || n.includes("dr4plus")) return "DR4 Plus"
  if (n.includes("dr1")) return "DR1"
  if (n.includes("dv1 pro") || n.includes("dv1pro")) return "DV1 Pro"
  if (n.includes("d1 pro") || n.includes("d1pro")) return "D1 Pro"
  if (n.includes("d8 pro") || n.includes("d8pro")) return "D8 Pro"
  for (const code of ["d1", "d2", "d3", "d4"]) {
    // Dùng non-lookbehind regex để tương thích Safari cũ
    const re = new RegExp(`(?:^|[^a-z0-9])${code}(?:[^a-z0-9]|$)`)
    if (re.test(n)) return code.toUpperCase()
  }
  return null
}

// Trả về danh sách campaign đã match đúng product cho staff + spend trong dateRange
function campaignsForProduct(product, adKeys, range) {
  const campaigns = (typeof DATA !== "undefined" ? DATA.campaigns : null) || []
  const adKeySet = new Set(adKeys)
  const rows = []
  campaigns.forEach(c => {
    const staff = ACCOUNT_STAFF[c.account_id]
    if (!adKeySet.has(staff)) return
    if (detectProfitProduct(c.name || "") !== product) return
    let spendInRange = 0
    ;(c.daily || []).forEach(d => {
      if (d.date >= range.start && d.date <= range.end) spendInRange += (d.spend || 0)
    })
    rows.push({
      id: c.id,
      name: c.name || "(không tên)",
      accountId: c.account_id,
      accountShort: accountShortLabel(c.account_id),
      staff,
      spend: spendInRange,
    })
  })
  rows.sort((a, b) => b.spend - a.spend)
  return rows
}

// Sum revenue of 1 product trong khoảng date range (inclusive)
function sumRevenueForProduct(adName, range) {
  const rev = (typeof DATA !== "undefined" ? DATA.revenue : null) || {}
  const products = rev.products || {}
  const revName = AD_TO_REV_NAME[adName] || adName
  const p = products[revName]
  if (!p || !p.by_date) return 0
  let total = 0
  for (const [date, amount] of Object.entries(p.by_date)) {
    if (date >= range.start && date <= range.end) total += amount || 0
  }
  return total

    for (const [date, amount] of Object.entries(p.by_date)) {
      if (date < range.start || date > range.end) continue
      map[date] = (map[date] || 0) + (amount || 0)
    }
  })
  return map
}

function CompareCard({ title, current, previous, isMoneyMetric, inverseGood }) {
  const delta = previous ? ((current - previous) / previous * 100) : (current > 0 ? 100 : 0)
  const good = inverseGood ? delta < 0 : delta > 0
  const fmt = isMoneyMetric ? (v) => fmtVND(v) + "₫" : fmtNum
  return (
    <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
      <p className="text-sm font-medium text-gray-500 mb-3">{title}</p>
      <div className="grid grid-cols-2 gap-4">
        <div>
          <p className="text-xs text-gray-400 uppercase">7 ngày gần nhất</p>
          <p className="text-2xl font-bold text-gray-900 mt-1">{fmt(current)}</p>
        </div>
        <div>
          <p className="text-xs text-gray-400 uppercase">7 ngày trước đó</p>
          <p className="text-2xl font-bold text-gray-500 mt-1">{fmt(previous)}</p>
        </div>
      </div>
      <div className={`mt-3 inline-flex items-center text-sm font-semibold px-3 py-1 rounded-full ${
        good ? "bg-emerald-50 text-emerald-700" : "bg-red-50 text-red-700"
      }`}>
        {delta >= 0 ? <TrendingUp className="w-4 h-4 mr-1" /> : <TrendingDown className="w-4 h-4 mr-1" />}
        {delta >= 0 ? "+" : ""}{delta.toFixed(1)}%
      </div>
    </div>
  )
}

function FacebookAdsDashboard() {
  const [currentView, setCurrentView] = useState("main")  // "main" | "competitors" | "ads-creator" | "agent-google"
  const [selectedAccount, setSelectedAccount] = useState("all")
  const [timeFilter, setTimeFilter] = useState("30d")
  // customRange — chỉ active khi timeFilter === "custom". Default 7 ngày gần nhất.
  const [customRange, setCustomRange] = useState(() => {
    const tod = new Date(TODAY + "T00:00:00Z")
    const start = new Date(tod); start.setUTCDate(start.getUTCDate() - 6)
    return { start: start.toISOString().slice(0, 10), end: TODAY }
  })
  // staffFilter — lift lên parent để cả RevenueBySourceBreakdown và RevenueStatusBreakdown cùng react
  // Giá trị: "ALL" / "DUY" / "PHUONG_NAM" / "WEBSITE_STAFF"
  const [staffFilter, setStaffFilter] = useState("ALL")

  const dateRange = useMemo(() => getDateRange(timeFilter, customRange), [timeFilter, customRange])

  // Filter accounts
  const accounts = DATA.accounts
  const filteredAccounts = selectedAccount === "all" ? accounts : accounts.filter(a => a.id === selectedAccount)

  // Aggregate KPIs based on time filter
  const kpis = useMemo(() => {
    let totals = { spend: 0, impressions: 0, clicks: 0, reach: 0, registrations: 0 }
    filteredAccounts.forEach(a => {
      const t = sumDaily(filterDaily(a.daily, dateRange))
      Object.keys(totals).forEach(k => totals[k] += t[k])
    })
    totals.cpl = totals.registrations ? totals.spend / totals.registrations : 0
    totals.ctr = totals.impressions ? (totals.clicks / totals.impressions * 100) : 0
    return totals
  }, [filteredAccounts, dateRange])

  // 7d vs 7d comparison (always last 7 vs prev 7, regardless of filter)
  const weekComp = useMemo(() => {
    const last7Range = getDateRange("7d")
    const today = new Date(TODAY + "T00:00:00Z")  // UTC — tránh shift timezone
    const prevStart = new Date(today); prevStart.setUTCDate(prevStart.getUTCDate() - 13)
    const prevEnd = new Date(today); prevEnd.setUTCDate(prevEnd.getUTCDate() - 7)
    const prevRange = { start: prevStart.toISOString().slice(0,10), end: prevEnd.toISOString().slice(0,10) }
    const sumAcrossAccounts = (range) => {
      let s = { spend: 0, registrations: 0 }
      filteredAccounts.forEach(a => {
        const t = sumDaily(filterDaily(a.daily, range))
        s.spend += t.spend
        s.registrations += t.registrations
      })
      return s
    }
    return { last: sumAcrossAccounts(last7Range), prev: sumAcrossAccounts(prevRange) }
  }, [filteredAccounts])

  // Products data filtered by time + account (account filter doesn't affect products since products span accounts)
  const productsData = useMemo(() => {
    const list = Object.entries(DATA.products).map(([name, daily]) => {
      // If account filter is active, recompute from campaigns
      let dailyFiltered
      if (selectedAccount === "all") {
        dailyFiltered = filterDaily(daily, dateRange)
      } else {
        // Aggregate from campaigns of this product in selected account
        const camps = DATA.campaigns.filter(c => c.product === name && c.account_id === selectedAccount)
        const map = {}
        camps.forEach(c => {
          c.daily.forEach(d => {
            if (!map[d.date]) map[d.date] = { date: d.date, spend: 0, registrations: 0, impressions: 0, clicks: 0 }
            map[d.date].spend += d.spend
            map[d.date].registrations += d.registrations
            map[d.date].impressions += d.impressions
            map[d.date].clicks += d.clicks
          })
        })
        const arr = Object.values(map).sort((a, b) => a.date.localeCompare(b.date))
        dailyFiltered = filterDaily(arr, dateRange)
      }
      const totals = sumDaily(dailyFiltered)
      // Doanh thu Pancake (theo product name đã map) trong cùng date range
      const revenue = sumRevenueForProduct(name, dateRange)
      const revByDate = revenueByDate([name], dateRange)
      const roas = totals.spend > 0 ? revenue / totals.spend : null
      return { name, daily: dailyFiltered, totals, revenue, revByDate, roas }
    }).filter(p => p.totals.spend > 0 || p.revenue > 0)
    return list
  }, [selectedAccount, dateRange])

  // Tổng doanh thu & ROAS toàn bộ (các product đang có spend hoặc revenue) — dùng cho per-product ROAS
  const revenueKpis = useMemo(() => {
    const total = productsData.reduce((s, p) => s + (p.revenue || 0), 0)
    const spend = productsData.reduce((s, p) => s + (p.totals.spend || 0), 0)
    return { total, roas: spend > 0 ? total / spend : null }
  }, [productsData])

  // ── KPI: TỔNG ĐƠN HÀNG + DOANH THU PANCAKE (THỰC THU, gộp cả 3 nhân sự / 5 nguồn) ──
  // - Tổng đơn   = sum(total_orders_by_date) trong dateRange (bất kể status)
  // - Doanh thu  = sum(order_revenue_by_status_by_date[status][date]) cho all status — dùng total_price
  //                Pancake (= cod + prepaid theo Pancake aggs), KHÔNG bó hẹp 6 SP chính.
  // - CIR        = spend / revenue (chi phí / doanh thu) — càng thấp càng tốt.
  const pancakeKpi = useMemo(() => {
    const rev = DATA.revenue || {}
    const inRange = (d) => d >= dateRange.start && d <= dateRange.end
    let totalOrders = 0
    Object.entries(rev.total_orders_by_date || {}).forEach(([d, c]) => { if (inRange(d)) totalOrders += c })
    let totalRevenue = 0
    const orderRev = rev.order_revenue_by_status_by_date || {}
    Object.values(orderRev).forEach(perDate => {
      Object.entries(perDate || {}).forEach(([d, v]) => { if (inRange(d)) totalRevenue += v })
    })
    return { totalOrders, totalRevenue }
  }, [dateRange])

  // Google Ads spend trong dateRange — gộp tất cả category
  const googleSpendInRange = useMemo(() => {
    const ga = (typeof DATA !== "undefined" ? DATA.google_ads : null) || { by_category: {} }
    const inRange = (d) => d >= dateRange.start && d <= dateRange.end
    let total = 0
    Object.values(ga.by_category || {}).forEach(bucket => {
      Object.entries(bucket.by_date || {}).forEach(([d, v]) => { if (inRange(d)) total += (v || 0) })
    })
    return total
  }, [dateRange])

  // (Trước đây có useMemo `revenueByStatus` ở đây — đã chuyển logic vào RevenueStatusBreakdown
  //  để self-compute theo cả dateRange + staffFilter.)

  // Campaigns filtered by time + account
  const campaignsFiltered = useMemo(() => {
    const list = DATA.campaigns
      .filter(c => selectedAccount === "all" || c.account_id === selectedAccount)
      .map(c => {
        const daily = filterDaily(c.daily, dateRange)
        const t = sumDaily(daily)
        const cpl = t.registrations ? t.spend / t.registrations : null
        return { ...c, _daily: daily, _spend: t.spend, _reg: t.registrations, _clicks: t.clicks, _imp: t.impressions, _cpl: cpl }
      })

      })

  // Unified per-day dataset for product charts (one row per date, columns per product)

        {/* MAIN TAB NAVIGATION */}

              }`}
            >
              <BarChart3 /> Hiệu suất quảng cáo
            </button>
            <button

// Current time in Vietnam timezone (+07:00) formatted as "YYYY-MM-DDTHH:MM"
// for <input type="datetime-local"> default value.
function nowVnDatetime() {
  const now = new Date()
  const vn = new Date(now.getTime() + (now.getTimezoneOffset() + 7 * 60) * 60000)
  const y = vn.getFullYear()
  const m = String(vn.getMonth() + 1).padStart(2, "0")
  const d = String(vn.getDate()).padStart(2, "0")
  const hh = String(vn.getHours()).padStart(2, "0")
  const mm = String(vn.getMinutes()).padStart(2, "0")
  return `${y}-${m}-${d}T${hh}:${mm}`
}

    "QUALITY_CALL":                       "Cuộc gọi chất lượng",
    "POST_ENGAGEMENT":                    "Lượt tương tác với bài viết",
    "PAGE_LIKES":                         "Lượt thích trang",
    "EVENT_RESPONSES":                    "Phản hồi sự kiện",
    "LEAD_GENERATION":                    "Khách hàng tiềm năng",
    "OFFSITE_CONVERSIONS":                "Lượt chuyển đổi",
    "APP_INSTALLS":                       "Lượt cài đặt ứng dụng",
    "VALUE":                              "Giá trị",
  }

  const DESTINATION_LABELS = {
    "WEBSITE":            "Trang web",
    "APP":                "Ứng dụng",
    "MESSENGER":          "Messenger",
    "WHATSAPP":           "WhatsApp",
    "INSTAGRAM_DIRECT":   "Instagram Direct",
    "ON_AD":              "Trên quảng cáo (Form)",
    "ON_POST":            "Trên bài viết",
    "ON_PAGE":            "Trên trang",
    "ON_EVENT":           "Trên sự kiện",
    "ON_VIDEO":           "Trên video",
    "SHOP":               "Cửa hàng",
    "PHONE_CALL":         "Cuộc gọi",
    "APPLINKS_AUTOMATIC": "Deep Link tự động",
  }

  const BILLING_EVENTS = [
    { value: "IMPRESSIONS",     label: "Mỗi lần hiển thị (CPM)" },
    { value: "LINK_CLICKS",     label: "Mỗi lần nhấp liên kết (CPC)" },
    { value: "THRUPLAY",        label: "ThruPlay (video ≥15s)" },
    { value: "POST_ENGAGEMENT", label: "Mỗi lượt tương tác" },
  ]

  // ── Pixel Standard Events (hiển thị y hệt Ads Manager tiếng Việt) ──
  // User có thể chọn "Khác (custom)" và nhập tên event custom.
  const PIXEL_EVENTS = [
    { value: "PURCHASE",              label: "Lượt mua" },
    { value: "INITIATE_CHECKOUT",     label: "Bắt đầu thanh toán" },
    { value: "ADD_TO_CART",           label: "Thêm vào giỏ hàng" },
    { value: "ADD_PAYMENT_INFO",      label: "Thêm thông tin thanh toán" },
    { value: "ADD_TO_WISHLIST",       label: "Thêm vào danh sách yêu thích" },
    { value: "COMPLETE_REGISTRATION", label: "Hoàn tất đăng ký" },
    { value: "LEAD",                  label: "Khách hàng tiềm năng" },
    { value: "SUBSCRIBE",             label: "Đăng ký" },
    { value: "CONTACT",               label: "Liên hệ" },
    { value: "SUBMIT_APPLICATION",    label: "Gửi đơn đăng ký" },
    { value: "VIEW_CONTENT",          label: "Xem nội dung" },
    { value: "SEARCH",                label: "Tìm kiếm" },
    { value: "SCHEDULE",              label: "Đặt lịch" },
    { value: "START_TRIAL",           label: "Bắt đầu dùng thử" },
    { value: "CUSTOMIZE_PRODUCT",     label: "Tùy chỉnh sản phẩm" },
    { value: "FIND_LOCATION",         label: "Tìm địa điểm" },
    { value: "DONATE",                label: "Quyên góp" },
    { value: "OTHER",                 label: "Khác (nhập tên custom event)" },
  ]

  // ── Attribution Windows (Cài đặt ghi nhận) ──
  // API format: attribution_spec = [{event_type, window_days}]
  const ATTRIBUTION_PRESETS = [
    {
      value: "7d_click_1d_view",
      label: "Lượt click trong 7 ngày, lượt tương tác trong 1 ngày (Mặc định)",
      spec: [
        { event_type: "CLICK_THROUGH",       window_days: 7 },
        { event_type: "ENGAGED_VIDEO_VIEW",  window_days: 1 },
        { event_type: "VIEW_THROUGH",        window_days: 1 },
      ],
    },
    {
      value: "1d_click",
      label: "Lượt click trong 1 ngày",
      spec: [{ event_type: "CLICK_THROUGH", window_days: 1 }],
    },
    {
      value: "7d_click",
      label: "Lượt click trong 7 ngày",
      spec: [{ event_type: "CLICK_THROUGH", window_days: 7 }],
    },
    {
      value: "1d_click_1d_view",
      label: "Lượt click trong 1 ngày, lượt tương tác trong 1 ngày",
      spec: [
        { event_type: "CLICK_THROUGH", window_days: 1 },
        { event_type: "VIEW_THROUGH",  window_days: 1 },
      ],
    },
  ]

  const PACING_TYPES = [
    { value: "standard",  label: "Tiêu chuẩn (phân phối đều trong ngày)" },
    { value: "no_pacing", label: "Không giới hạn tốc độ (spend nhanh nhất có thể)" },
  ]

  const BUYING_TYPES = [
    { value: "AUCTION",  label: "Đấu giá (Auction)" },
    { value: "RESERVED", label: "Đặt trước (Reach & Frequency)" },
  ]

  const CTAS = [
    "LEARN_MORE", "SIGN_UP", "SHOP_NOW", "WATCH_MORE", "CONTACT_US",
    "SEND_MESSAGE", "GET_QUOTE", "CALL_NOW", "APPLY_NOW", "BOOK_TRAVEL",
    "DOWNLOAD", "GET_OFFER", "ORDER_NOW", "SUBSCRIBE", "GET_DIRECTIONS",
    "LIKE_PAGE", "INSTALL_MOBILE_APP", "USE_APP", "LISTEN_NOW",
  ]

  // Auto-fill defaults when product changes
  const handleProductChange = (p) => {
    setProduct(p)
    const cfg = PRODUCTS[p]
    if (cfg) {
      setPixel(cfg.pixel)
      setPage(cfg.page)
      setAccount(cfg.account)
    }
  }

  // Auto-set goal/dest/billing when objective changes
  const handleObjectiveChange = (obj) => {
    setObjective(obj)
    const goals = OBJECTIVE_GOALS[obj]
    if (goals && goals[0]) {
      setOptGoal(goals[0].goal)
      setDestType(goals[0].dest)
      // set default CTA for all ads
      setAds(curr => curr.map(a => ({ ...a, cta: goals[0].cta })))
    }
    setBillingEvent("IMPRESSIONS")
  }

  // Auto-set destination + CTA when optimization goal changes
  const handleGoalChange = (g) => {
    setOptGoal(g)
    const goals = OBJECTIVE_GOALS[objective] || []
    const match = goals.find(x => x.goal === g)
    if (match) {
      setDestType(match.dest)
      setAds(curr => curr.map(a => ({ ...a, cta: match.cta })))
    }
  }

  // ── Ad array operations ──
  const addAd = () => {
    setAds(curr => [...curr, makeEmptyAd(curr.length)])
  }

  const removeAd = (id) => {
    setAds(curr => curr.length > 1 ? curr.filter(a => a.id !== id) : curr)
  }

  const updateAd = (id, patch) => {
    setAds(curr => curr.map(a => a.id === id ? { ...a, ...patch } : a))
  }

  const handleVideoSelect = (id, e) => {
    const file = e.target.files[0]
    if (file) {
      updateAd(id, { videoFile: file, imageFile: null, mediaPreview: URL.createObjectURL(file) })
    }
  }

  const handleImageSelect = (id, e) => {
    const file = e.target.files[0]
    if (file) {
      updateAd(id, { imageFile: file, videoFile: null, mediaPreview: URL.createObjectURL(file) })
    }
  }

  // ── Build url_tags string for Meta adcreative.url_tags field ──
  // Format: "utm_source=X&utm_medium=Y&..." — Meta sẽ tự append vào mọi link click
  // Đây là field "Thông số URL" trong Ads Manager UI. Link đích được giữ nguyên.
  const buildUtmString = (ad) => {
    const params = new URLSearchParams()
    if (ad.utmSource)   params.set("utm_source",   ad.utmSource)
    if (ad.utmMedium)   params.set("utm_medium",   ad.utmMedium)
    if (ad.utmCampaign) params.set("utm_campaign", ad.utmCampaign)
    if (ad.utmContent)  params.set("utm_content",  ad.utmContent)
    if (ad.utmTerm)     params.set("utm_term",     ad.utmTerm)
    return params.toString()
  }

  // ── AI generate content for a specific ad ──
  const handleGenerateContent = async (targetAdId) => {
    setAiTargetAdId(targetAdId)
    setAiLoading(true)
    setAiError("")
    setAiVariants([])
    setAiSelectedId(null)
    try {
      const notes = [
        aiKeyword ? `Từ khóa chính phải có: ${aiKeyword}` : "",
        aiDirection ? `Hướng content: ${aiDirection}` : "",
      ].filter(Boolean).join(" | ")

      const res = await fetch("/api/generate-ad-copy", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          product,
          format: objective,
          formatLabel: (OBJECTIVES[objective] || {}).label || objective,
          cta: (ads.find(a => a.id === targetAdId) || {}).cta || "LEARN_MORE",
          notes,
          promotion: aiPromotion.trim(),
        }),
      })
      const data = await res.json()
      if (!res.ok || !data.variants) {
        throw new Error(data.error || "Lỗi không xác định")
      }
      setAiVariants(data.variants)
    } catch (err) {
      setAiError(err.message)
    } finally {
      setAiLoading(false)
    }
  }

  const handleUseVariant = (v) => {
    if (!aiTargetAdId) return
    updateAd(aiTargetAdId, { headline: v.headline || "", adCopy: v.primary_text || "" })
    setAiSelectedId(v.id)
  }

  // ── Build publish summary ──
  const buildSummary = () => {
    const today = new Date().toISOString().slice(0, 10)
    const objCfg = OBJECTIVES[objective]
    const finalCampaignName = campaignName || `${product} - ${objCfg.label} - ${today}`
    const finalAdsetName = adsetName || `${product} - AdSet - ${today}`

    return {
      campaign_name: finalCampaignName,
      adset_name: finalAdsetName,
      objective,
      objective_label: objCfg.label,
      buying_type: buyingType,
      account_id: account,
      account_name: ACCOUNTS[account] || account,
      page_id: page,
      page_name: (PAGES[page] || page),
      pixel_id: pixel,
      pixel_name: PIXELS[pixel] || pixel,
      optimization_goal: optGoal,
      optimization_goal_label: GOAL_LABELS[optGoal] || optGoal,
      destination_type: destType,
      billing_event: billingEvent,
      // Conversion event (chỉ apply khi optimization_goal = OFFSITE_CONVERSIONS)
      promoted_event: conversionEvent === "OTHER" ? (customEventName.trim() || null) : conversionEvent,
      promoted_event_label: conversionEvent === "OTHER"
        ? (customEventName || "(custom)")
        : ((PIXEL_EVENTS.find(e => e.value === conversionEvent) || {}).label || conversionEvent),
      // Attribution window spec
      attribution_spec: (ATTRIBUTION_PRESETS.find(p => p.value === attributionPreset) || {}).spec || null,
      attribution_label: (ATTRIBUTION_PRESETS.find(p => p.value === attributionPreset) || {}).label || "",
      // Pacing
      pacing_type: pacingType,
      launch_status: launchStatus, // "ACTIVE" | "PAUSED"
      budget_level: budgetLevel, // "campaign" (CBO) | "adset" (ABO)
      budget_type: budgetType,
      budget_amount: Number(budget),
      budget_display: `${Number(budget).toLocaleString("vi-VN")}đ ${budgetType === "daily" ? "/ngày" : "trọn đời"} (${budgetLevel === "campaign" ? "CBO" : "ABO"})`,
      start_time: startDate,
      end_time: endDate,
      // Targeting (Đối tượng) — gender, age, geo
      targeting: {
        geo_locations: { countries: countries.length ? countries : ["VN"] },
        age_min: Number(ageMin) || 18,
        age_max: Number(ageMax) || 65,
        ...(gender === "male" ? { genders: [1] } : gender === "female" ? { genders: [2] } : {}),
      },
      gender,
      gender_label: gender === "all" ? "Tất cả" : gender === "male" ? "Nam" : "Nữ",
      age_min: Number(ageMin) || 18,
      age_max: Number(ageMax) || 65,
      countries: countries.length ? countries : ["VN"],
      ads: ads.map((a, idx) => ({
        ad_name: a.adName || `${finalCampaignName} - Ad ${idx + 1}`,
        headline: a.headline,
        ad_copy: a.adCopy,
        cta: a.cta,
        // Link đích — GIỮ NGUYÊN, không append UTM
        link: a.link,
        // UTM đi vào field "Thông số URL" của Meta (adcreative.url_tags)
        url_tags: buildUtmString(a),
        utm: {
          source:   a.utmSource,
          medium:   a.utmMedium,
          campaign: a.utmCampaign,
          content:  a.utmContent,
          term:     a.utmTerm,
        },
        video_filename: a.videoFile?.name || null,
        image_filename: a.imageFile?.name || null,
      })),
      created_at: new Date().toISOString(),
    }
  }

  const handlePublish = () => {
    setStatus("ready")
    setStatusMsg(JSON.stringify(buildSummary(), null, 2))
  }

  const handleConfirm = async () => {
    setStatus("sending")
    const config = buildSummary()

    // Backup config to localStorage (safety net if endpoint fails)
    try {
      const pending = JSON.parse(localStorage.getItem("doscom_pending_ads") || "[]")
      pending.push(config)
      localStorage.setItem("doscom_pending_ads", JSON.stringify(pending))
    } catch(e) {}

    // ─── Step 1: Upload từng media qua /api/fb-upload-media ───
    // Tách step này ra để mỗi upload có 30s timeout riêng — không bị
    // Cloudflare cắt ở giữa lúc đợi FB xử lý video.
    try {
      for (let i = 0; i < ads.length; i++) {
        const a = ads[i]
        if (!a.videoFile && !a.imageFile) {
          throw new Error(`Ad #${i + 1} thiếu video hoặc ảnh`)
        }
        const file = a.videoFile || a.imageFile
        const kind = a.videoFile ? "video" : "image"
        setStatusMsg(`Đang upload ${kind} của Ad #${i + 1}/${ads.length}... ${kind === 'video' ? '(video cần ~10-25s để FB xử lý)' : ''}`)

        const fd = new FormData()
        fd.append("file", file, file.name)
        fd.append("account_id", config.account_id)
        fd.append("kind", kind)

        const res = await fetch("/api/fb-upload-media", { method: "POST", body: fd })
        const data = await res.json()
        if (!res.ok || !data.ok) {
          throw new Error(`[upload Ad #${i + 1} - ${data.step || '?'}] ${data.error || res.status}`)
        }
        // Inject media IDs vào config.ads[i]
        if (data.kind === "video") {
          config.ads[i].video_id = data.video_id
          config.ads[i].thumbnail_url = data.thumbnail_url
        } else {
          config.ads[i].image_hash = data.image_hash
        }
      }
    } catch (e) {
      setStatus("error")
      setStatusMsg(`Lỗi upload media: ${e.message}\n\nConfig đã backup vào localStorage. Đợi 30-60s rồi thử lại — video đã upload sẽ ready ở lần sau.`)
      return
    }

    // ─── Step 2: Tạo campaign + adset + ads với media IDs đã sẵn ───
    setStatusMsg("Đã upload xong media. Đang tạo campaign + adset + ads trên Meta Ads...")
    try {
      const fd2 = new FormData()
      fd2.append("config", JSON.stringify(config))
      // KHÔNG kèm file nữa — endpoint sẽ dùng video_id/image_hash trong config

      const res = await fetch("/api/create-campaign", { method: "POST", body: fd2 })
      const data = await res.json()
      if (!res.ok || !data.success) {
        const step = data.step || "unknown"
        const partialMsg = data.partial ? ` (đã tạo: ${JSON.stringify(data.partial)})` : ""
        throw new Error(`[${step}] ${data.error || "Lỗi không xác định"}${partialMsg}`)
      }
      setStatus("done")
      setStatusMsg(JSON.stringify({
        ok: true,
        campaign_id: data.campaign_id,
        adset_id: data.adset_id,
        ads_created: (data.ads || []).length,
        open_in_ads_manager: data.ads_manager_url,
      }, null, 2))
    } catch (e) {
      setStatus("error")
      setStatusMsg(`Lỗi: ${e.message}\n\nConfig đã backup vào localStorage — có thể paste vào chat Claude để tạo bằng tay.`)
    }
  }

  // Initialize defaults
  React.useEffect(() => { handleProductChange("D1") }, [])

  // ── Validations ──
  const allAdsHaveContent = ads.every(a => a.headline && a.adCopy)
  const canPublish = allAdsHaveContent

  const selectClass = "w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white"
  const inputClass = "w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
  const labelClass = "block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5"
  const sectionHeaderClass = "flex items-center gap-3 mb-5 pb-3 border-b-2"

  // ── Render ──
  return (
    <div className="space-y-6">
      {/* HEADER */}
      <div className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-xl p-6 text-white">
        <h2 className="text-xl font-bold flex items-center gap-2"><Megaphone /> Tạo Quảng Cáo Facebook</h2>
        <p className="text-blue-100 text-sm mt-1">Cấu hình theo đúng cấu trúc: Chiến dịch → Nhóm quảng cáo → Quảng cáo</p>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        {/* LEFT 2 COLUMNS — Main form (stacked sections) */}
        <div className="lg:col-span-2 space-y-6">

          {/* ═══════════════ SECTION 1: CHIẾN DỊCH ═══════════════ */}
          <div className="bg-white rounded-xl border-2 border-blue-200 p-5 shadow-sm">
            <div className={sectionHeaderClass + " border-blue-500"}>
              <div className="w-10 h-10 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold text-lg">1</div>
              <div>
                <h3 className="text-base font-bold text-blue-900">Chiến dịch (Campaign)</h3>
                <p className="text-xs text-gray-500 mt-0.5">Cấu hình cấp chiến dịch: mục tiêu, loại hình mua</p>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="md:col-span-2">
                <label className={labelClass}>Sản phẩm</label>
                <select value={product} onChange={e => handleProductChange(e.target.value)} className={selectClass}>
                  {Object.keys(PRODUCTS).map(p => <option key={p} value={p}>{p}</option>)}
                </select>
              </div>

              <div className="md:col-span-2">
                <label className={labelClass}>Đặt tên chiến dịch</label>
                <input
                  type="text"
                  value={campaignName}
                  onChange={e => setCampaignName(e.target.value)}
                  className={inputClass}
                  placeholder={`VD: ${product} - ${(OBJECTIVES[objective] || {}).label || "Leads"} - ${new Date().toISOString().slice(0,10)}`}
                />
                <p className="text-xs text-gray-400 mt-1">Để trống sẽ tự đặt: {`${product} - ${(OBJECTIVES[objective] || {}).label || ""} - ${new Date().toISOString().slice(0,10)}`}</p>
              </div>

              <div className="md:col-span-2">
                <label className={labelClass}>Mục tiêu chiến dịch</label>
                <select value={objective} onChange={e => handleObjectiveChange(e.target.value)} className={selectClass}>
                  {Object.entries(OBJECTIVES).map(([key, cfg]) => (
                    <option key={key} value={key}>{cfg.label}</option>
                  ))}
                </select>
                <p className="text-xs text-gray-500 mt-1">{(OBJECTIVES[objective] || {}).desc} <span className="text-gray-400">· API: {objective}</span></p>
              </div>

              <div className="md:col-span-2">
                <div className="flex items-center justify-between mb-1.5">
                  <label className="text-xs font-semibold text-gray-600 uppercase tracking-wide">Loại hình mua (Buying Type)</label>
                  <button type="button" onClick={() => setShowBuyingInfo(!showBuyingInfo)} className="text-xs text-blue-600 hover:underline">
                    {showBuyingInfo ? "Ẩn giải thích" : "ℹ️ Giải thích"}
                  </button>
                </div>
                <select value={buyingType} onChange={e => setBuyingType(e.target.value)} className={selectClass}>
                  {BUYING_TYPES.map(b => <option key={b.value} value={b.value}>{b.label}</option>)}
                </select>
                {showBuyingInfo && (
                  <div className="mt-2 bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-gray-700 space-y-2">
                    <div>
                      <p className="font-bold text-blue-900">Đấu giá (AUCTION)</p>
                      <p>Cách mua mặc định trên Meta — hệ thống tự đấu giá với advertiser khác để giành placement.</p>
                      <p className="text-gray-600">• Linh hoạt: tạm dừng/chỉnh sửa bất kỳ lúc nào</p>
                      <p className="text-gray-600">• Ngân sách tùy ý</p>
                      <p className="text-gray-600">• Dùng cho mọi objective</p>
                      <p className="font-semibold text-blue-700">→ Dùng cho 99% trường hợp.</p>
                    </div>
                    <div>
                      <p className="font-bold text-blue-900">Đặt trước (RESERVED)</p>
                      <p>Đặt trước inventory với giá + số impression cố định.</p>
                      <p className="text-gray-600">• Chỉ áp dụng cho Reach & Frequency, TopView</p>
                      <p className="text-gray-600">• Cần booking trước, không hoàn tiền</p>
                      <p className="text-gray-600">• Đảm bảo reach chính xác</p>
                      <p className="font-semibold text-blue-700">→ Dùng cho campaign brand awareness lớn (launch sản phẩm, TVC).</p>
                    </div>
                  </div>
                )}
              </div>

              {/* BUDGET LEVEL TOGGLE — CBO vs ABO */}
              <div className="md:col-span-2">
                <label className={labelClass}>Cấp ngân sách (Budget Level)</label>
                <div className="flex gap-2">
                  <button
                    type="button"
                    onClick={() => setBudgetLevel("campaign")}
                    className={`flex-1 py-2.5 text-xs font-semibold rounded-lg border transition ${budgetLevel === "campaign" ? "bg-blue-50 border-blue-500 text-blue-700" : "bg-white border-gray-300 text-gray-500"}`}
                  >
                    Ngân sách chiến dịch (CBO)
                  </button>
                  <button
                    type="button"
                    onClick={() => setBudgetLevel("adset")}
                    className={`flex-1 py-2.5 text-xs font-semibold rounded-lg border transition ${budgetLevel === "adset" ? "bg-blue-50 border-blue-500 text-blue-700" : "bg-white border-gray-300 text-gray-500"}`}
                  >

                <button
                  type="button"

            {/* PUBLISH BUTTON */}

              type="button"

                    ? "bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 active:scale-[0.98]"

            >
              <Megaphone /> Tạo chiến dịch ({ads.length} ads) {launchStatus === "ACTIVE" ? "— Bật ngay" : "— Tạm dừng"}
            </button>

            {!canPublish && (
              <p className="text-xs text-gray-400 text-center mt-2">Điền tiêu đề & nội dung cho tất cả các ad</p>
            )}

            {/* STATUS */}
            {status === "ready" && (
              <div className="mt-3 bg-amber-50 border border-amber-200 rounded-xl p-3">
                <p className="text-xs font-semibold text-amber-800 mb-2">Xác nhận tạo chiến dịch?</p>
                <pre className="text-[10px] bg-white p-2 rounded border border-amber-100 overflow-auto max-h-40 whitespace-pre-wrap">{statusMsg}</pre>
                <div className="flex gap-2 mt-2">
                  <button onClick={handleConfirm} className="flex-1 bg-blue-600 text-white py-2 rounded-lg text-xs font-semibold hover:bg-blue-700">Xác nhận & Gửi</button>
                  <button onClick={() => setStatus(null)} className="flex-1 bg-gray-100 text-gray-600 py-2 rounded-lg text-xs font-semibold hover:bg-gray-200">Hủy</button>
                </div>
              </div>
            )}
            {status === "sending" && (
              <div className="mt-3 bg-blue-50 border border-blue-200 rounded-xl p-3 text-center">
                <div className="animate-spin inline-block w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full mb-1"></div>
                <p className="text-xs text-blue-700">{statusMsg}</p>

              let parsed = null
              try { parsed = JSON.parse(statusMsg) } catch(e) {}
              return (
                <div className="mt-3 bg-green-50 border border-green-200 rounded-xl p-3">
                  <p className="text-xs font-semibold text-green-800 mb-2">✅ Đã tạo thành công trên Meta!</p>
                  {parsed ? (
                    <div className="space-y-1 text-[11px] text-green-700">
                      <p><span className="text-green-500">Campaign:</span> <span className="font-mono">{parsed.campaign_id}</span></p>
                      <p><span className="text-green-500">AdSet:</span> <span className="font-mono">{parsed.adset_id}</span></p>
                      <p><span className="text-green-500">Ads tạo:</span> {parsed.ads_created}</p>
                      {parsed.open_in_ads_manager && (
                        <a href={parsed.open_in_ads_manager} target="_blank" rel="noreferrer" className="block mt-2 text-center bg-blue-600 text-white py-2 rounded-lg text-xs font-semibold hover:bg-blue-700">
                          Mở trong Ads Manager →
                        </a>
                      )}
                    </div>
                  ) : (
                    <pre className="text-[10px] whitespace-pre-wrap text-green-600">{statusMsg}</pre>
                  )}
                  <button onClick={() => { setStatus(null); setAds([makeEmptyAd(0)]); setCampaignName(""); setAdsetName("") }} className="mt-2 w-full bg-green-600 text-white py-2 rounded-lg text-xs font-semibold hover:bg-green-700">
                    Tạo chiến dịch mới
                  </button>
                </div>
              )
            })()}
            {status === "error" && (
              <div className="mt-3 bg-red-50 border border-red-200 rounded-xl p-3">
                <p className="text-xs font-semibold text-red-800 mb-1">❌ Tạo chiến dịch thất bại</p>
                <pre className="text-[10px] whitespace-pre-wrap text-red-700 max-h-60 overflow-auto">{statusMsg}</pre>
                <button onClick={() => setStatus(null)} className="mt-2 w-full bg-gray-200 text-gray-700 py-2 rounded-lg text-xs font-semibold hover:bg-gray-300">
                  Thử lại
                </button>
              </div>
            )}
          </div>

          {/* INSTRUCTIONS */}
          <div className="bg-gray-50 rounded-xl p-4 border border-gray-200">
            <h4 className="text-xs font-bold text-gray-600 uppercase mb-2">Quy trình</h4>
            <div className="space-y-1.5 text-xs text-gray-500">
              <p><span className="font-bold text-gray-700">1.</span> Điền 3 mục: Chiến dịch → Nhóm QC → Quảng cáo</p>
              <p><span className="font-bold text-gray-700">2.</span> "Tạo thêm quảng cáo" để thêm ad vào cùng 1 nhóm</p>
              <p><span className="font-bold text-gray-700">3.</span> Ấn "Tạo chiến dịch" → Xác nhận & Gửi</p>
              <p><span className="font-bold text-gray-700">4.</span> Hệ thống tự upload media + tạo Campaign/AdSet/Ad (PAUSED) qua Meta API</p>
              <p><span className="font-bold text-gray-700">5.</span> Review trên Ads Manager → Bật ACTIVE</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  )
}

// SUB-COMPONENT: Competitor Research (Chrome-scraped data)
// =============================================================
function CompetitorResearch() {
  const [radarProduct, setRadarProduct] = useState("Noma911")
  const [radarData, setRadarData] = useState(null)
  const [radarLoading, setRadarLoading] = useState(false)
  const [radarError, setRadarError] = useState(null)

  const PRODUCTS = ["Máy dò D1", "DR1", "Noma911", "Da8.1", "Da8.1 Pro"]

  // Fetch radar data from static JSON file
  const fetchRadar = () => {
    setRadarLoading(true)
    setRadarError(null)
    fetch("/data/radar-latest.json")
      .then(r => r.json())
      .then(d => {
        if (!d.reports || d.reports.length === 0) { setRadarData(null); setRadarLoading(false); return }
        const match = d.reports.find(r => r.product === radarProduct)
        setRadarData(match || d.reports[0])
        setRadarLoading(false)
      })
      .catch(e => { setRadarError(e.message); setRadarLoading(false) })
  }

  React.useEffect(() => { fetchRadar() }, [radarProduct])

  // Open Cowork with pre-built prompt
  const openCoworkAnalysis = () => {
    const prompt = encodeURIComponent(
      `Chạy skill competitor-radar cho sản phẩm "${radarProduct}". Chạy ngay, không hỏi thêm.`
    )
    window.open(`https://claude.ai/new?q=${prompt}`, "_blank")
  }

  return (
    <div>
      {/* RADAR AI PANEL */}
      <div className="mb-6 bg-gradient-to-r from-purple-50 to-blue-50 rounded-xl border border-purple-200 p-5 shadow-sm">
        <div className="flex flex-wrap items-center justify-between gap-4 mb-4">
          <div>
            <h3 className="font-bold text-gray-900 text-lg flex items-center gap-2">
              🛰️ Radar AI — Phân tích đối thủ
            </h3>
            <p className="text-xs text-gray-600 mt-1">Chọn sản phẩm → Bấm phân tích → Claude sẽ tìm kiếm & đẩy kết quả về đây</p>
          </div>
          <div className="flex items-center gap-3">
            <select
              value={radarProduct}
              onChange={e => setRadarProduct(e.target.value)}
              className="px-4 py-2.5 rounded-lg border border-gray-300 bg-white text-sm font-medium text-gray-700 focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
            >
              {PRODUCTS.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
            <button
              onClick={openCoworkAnalysis}
              className="px-5 py-2.5 rounded-lg bg-purple-600 text-white text-sm font-semibold hover:bg-purple-700 transition shadow-md flex items-center gap-2"
            >
              🔍 Phân tích đối thủ
            </button>
            <button
              onClick={fetchRadar}
              className="px-3 py-2.5 rounded-lg bg-white border border-gray-300 text-sm text-gray-600 hover:bg-gray-50 transition"
              title="Tải lại kết quả"
            >
              🔄
            </button>
          </div>
        </div>

        {/* Radar Results */}
        {radarLoading && (
          <div className="text-center py-8 text-gray-500 text-sm">⏳ Đang tải dữ liệu radar...</div>
        )}
        {radarError && (
          <div className="p-3 rounded-lg bg-red-50 border border-red-200 text-xs text-red-800">
            ⚠️ Lỗi: {radarError}. KV có thể chưa được setup — xem hướng dẫn bên dưới.
          </div>
        )}
        {!radarLoading && !radarError && !radarData && (
          <div className="text-center py-8 border-2 border-dashed border-purple-200 rounded-lg bg-white/50">
            <div className="text-4xl mb-2">🛰️</div>
            <p className="text-sm text-gray-600">Chưa có dữ liệu radar cho <strong>{radarProduct}</strong></p>
            <p className="text-xs text-gray-400 mt-1">Bấm "Phân tích đối thủ" để bắt đầu — kết quả sẽ hiển thị tại đây</p>
          </div>
        )}
        {!radarLoading && radarData && <RadarResultPanel data={radarData} />}
      </div>

      {/* Known Competitors section removed */}
    </div>
  )
}

            )}
            {data.actions.strategy_30_days && (
              <div className="p-3 rounded-lg bg-purple-50 border border-purple-200">
                <div className="font-bold text-purple-800 text-xs mb-2">🎯 Chiến lược 30 ngày</div>
                {data.actions.strategy_30_days.map((a, i) => (
                  <div key={i} className="text-xs text-purple-700 mb-1 flex items-start gap-1"><span className="font-bold">{i+1}.</span> {a}</div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* CEO Decision (v5.0) */}
      {data.ceo_decision && (
        <div className="p-4 border-b border-gray-100">
          <h5 className="font-semibold text-gray-800 mb-3">👔 Quyết định đề xuất CEO</h5>
          <div className="p-4 rounded-lg bg-indigo-50 border border-indigo-200">
            <div className="font-bold text-indigo-900 text-sm mb-2">Ưu tiên #1: {data.ceo_decision.priority}</div>
            <div className="text-xs text-indigo-700 mb-2"><strong>Lý do:</strong> {data.ceo_decision.reason}</div>
            {data.ceo_decision.action_steps && (
              <div className="text-xs text-indigo-700 mb-2">
                <strong>Hành động:</strong>
                {data.ceo_decision.action_steps.map((s, i) => (
                  <span key={i}> {i+1}. {s}{i < data.ceo_decision.action_steps.length - 1 ? " →" : ""}</span>
                ))}
              </div>
            )}
            <div className="text-xs text-indigo-600">
              <strong>Team:</strong> {data.ceo_decision.team} · <strong>Deadline:</strong> {data.ceo_decision.deadline}
            </div>
            {data.ceo_decision.risk_and_mitigation && (
              <div className="text-xs text-amber-700 mt-2 p-2 bg-amber-50 rounded">⚠️ {data.ceo_decision.risk_and_mitigation}</div>
            )}
          </div>
        </div>
      )}

      {/* Recommendations (legacy + v5.0) */}
      {data.recommendations && data.recommendations.length > 0 && (
        <div className="p-4">
          <h5 className="font-semibold text-gray-800 mb-3 flex items-center gap-2">📋 Đề xuất tổng hợp</h5>
          <div className="space-y-2">
            {data.recommendations.map((r, i) => (
              <div key={i} className="flex items-start gap-2 text-sm text-gray-700">
                <span className="flex-shrink-0 w-5 h-5 rounded-full bg-purple-100 text-purple-700 text-xs font-bold flex items-center justify-center mt-0.5">{i + 1}</span>
                {r}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Legacy: Summary (for old data without ceo_summary) */}
      {!data.ceo_summary && data.summary && (
        <div className="px-4 py-3 bg-blue-50 border-b border-blue-100 text-sm text-blue-900">
          💡 {data.summary}
        </div>
      )}
    </div>
  )
}
// =============================================================
// SUB-COMPONENT: Revenue breakdown theo NHÂN SỰ (3 nhóm)
//   Nhân sự Duy        = nguồn DUY (saved filter 8350fe1d…)
//   Nhân sự Phương Nam = nguồn PHUONG_NAM (saved filter 78a874c7…)
//   WEBSITE            = WEBSITE + ZALO_OA + HOTLINE (gộp)
// =============================================================
// =============================================================
// SUB-COMPONENT: Profit Breakdown — hiện khi user click 1 nhân sự (staffFilter != ALL)
// Công thức: LN = Doanh thu − (DT × 10% VAT) − Ad spend − (Giá nhập × SL bán)
// Mặc định tính trên đơn ĐÃ GIAO (delivered) — đơn khác không có LN thực.
// =============================================================
function ProfitBreakdown({ staffKey, dateRange, onClose }) {
  // Hiện cho mọi staffKey — bao gồm ALL (team ads) và từng nhân sự.
  const revenue = (typeof DATA !== "undefined" ? DATA.revenue : null) || {}
  const groups = revenue.source_groups || {}
  const adSpendByStaff = (typeof DATA !== "undefined" ? DATA.ad_spend_by_staff : null) || {}
  const productCosts = (typeof DATA !== "undefined" ? DATA.product_costs : null) || {}
  // Modal state: null | { mode: "product"|"unassigned", product?: string }
  const [campModal, setCampModal] = useState(null)
  const PRODUCTS = (typeof DATA !== "undefined" && DATA.profit_products) ? DATA.profit_products : [
    "D1", "D1 Pro", "D2", "D3", "D4", "D8 Pro",
    "DR1", "DR4 Plus",
    "DV1 Pro",
    "DA8.1", "DA8.1 Pro",
    "Noma 911", "Noma 922",
  ]

  const STAFF_MAP = {
    // Team Ads FB — chỉ gộp 2 nguồn chạy FB Ads, không gộp Website/Zalo/Hotline (đó là kênh khác).
    "ALL":           { label: "Team Ads FB",   sources: ["DUY", "PHUONG_NAM"],                                  adKeys: ["DUY", "PHUONG_NAM"], color: { bg: "bg-red-50",     border: "border-red-300" },     showCloseBtn: false },
    "DUY":           { label: "Duy",           sources: ["DUY"],                                                adKeys: ["DUY"],               color: { bg: "bg-blue-50",    border: "border-blue-300" },    showCloseBtn: true },
    "PHUONG_NAM":    { label: "Phương Nam",    sources: ["PHUONG_NAM"],                                         adKeys: ["PHUONG_NAM"],        color: { bg: "bg-purple-50",  border: "border-purple-300" },  showCloseBtn: true },
    // WEBSITE — component riêng (GoogleAdsProfit) với rows theo category + spend Google Ads
    "WEBSITE_STAFF": { label: "Google Ads — Website",       sources: ["WEBSITE"],                               adKeys: ["GOOGLE"],            color: { bg: "bg-emerald-50", border: "border-emerald-300" }, showCloseBtn: true, isGoogleAds: true },
    // Đơn organic từ Messenger inbox của page (nguồn -1) — không có ad spend trực tiếp, LN = revenue − VAT − COGS.
    "FB_PAGE":       { label: "Page Facebook",  sources: ["FB_PAGE"],                                            adKeys: [],                    color: { bg: "bg-pink-50",    border: "border-pink-300" },    showCloseBtn: true },
  }
  const staff = STAFF_MAP[staffKey || "ALL"]
  if (!staff) return null

  // Khi staff là Google Ads / Website → render component riêng với rows theo category
  if (staff.isGoogleAds) {
    return <GoogleAdsProfit dateRange={dateRange} onClose={onClose} />
  }

  const isInRange = (ymd) => {
    if (!dateRange?.start || !dateRange?.end) return true
    return ymd >= dateRange.start && ymd <= dateRange.end
  }

  const VAT_RATE = 0.10

  // Helper: compute rows cho 1 tập status.
  // Ad spend dùng CHUNG cho cả 2 bảng (chi phí thật sự đã tiêu, không phân biệt đơn có hoàn hay không).
  const computeRows = (STATUSES_KEEP) => {
    const rows = PRODUCTS.map(p => {
      let revenueP = 0
      let unitsP = 0
      let ordersP = 0
      staff.sources.forEach(srcKey => {
        const g = groups[srcKey]
        if (!g) return
        STATUSES_KEEP.forEach(stKey => {
          const pData = g.products_by_status?.[stKey]?.[p]
          if (!pData) return
          Object.entries(pData.by_date || {}).forEach(([d, v]) => {
            if (isInRange(d)) revenueP += (v || 0)
          })
          if (pData.units_by_date) {
            Object.entries(pData.units_by_date).forEach(([d, u]) => {
              if (isInRange(d)) unitsP += (u || 0)
            })
          } else if (pData.units && pData.total > 0) {
            const inRangeRev = Object.entries(pData.by_date || {})
              .filter(([d]) => isInRange(d))
              .reduce((s, [, v]) => s + (v || 0), 0)
            const ratio = pData.total > 0 ? inRangeRev / pData.total : 0
            unitsP += Math.round((pData.units || 0) * ratio)
          }
          if (pData.orders_by_date) {
            Object.entries(pData.orders_by_date).forEach(([d, c]) => {
              if (isInRange(d)) ordersP += (c || 0)
            })
          }
        })
      })

      // Ad spend — gộp qua tất cả adKeys của staff (ALL = DUY + PHUONG_NAM).
      let adSpendP = 0
      staff.adKeys.forEach(adKey => {
        const bucket = adSpendByStaff[adKey] && adSpendByStaff[adKey][p]
        if (!bucket) return
        Object.entries(bucket.by_date || {}).forEach(([d, v]) => {
          if (isInRange(d)) adSpendP += (v || 0)
        })
      })

      const costEntry = productCosts[p] || {}
      const costPerUnit = Number(costEntry.gia_nhap_vnd) || 0

      const vat = revenueP * VAT_RATE
      const totalCost = costPerUnit * unitsP
      const profit = revenueP - vat - adSpendP - totalCost
      const margin = revenueP > 0 ? (profit / revenueP) * 100 : null

      return {
        product: p,
        units: unitsP,
        orders: ordersP,
        revenue: revenueP,
        vat,
        adSpend: adSpendP,
        costPerUnit,
        totalCost,
        profit,
        margin,
        missingCost: !costPerUnit,
      }
    })

    const tot = rows.reduce((a, r) => ({
      revenue: a.revenue + r.revenue,
      vat: a.vat + r.vat,
      adSpend: a.adSpend + r.adSpend,
      totalCost: a.totalCost + r.totalCost,
      profit: a.profit + r.profit,
      units: a.units + r.units,
      orders: a.orders + r.orders,
    }), { revenue: 0, vat: 0, adSpend: 0, totalCost: 0, profit: 0, units: 0, orders: 0 })
    const totMargin = tot.revenue > 0 ? (tot.profit / tot.revenue) * 100 : null
    return { rows, tot, totMargin }
  }

  // TRƯỚC HOÀN: gồm delivered + returning + other + returned (đơn đã từng bán, CHƯA trừ hoàn) · loại canceled
  const beforeReturns = computeRows(["delivered", "returning", "other", "returned"])
  // SAU HOÀN: khớp Pancake POS — chỉ giữ delivered + other (đơn đã giao + đơn đang xử lý)
  // Loại returning (đang hoàn) + returned (đã hoàn) + canceled (đã hủy). Match RevenueByStaffBreakdown.
  const afterReturns  = computeRows(["delivered", "other"])

  const lossByReturns = beforeReturns.tot.profit - afterReturns.tot.profit

  // Unassigned campaigns (tên không match 13 PROFIT_PRODUCTS) — để debug
  const unassignedRows = staff.adKeys.length > 0 ? unassignedCampaigns(staff.adKeys, dateRange) : []
  const unassignedTotal = unassignedRows.reduce((s, r) => s + r.spend, 0)

  const renderTable = (data) => (
    <div className="overflow-x-auto bg-white rounded-lg border border-gray-200 mb-2">
      <table className="w-full text-xs">
        <thead>
          <tr className="bg-gray-50 border-b-2 border-gray-200 text-gray-700">
            <th className="py-2 px-3 text-left font-semibold">Sản phẩm</th>
            <th className="py-2 px-3 text-right font-semibold">SL bán</th>
            <th className="py-2 px-3 text-right font-semibold">Đơn</th>
            <th className="py-2 px-3 text-right font-semibold">Doanh thu</th>
            <th className="py-2 px-3 text-right font-semibold text-amber-700">VAT 10%</th>
            <th className="py-2 px-3 text-right font-semibold text-blue-700">Ad spend</th>
            <th className="py-2 px-3 text-right font-semibold">Giá nhập/cái</th>
            <th className="py-2 px-3 text-right font-semibold">Σ Giá nhập</th>
            <th className="py-2 px-3 text-right font-bold border-l border-gray-300">LỢI NHUẬN</th>
            <th className="py-2 px-3 text-right font-semibold">Biên LN</th>
          </tr>
        </thead>
        <tbody>
          {data.rows.filter(r => {
            // Khi xem cá nhân (DUY / PHUONG_NAM) → ẩn SP người đó không chạy QC + không có doanh thu
            // Khi xem Team Ads (ALL) → vẫn giữ đủ 13 SP để thấy toàn cảnh
            const isIndividual = staffKey && staffKey !== "ALL"
            if (!isIndividual) return true
            return r.revenue > 0 || r.adSpend > 0 || r.units > 0 || r.orders > 0
          }).map(r => {
            const hasData = r.revenue > 0 || r.adSpend > 0
            return (
              <tr key={r.product} className={`border-b border-gray-100 ${hasData ? "" : "opacity-50"} hover:bg-gray-50/60`}>
                <td className="py-2 px-3 font-semibold text-gray-900">
                  <span className="inline-flex items-center gap-1.5">
                    {r.product}
                    {staff.adKeys.length > 0 && (
                      <button
                        onClick={() => setCampModal({ mode: "product", product: r.product })}
                        className="text-[9px] px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 font-bold hover:bg-blue-600 hover:text-white border border-blue-300 tracking-wider"
                        title={`Xem campaign match ${r.product} trong range`}
                      >
                        CAMP
                      </button>
                    )}
                  </span>
                  {r.missingCost && <span className="ml-2 text-[10px] text-red-600 font-medium" title="Giá nhập chưa có trong xlsx">⚠ thiếu giá nhập</span>}
                </td>
                <td className="py-2 px-3 text-right text-gray-800">{r.units > 0 ? fmtNum(r.units) : "—"}</td>
                <td className="py-2 px-3 text-right text-gray-600">{r.orders > 0 ? fmtNum(r.orders) : "—"}</td>
                <td className="py-2 px-3 text-right font-semibold text-gray-900">{r.revenue > 0 ? fmtVNDFull(r.revenue) + "₫" : "—"}</td>
                <td className="py-2 px-3 text-right text-amber-700">{r.vat > 0 ? "-" + fmtVNDFull(r.vat) + "₫" : "—"}</td>
                <td className="py-2 px-3 text-right text-blue-700">{r.adSpend > 0 ? "-" + fmtVNDFull(r.adSpend) + "₫" : "—"}</td>
                <td className="py-2 px-3 text-right text-gray-600">{r.costPerUnit > 0 ? fmtVNDFull(r.costPerUnit) + "₫" : "—"}</td>
                <td className="py-2 px-3 text-right text-gray-700">{r.totalCost > 0 ? "-" + fmtVNDFull(r.totalCost) + "₫" : "—"}</td>
                <td className={`py-2 px-3 text-right font-extrabold border-l border-gray-300 ${r.profit > 0 ? "text-emerald-700" : r.profit < 0 ? "text-red-600" : "text-gray-400"}`}>
                  {hasData ? fmtVNDFull(r.profit) + "₫" : "—"}
                </td>
                <td className={`py-2 px-3 text-right font-semibold ${r.margin == null ? "text-gray-300" : r.margin > 0 ? "text-emerald-700" : "text-red-600"}`}>
                  {r.margin == null ? "—" : r.margin.toFixed(1) + "%"}
                </td>
              </tr>
            )
          })}
          <tr className="bg-gray-100 border-t-2 border-gray-300">
            <td className="py-3 px-3 font-extrabold text-gray-900">TỔNG</td>
            <td className="py-3 px-3 text-right font-bold text-gray-900">{fmtNum(data.tot.units)}</td>
            <td className="py-3 px-3 text-right font-bold text-gray-900">{fmtNum(data.tot.orders)}</td>
            <td className="py-3 px-3 text-right font-bold text-gray-900">{fmtVNDFull(data.tot.revenue)}₫</td>
            <td className="py-3 px-3 text-right font-bold text-amber-700">-{fmtVNDFull(data.tot.vat)}₫</td>
            <td className="py-3 px-3 text-right font-bold text-blue-700">-{fmtVNDFull(data.tot.adSpend)}₫</td>
            <td className="py-3 px-3 text-right text-gray-500">—</td>
            <td className="py-3 px-3 text-right font-bold text-gray-800">-{fmtVNDFull(data.tot.totalCost)}₫</td>
            <td className={`py-3 px-3 text-right font-extrabold border-l border-gray-300 ${data.tot.profit > 0 ? "text-emerald-700" : "text-red-600"}`}>{fmtVNDFull(data.tot.profit)}₫</td>
            <td className={`py-3 px-3 text-right font-bold ${data.totMargin == null ? "text-gray-400" : data.totMargin > 0 ? "text-emerald-700" : "text-red-600"}`}>
              {data.totMargin == null ? "—" : data.totMargin.toFixed(1) + "%"}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  )

  return (
    <div className={`mb-6 rounded-xl border-2 ${staff.color.border} ${staff.color.bg} p-5 shadow-sm`}>
      <div className="flex items-start justify-between mb-4 flex-wrap gap-2">
        <div>
          <h2 className="text-lg font-bold text-gray-900 tracking-tight flex items-center gap-2">
            <DollarSign className="w-5 h-5 text-emerald-600" /> Lợi nhuận — {staff.label}
          </h2>
          <p className="text-xs text-gray-600 mt-1">
            {fmtDate(dateRange.start)} → {fmtDate(dateRange.end)}
            {" · "}
            <span className="font-mono text-[10px] bg-white/80 px-1.5 py-0.5 rounded border border-gray-200">
              LN = DT − DT×10% VAT − Ad − Giá nhập × SL
            </span>
          </p>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          {unassignedTotal > 0 && (
            <button
              onClick={() => setCampModal({ mode: "unassigned" })}
              className="text-xs px-2.5 py-1.5 rounded-md bg-amber-100 text-amber-900 border border-amber-400 hover:bg-amber-200 font-semibold"
              title="Xem campaign không detect được SP — tên campaign sai chuẩn"
            >
              ⚠ UNASSIGNED: {fmtVND(unassignedTotal)}₫ · {unassignedRows.length} camp
            </button>
          )}
          {staff.showCloseBtn && (
            <button
              onClick={onClose}
              className="text-xs px-3 py-1.5 rounded-md bg-white border border-gray-300 hover:bg-gray-100 text-gray-600"
              title="Đóng bảng lợi nhuận (quay về Tất cả)"
            >
              ✕ Đóng
            </button>
          )}
        </div>
      </div>

      {/* BẢNG 1 — LN TRƯỚC HOÀN */}
      <div className="mb-2">
        <div className="flex items-center gap-2 mb-2 flex-wrap">
          <span className="text-xs font-bold text-amber-900 bg-amber-100 px-2 py-1 rounded border border-amber-300">
            📊 LN TRƯỚC HOÀN
          </span>
          <span className="text-[11px] text-gray-600">
            Gồm <span className="font-semibold">Đã giao + Đang hoàn + Đang xử lý + Đã hoàn</span> · loại <span className="font-semibold">Đã hủy</span>
          </span>
        </div>
        {renderTable(beforeReturns)}
      </div>

      {/* Dòng tóm tắt TRƯỚC → MẤT → SAU */}
      <div className="my-3 px-4 py-3 bg-white rounded-lg border-2 border-dashed border-gray-300 flex flex-wrap items-center justify-center gap-x-4 gap-y-2 text-sm">
        <span className="text-gray-700">
          LN trước hoàn: <span className={`font-extrabold ${beforeReturns.tot.profit > 0 ? "text-emerald-700" : "text-red-600"}`}>{fmtVNDFull(beforeReturns.tot.profit)}₫</span>
        </span>
        <span className="text-gray-400 text-lg">→</span>
        <span className="text-gray-700">
          Hoàn mất: <span className={`font-extrabold ${lossByReturns > 0 ? "text-red-600" : "text-gray-500"}`}>-{fmtVNDFull(Math.abs(lossByReturns))}₫</span>
        </span>
        <span className="text-gray-400 text-lg">→</span>
        <span className="text-gray-700">
          LN sau hoàn: <span className={`font-extrabold ${afterReturns.tot.profit > 0 ? "text-emerald-700" : "text-red-600"}`}>{fmtVNDFull(afterReturns.tot.profit)}₫</span>
        </span>
      </div>

      {/* BẢNG 2 — LN SAU HOÀN */}
      <div className="mt-2">
        <div className="flex items-center gap-2 mb-2 flex-wrap">
          <span className="text-xs font-bold text-white bg-emerald-600 px-2 py-1 rounded border border-emerald-700">
            ✅ LN SAU HOÀN
          </span>
          <span className="text-[11px] text-gray-600">
            Gồm <span className="font-semibold">Đã giao + Đang hoàn + Đang xử lý</span> · <span className="text-red-600 font-semibold">ĐÃ LOẠI Đã hoàn + Đã hủy</span>
          </span>
        </div>
        {renderTable(afterReturns)}
      </div>

      <p className="text-[11px] text-gray-600 mt-3 italic">
        * Doanh thu = cột COD Pancake · Ad spend = chi tiêu FB Ads của {staff.adKeys.length === 0 ? "Website (không chạy FB Ads)" : staff.adKeys.length === 2 ? "Duy + Phương Nam (6 TK)" : staff.label} cho từng SP, dò từ tên campaign · Giá nhập lookup "Mã tên gọi" trong xlsx Kho tổng · Ad spend giữ nguyên ở cả 2 bảng (chi phí đã tiêu, không phụ thuộc đơn hoàn).
      </p>

      {campModal && (
        <CampaignDetailModal
          mode={campModal.mode}
          product={campModal.product}
          staff={staff}
          dateRange={dateRange}
          onClose={() => setCampModal(null)}
        />
      )}
    </div>
  )
}

// Modal popup — bấm "CAMP" bên cạnh SP hoặc chip UNASSIGNED để mở.
// Hiển thị list campaign + spend trong dateRange, để verify detection logic.
function CampaignDetailModal({ mode, product, staff, dateRange, onClose }) {
  const isUnassigned = mode === "unassigned"
  const rows = isUnassigned
    ? unassignedCampaigns(staff.adKeys, dateRange)
    : campaignsForProduct(product, staff.adKeys, dateRange)
  const total = rows.reduce((s, r) => s + r.spend, 0)
  const title = isUnassigned
    ? `⚠ Campaign KHÔNG detect được SP — ${staff.label}`
    : `📊 Campaign chạy ${product} — ${staff.label}`

  return (
    <div
      className="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4"
      onClick={onClose}
    >
      <div
        className="bg-white rounded-xl shadow-2xl max-w-4xl w-full max-h-[85vh] overflow-hidden flex flex-col"
        onClick={e => e.stopPropagation()}
      >
        <div className={`px-5 py-4 border-b border-gray-200 flex items-center justify-between ${isUnassigned ? "bg-gradient-to-r from-amber-50 to-yellow-50" : "bg-gradient-to-r from-blue-50 to-indigo-50"}`}>
          <div className="min-w-0">
            <h3 className="font-bold text-gray-900 text-base">{title}</h3>
            <p className="text-[11px] text-gray-600 mt-0.5">
              {fmtDate(dateRange.start)} → {fmtDate(dateRange.end)} · {rows.length} campaign · Tổng: <span className="font-bold text-blue-700">{fmtVND(total)}₫</span>
            </p>
          </div>
          <button
            onClick={onClose}
            className="text-gray-400 hover:text-gray-700 text-xl font-bold w-8 h-8 flex items-center justify-center rounded hover:bg-gray-100 flex-shrink-0 ml-2"
            title="Đóng"
          >
            ✕
          </button>
        </div>
        <div className="overflow-y-auto flex-1 p-4">
          {rows.length === 0 ? (
            <p className="text-sm text-gray-500 text-center py-12 italic">
              {isUnassigned
                ? "Không có campaign nào bị unassigned — tất cả đã match SP đúng chuẩn. 🎉"
                : `Không có campaign nào match "${product}" trong khoảng ${fmtDate(dateRange.start)} → ${fmtDate(dateRange.end)}.`}
            </p>
          ) : (
            <table className="w-full text-xs">
              <thead>
                <tr className="bg-gray-50 border-b-2 border-gray-200 text-gray-700">
                  <th className="py-2 px-2 text-left font-semibold w-8">#</th>
                  <th className="py-2 px-2 text-left font-semibold">Campaign</th>
                  <th className="py-2 px-2 text-left font-semibold">Tài khoản</th>
                  <th className="py-2 px-2 text-right font-semibold">Spend trong range</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => (
                  <tr key={r.id || i} className="border-b border-gray-100 hover:bg-blue-50/40">
                    <td className="py-2 px-2 text-gray-500">{i + 1}</td>
                    <td className="py-2 px-2 font-semibold text-gray-900 break-words">{r.name}</td>
                    <td className="py-2 px-2 text-gray-600 text-[11px] break-words max-w-[240px]">{r.accountShort}</td>
                    <td className="py-2 px-2 text-right font-bold text-blue-700 whitespace-nowrap">{fmtVND(r.spend)}₫</td>
                  </tr>
                ))}
                <tr className="bg-gray-100 border-t-2 border-gray-300">
                  <td colSpan="3" className="py-3 px-3 font-extrabold text-gray-900 text-right">TỔNG</td>
                  <td className="py-3 px-3 text-right font-extrabold text-blue-800 whitespace-nowrap">{fmtVND(total)}₫</td>
                </tr>
              </tbody>
            </table>
          )}
        </div>
        {isUnassigned && rows.length > 0 && (
          <div className="px-5 py-3 bg-amber-50 border-t border-amber-200">
            <p className="text-[11px] text-amber-800">
              💡 Campaign này KHÔNG chứa tên SP khớp với 13 PROFIT_PRODUCTS. Đổi tên campaign chứa "D1", "D1 Pro", "DA8.1 Pro", "Noma 911"... hoặc mở rộng hàm <code className="bg-white px-1 rounded border">detectProfitProduct</code> (cả Python & JS).
            </p>
          </div>
        )}
      </div>
    </div>
  )
}

// =============================================================
// GOOGLE ADS PROFIT — rows theo category, doanh thu từ nguồn WEBSITE
// =============================================================
// Mapping category → nhóm SP (phải đồng bộ với detect_google_category
// trong scripts và google-ads-spend.json)
//
// 5 category chính (có doanh thu mapping Pancake): MAYDO / DINHVI / GHIAM / CAMCALL — lấy spend từ by_category[key]
// 5 micro category (không map SP Pancake — chỉ trừ spend): CAM4G / CAMWIFI / CAMNLMT / ANTIREC / RAZOR
//   → lấy spend từ campaigns_raw, match regex tên campaign (mỗi SP có 1 camp Search + 1 camp Remarketing)
// 1 bucket tổng hợp: OTHER_MISC — các camp còn lại của OTHER_CAM/OTHER_SIM/OTHER không match micro (Cam Mini, Sim 4G, máy massage, rửa hoa quả, thiết bị chăm sóc…)
const GOOGLE_CATEGORIES = [
  { key: "MAYDO",     label: "Máy dò",                 products: ["D1", "D1 Pro", "D2", "D3", "D4", "D8 Pro"] },
  { key: "DINHVI",    label: "Định vị",                products: ["DV1 Pro"] },
  { key: "GHIAM",     label: "Ghi âm",                 products: ["DR1", "DR4 Plus"] },
  { key: "CAMCALL",   label: "Camera gọi 2 chiều",     products: ["DA8.1", "DA8.1 Pro"] },
  { key: "CAM4G",     label: "Camera 4G",              products: [], isMicro: true,
    campaignTest: n => /cam(?:era)?\s*4g/i.test(n) },
  { key: "CAMWIFI",   label: "Camera WiFi",            products: [], isMicro: true,
    campaignTest: n => /cam(?:era)?\s*wifi/i.test(n) },
  { key: "CAMNLMT",   label: "Camera NLMT (năng lượng mặt trời)", products: [], isMicro: true,
    campaignTest: n => /nlmt/i.test(n) || /năng lượng mặt trời/i.test(n) },
  { key: "ANTIREC",   label: "Chống ghi âm",           products: [], isMicro: true,
    campaignTest: n => /chống\s*ghi\s*âm/i.test(n) || /chong\s*ghi\s*am/i.test(n) },
  { key: "RAZOR",     label: "Máy cạo râu",            products: [], isMicro: true,
    campaignTest: n => /cạo\s*râu/i.test(n) || /cao\s*rau/i.test(n) },
  { key: "OTHER_MISC", label: "Khác (Cam Mini, Sim 4G, máy massage, rửa hoa quả, thiết bị chăm sóc…)", products: [], isMisc: true },
]
// Category gốc (trong by_category) mà micro sẽ re-categorize lại (5 nhóm "OTHER_*" của script detect cũ)
const GOOGLE_OTHER_SOURCE_KEYS = ["OTHER_CAM", "OTHER_DI", "OTHER_SIM", "OTHER_RAZOR", "OTHER"]

function GoogleAdsProfit({ dateRange, onClose }) {
  const revenue = (typeof DATA !== "undefined" ? DATA.revenue : null) || {}
  const groups = revenue.source_groups || {}
  const productCosts = (typeof DATA !== "undefined" ? DATA.product_costs : null) || {}
  const googleAds = (typeof DATA !== "undefined" ? DATA.google_ads : null) || { by_category: {}, campaigns_raw: [] }
  const [campModal, setCampModal] = useState(null)

  const isInRange = (ymd) => {
    if (!dateRange?.start || !dateRange?.end) return true
    return ymd >= dateRange.start && ymd <= dateRange.end
  }
  const VAT_RATE = 0.10
  const SOURCE = "WEBSITE"
  const g = groups[SOURCE]

  // Pre-build micro + OTHER_MISC spend buckets từ campaigns_raw.
  // Chỉ re-categorize các campaign thuộc category gốc "OTHER_*" (không đụng MAYDO/DINHVI/GHIAM/CAMCALL).
  const microSpend = {}
  GOOGLE_CATEGORIES.filter(c => c.isMicro || c.key === "OTHER_MISC").forEach(c => {
    microSpend[c.key] = { by_date: {}, _total: 0, campaigns: new Set() }
  })
  ;(googleAds.campaigns_raw || []).forEach(row => {
    if (!GOOGLE_OTHER_SOURCE_KEYS.includes(row.category)) return
    const name = row.campaign || ""
    let target = null
    for (const cat of GOOGLE_CATEGORIES) {
      if (cat.campaignTest && cat.campaignTest(name)) { target = cat.key; break }
    }
    if (!target) target = "OTHER_MISC"
