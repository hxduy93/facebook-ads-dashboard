<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Google Doscom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f9fafb;color:#111827;font-size:14px;line-height:1.5}
a{color:#2563eb;text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;border:0;background:transparent;font:inherit}
.header{background:white;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 2px rgba(0,0,0,.04);position:sticky;top:0;z-index:20}
.header-inner{max-width:1280px;margin:0 auto;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:18px;font-weight:700}
.header-sub{font-size:11px;color:#6b7280}
main{max-width:1280px;margin:0 auto;padding:24px 16px}
.card{background:white;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-score{color:white}
.bg-A{background:linear-gradient(135deg,#10b981,#059669)}
.bg-B{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.bg-C{background:linear-gradient(135deg,#f59e0b,#d97706)}
.bg-D{background:linear-gradient(135deg,#f97316,#ea580c)}
.bg-F{background:linear-gradient(135deg,#ef4444,#dc2626)}
.grid-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:768px){.grid-summary{grid-template-columns:1fr 1fr}}
.metric-label{font-size:11px;text-transform:uppercase;color:#6b7280;letter-spacing:.04em}
.metric-value{font-size:32px;font-weight:700;margin-top:4px}
.metric-sub{font-size:11px;color:#6b7280;margin-top:4px}
section.block{margin-bottom:20px}
.block h2{font-size:16px;font-weight:700;margin-bottom:12px}
.block h3{font-size:13px;font-weight:700;margin-bottom:8px}
.score-summary{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.score-summary{grid-template-columns:1fr}}
.score-block{border-radius:8px;padding:12px}
.score-block.good{background:#f0fdf4;border-left:4px solid #10b981}
.score-block.bad{background:#fef2f2;border-left:4px solid #ef4444}
.score-block h4{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.score-block.good h4{color:#065f46}
.score-block.bad h4{color:#991b1b}
.score-block ul{list-style:none;padding:0}
.score-block li{font-size:13px;padding:4px 0 4px 16px;position:relative;line-height:1.5}
.score-block li::before{content:"";position:absolute;left:0;top:11px;width:6px;height:6px;border-radius:50%}
.score-block.good li::before{background:#10b981}
.score-block.bad li.color-red::before{background:#dc2626}
.score-block.bad li.color-orange::before{background:#f59e0b}
.score-block.bad li::before{background:#f59e0b}
.score-block strong{font-weight:700}
.score-block.good strong{color:#047857}
.score-block.bad strong{color:#b91c1c}
.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;padding-bottom:12px;border-bottom:1px solid #e5e7eb;margin-bottom:16px}
.cat-tab{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;background:#f3f4f6;color:#374151}
.cat-tab:hover{background:#e5e7eb}
.cat-tab.active{background:#2563eb;color:white}
.cat-overview{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
@media(max-width:768px){.cat-overview{grid-template-columns:repeat(3,1fr)}}
.cat-overview-item{background:#f9fafb;border-radius:6px;padding:8px}
.cat-overview-item .lbl{font-size:10px;color:#6b7280}
.cat-overview-item .val{font-size:14px;font-weight:700;margin-top:2px}
.priority-high{background:#fee2e2;border-left:4px solid #dc2626}
.priority-medium{background:#fef3c7;border-left:4px solid #d97706}
.priority-low{background:#dbeafe;border-left:4px solid #3b82f6}
.action-box{padding:10px 12px;border-radius:6px;margin-bottom:8px}
.action-box .title{font-weight:600;font-size:13px}
.action-box .detail{font-size:12px;color:#4b5563;margin-top:4px;line-height:1.45}
.action-box .save{font-size:11px;color:#047857;font-weight:600;margin-top:4px}
.action-box .scroll-btn{display:inline-block;margin-top:6px;padding:4px 10px;background:#2563eb;color:white;border-radius:4px;font-size:11px;font-weight:600}
.action-box .scroll-btn:hover{background:#1d4ed8;color:white;text-decoration:none}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase}
.badge-high{background:#fecaca;color:#7f1d1d}
.badge-medium{background:#fde68a;color:#78350f}
.badge-low{background:#bfdbfe;color:#1e3a8a}
.tbl-wrap{overflow-x:auto;border:1px solid #e5e7eb;border-radius:6px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f9fafb;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#4b5563;text-align:left;padding:8px;border-bottom:1px solid #e5e7eb}
td{padding:6px 8px;border-bottom:1px solid #f3f4f6;vertical-align:top}
tbody tr:hover{background:#f9fafb}
.t-right{text-align:right}
.truncate{max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:bottom}
.mono{font-family:'SF Mono',Monaco,Consolas,'Courier New',monospace;font-size:11px}
.rec{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;display:inline-block}
.rec-KEEP{background:#d1fae5;color:#065f46}
.rec-SCALE{background:#bbf7d0;color:#14532d}
.rec-ADD_NEGATIVE{background:#fee2e2;color:#991b1b}
.rec-PAUSE{background:#fecaca;color:#7f1d1d}
.rec-REPLACE{background:#fed7aa;color:#9a3412}
.rec-REVIEW{background:#fef3c7;color:#854d0e}
.rec-MONITOR{background:#e5e7eb;color:#4b5563}
.pill{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;background:#eff6ff;color:#1e40af;margin-right:4px;margin-bottom:2px}
.pill-green{background:#d1fae5;color:#065f46}
.pill-orange{background:#fed7aa;color:#9a3412}
.spinner{border:3px solid #e5e7eb;border-top-color:#3b82f6;border-radius:50%;width:36px;height:36px;animation:spin .8s linear infinite;margin:48px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;font-size:11px;color:#9ca3af;margin-top:24px}
.text-red{color:#dc2626}
.text-green{color:#047857}
.text-gray{color:#6b7280}
.font-bold{font-weight:700}
.text-sm{font-size:13px}
.text-xs{font-size:11px}
.suggest-block{background:#fffbeb;border-left:4px solid #f59e0b;border-radius:6px;padding:12px;margin-top:12px}
.suggest-block h3{color:#92400e;margin-bottom:8px}
.tip-card{background:white;border-radius:6px;padding:10px;margin-bottom:8px;border:1px solid #fde68a}
.tip-card .field{margin-bottom:4px;font-size:12px}
.tip-card .field .lbl{font-weight:600;color:#78350f;min-width:120px;display:inline-block}
</style>
</head>
<body>
<header class="header">
<div class="header-inner">
<div style="display:flex;gap:10px;align-items:center"><span style="font-size:22px">AI</span><div><h1>Agent Google Doscom</h1><div class="header-sub">AI Insights v3 - Phân tích chi tiết theo nhóm sản phẩm</div></div></div>
<div style="display:flex;gap:10px;align-items:center;font-size:13px"><a href="/">Dashboard chính</a><span style="color:#d1d5db">|</span><button onclick="location.reload()" style="color:#6b7280">Làm mới</button></div>
</div>
</header>
<main id="main"><div id="loading"><div class="spinner"></div><p style="text-align:center;color:#6b7280;margin-top:8px">Đang tải báo cáo...</p></div></main>
<script>
console.log("[AgentPage] script loaded");
var REPORT = null, currentCat = null;

function fmtVND(n){if(n==null||n===0)return "0";if(Math.abs(n)>=1e6)return (n/1e6).toFixed(1)+"tr";if(Math.abs(n)>=1e3)return (n/1e3).toFixed(0)+"K";return Math.round(n).toLocaleString("vi-VN")}
function fmtInt(n){return n==null?"-":n.toLocaleString("vi-VN")}
function fmtPct(n,d){if(d==null)d=2;return n==null?"-":(n*100).toFixed(d)+"%"}
function esc(s){if(s==null)return "";return String(s).split("&").join("&amp;").split("<").join("&lt;").split(">").join("&gt;").split("\"").join("&quot;")}
function mdBold(s){return esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")}

function load(){
  console.log("[AgentPage] load started");
  var url = "data/google-ads-daily-report.json?v="+Date.now();
  fetch(url).then(function(res){
    if(!res.ok) throw new Error("HTTP "+res.status);
    return res.json();
  }).then(function(r){
    console.log("[AgentPage] JSON loaded, score:", r.score, "cats:", Object.keys(r.categories||{}).length);
    REPORT = r;
    try { render(r); console.log("[AgentPage] render done"); }
    catch(err){ console.error("[AgentPage] render error:", err); showError("Lỗi render: "+err.message); }
  }).catch(function(e){ console.error("[AgentPage] fetch failed:", e); showError("Không tải được báo cáo: "+esc(e.message)); });
}

function showError(msg){
  document.getElementById("main").innerHTML = '<div class="card" style="border-left:4px solid #dc2626;background:#fef2f2"><h3 style="color:#991b1b">Lỗi</h3><div style="margin-top:8px">'+msg+'</div></div>';
}

function render(r){
  var g = r.grade || "F";
  var cats = r.categories || {};
  var catKeys = [];
  for(var k in cats){ if(cats[k].ads_spend_30d>0 || cats[k].keywords_count>0 || cats[k].banners_count>0) catKeys.push(k); }
  if(!currentCat && catKeys.length) currentCat = catKeys[0];
  var t = r.totals || {};
  var html = "";

  // Summary cards
  html += '<section class="grid-summary">';
  html += '<div class="card card-score bg-'+g+'"><div class="metric-label" style="color:rgba(255,255,255,.8)">Điểm số</div>';
  html += '<div class="metric-value">'+r.score+'<span style="font-size:18px;opacity:.8">/100</span></div>';
  html += '<div style="font-size:14px;font-weight:600;margin-top:4px">Xếp hạng '+g+'</div></div>';
  html += '<div class="card"><div class="metric-label">ROAS (lợi nhuận/chi phí ads)</div>';
  html += '<div class="metric-value '+(t.roas_overall<1?"text-red":"")+'">'+(t.roas_overall||0)+'x</div>';
  html += '<div class="metric-sub">Chi: '+fmtVND(t.ads_spend_30d)+'đ · Rev: '+fmtVND(t.website_revenue_30d)+'đ</div></div>';
  html += '<div class="card"><div class="metric-label">Hành động cần làm</div>';
  html += '<div class="metric-value">'+(t.total_actions||0)+'</div>';
  html += '<div class="metric-sub text-red">'+(t.urgent_actions||0)+' urgent (ưu tiên cao)</div></div>';
  html += '<div class="card"><div class="metric-label">Tiết kiệm tiềm năng</div>';
  html += '<div class="metric-value text-green">'+fmtVND(t.estimated_total_saving_vnd)+'đ</div>';
  html += '<div class="metric-sub">trong 30 ngày</div></div>';
  html += '</section>';

  // Score summary: tốt + cần cải thiện (yêu cầu #1)
  var ss = r.score_summary || {};
  html += '<section class="block card"><h2>Tổng quan đánh giá</h2>';
  html += '<div class="score-summary">';
  html += '<div class="score-block good"><h4>✓ Điểm tốt</h4><ul>';
  var gp = ss.good_points || [];
  if(!gp.length) html += '<li class="text-gray">Chưa có điểm tốt nổi bật.</li>';
  for(var i=0;i<gp.length;i++){ html += '<li>'+mdBold(gp[i].text)+'</li>'; }
  html += '</ul></div>';
  html += '<div class="score-block bad"><h4>⚠ Cần cải thiện</h4><ul>';
  var bp = ss.improvement_points || [];
  if(!bp.length) html += '<li class="text-gray">Không có vấn đề urgent.</li>';
  for(var j=0;j<bp.length;j++){ var col=bp[j].color||""; html += '<li class="color-'+col+'">'+mdBold(bp[j].text)+'</li>'; }
  html += '</ul></div></div></section>';

  // Headline + Verdict
  html += '<section class="block card">';
  html += '<p style="font-weight:600;font-size:13px">'+esc(r.headline)+'</p>';
  html += '<p class="text-sm" style="margin-top:8px;color:#374151">'+esc(r.verdict)+'</p>';
  var period = r.period || {};
  html += '<p class="text-xs" style="color:#9ca3af;margin-top:6px">Cập nhật: '+esc(r.generated_at)+' · Kỳ: '+esc(period.start)+' đến '+esc(period.end)+'</p>';
  html += '</section>';

  // Product ranking
  html += '<section class="block card"><h2>Xếp hạng Sản phẩm theo Doanh thu (Pancake 30 ngày)</h2>';
  html += '<div class="tbl-wrap"><table><thead><tr>';
  html += '<th>#</th><th>Sản phẩm</th><th>Nhóm</th><th class="t-right">Doanh thu</th>';
  html += '<th class="t-right">Đơn</th><th class="t-right">AOV (giá đơn TB)</th><th>Từ khóa có conv (chuyển đổi)</th>';
  html += '</tr></thead><tbody>';
  var pr = r.products_ranking || [];
  for(var pi=0;pi<pr.length;pi++){
    var p = pr[pi]; var kws="";
    var krel = p.related_keywords_top_convert || [];
    for(var kj=0;kj<krel.length;kj++){ kws += '<span class="pill pill-green">'+esc(krel[kj].text)+' ('+krel[kj].conv_30d+')</span>'; }
    if(!kws) kws = '<span class="text-gray">—</span>';
    html += '<tr><td class="text-gray">'+(pi+1)+'</td>';
    html += '<td class="font-bold">'+esc(p.product)+'</td>';
    html += '<td><span class="pill">'+esc(p.category_name)+'</span></td>';
    html += '<td class="t-right text-green font-bold">'+fmtVND(p.revenue_30d)+'đ</td>';
    html += '<td class="t-right">'+fmtInt(p.orders_30d)+'</td>';
    html += '<td class="t-right text-xs text-gray">'+fmtVND(p.avg_order_value)+'đ</td>';
    html += '<td class="text-xs">'+kws+'</td></tr>';
  }
  html += '</tbody></table></div></section>';

  // Category tabs
  html += '<section class="block card"><h2>Phân tích chi tiết theo Nhóm sản phẩm</h2><div class="cat-tabs">';
  for(var ti=0;ti<catKeys.length;ti++){
    var ck = catKeys[ti]; var cc = cats[ck]; var act = ck===currentCat;
    var hasUrgent = false; var sa = cc.summary_actions || [];
    for(var sai=0;sai<sa.length;sai++){ if(sa[sai].priority==="high"){hasUrgent=true;break;} }
    html += '<button class="cat-tab '+(act?"active":"")+'" onclick="switchCat(\''+ck+'\',event)">'+esc(cc.display_name)+(hasUrgent?' <span style="color:#ef4444">●</span>':'')+'</button>';
  }
  html += '</div><div id="cat-content">'+renderCategory(cats[currentCat], currentCat)+'</div></section>';

  // Key findings
  html += '<section class="block card" style="background:#eff6ff"><h3>Thông tin chính (Key Findings)</h3><ul style="margin-left:16px;font-size:13px">';
  var kf = r.key_findings || [];
  for(var ki=0;ki<kf.length;ki++){ if(kf[ki]) html += '<li>'+esc(kf[ki])+'</li>'; }
  html += '</ul></section>';

  html += '<div class="footer">Agent Google Doscom v'+(r.version||"3.0")+' · Chạy 3 ngày/lần lúc 7:30 sáng VN</div>';
  document.getElementById("main").innerHTML = html;
}

function switchCat(key, ev){
  currentCat = key;
  var tabs = document.querySelectorAll(".cat-tab");
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove("active");
  if(ev && ev.target) ev.target.classList.add("active");
  document.getElementById("cat-content").innerHTML = renderCategory(REPORT.categories[key], key);
}

function scrollTo(id){ var el=document.getElementById(id); if(el){ el.scrollIntoView({behavior:"smooth", block:"start"}); el.style.background="#fef3c7"; setTimeout(function(){el.style.background=""},2000); } }

function renderCategory(c, ck){
  if(!c) return '<p class="text-gray">Không có dữ liệu.</p>';
  var html = "";

  // Overview
  html += '<div class="cat-overview">';
  html += '<div class="cat-overview-item"><div class="lbl">Sản phẩm</div><div class="val text-xs">'+((c.products||[]).join(", ")||"-")+'</div></div>';
  html += '<div class="cat-overview-item"><div class="lbl">Chi phí ads 30d</div><div class="val">'+fmtVND(c.ads_spend_30d)+'đ</div></div>';
  html += '<div class="cat-overview-item"><div class="lbl">Doanh thu Pancake</div><div class="val text-green">'+fmtVND(c.revenue_pancake_30d)+'đ</div></div>';
  html += '<div class="cat-overview-item"><div class="lbl">ROAS</div><div class="val '+(c.roas_proxy>=1.5?"text-green":"text-red")+'">'+c.roas_proxy+'x</div></div>';
  html += '<div class="cat-overview-item"><div class="lbl">Đơn hàng</div><div class="val">'+fmtInt(c.orders_pancake_30d)+'</div></div>';
  html += '<div class="cat-overview-item"><div class="lbl">CTR TB (tỷ lệ click)</div><div class="val">'+fmtPct(c.ads_ctr_30d)+'</div></div>';
  html += '</div>';

  // Summary Actions với nút scroll
  var sa = c.summary_actions || [];
  if(sa.length){
    html += '<h3>Hành động đề xuất</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    for(var i=0;i<sa.length;i++){
      var a = sa[i]; var scrollTarget = "";
      if(a.type==="ADD_NEGATIVE_KEYWORDS" || a.type==="SCALE_KEYWORDS" || a.type==="PAUSE_KEYWORDS" || a.type==="REVIEW_KEYWORDS") scrollTarget = "suggest-keywords-"+ck;
      else if(a.type==="REPLACE_BANNERS" || a.type==="PAUSE_BANNERS") scrollTarget = "suggest-banners-"+ck;
      else if(a.type==="REVIEW_BANNERS") scrollTarget = "suggest-abtest-"+ck;
      html += '<div class="action-box priority-'+a.priority+'">';
      html += '<div style="display:flex;justify-content:space-between;gap:8px"><span class="title">'+esc(a.title)+'</span>';
      html += '<span class="badge badge-'+a.priority+'">'+a.priority+'</span></div>';
      html += '<div class="detail">'+esc(a.detail)+'</div>';
      if(a.estimated_saving_vnd>0) html += '<div class="save">Tiết kiệm: '+fmtVND(a.estimated_saving_vnd)+'đ/30d</div>';
      if(scrollTarget) html += '<a class="scroll-btn" onclick="scrollTo(\''+scrollTarget+'\');return false" href="#'+scrollTarget+'">→ Xem gợi ý chi tiết</a>';
      html += '</div>';
    }
    html += '</div>';
  } else {
    html += '<p class="text-xs text-gray" style="margin-bottom:12px">Không có hành động cần thực hiện.</p>';
  }

  // Keywords table VN
  var kws = c.keywords || [];
  html += '<h3 style="margin-top:16px">Bảng Từ khóa ('+(c.keywords_count||0)+' từ khóa, hiển thị top '+kws.length+')</h3>';
  if(!kws.length) html += '<p class="text-xs text-gray">Chưa có dữ liệu từ khóa.</p>';
  else {
    html += '<div class="tbl-wrap"><table><thead><tr>';
    html += '<th>Từ khóa</th><th>Loại khớp</th><th>Trạng thái</th>';
    html += '<th class="t-right">Chi tiêu</th><th class="t-right">Click</th>';
    html += '<th class="t-right">CTR</th><th class="t-right">Conv</th>';
    html += '<th>Khuyến nghị</th><th>Lý do</th></tr></thead><tbody>';
    for(var ki=0;ki<kws.length;ki++){
      var kw = kws[ki];
      html += '<tr><td><span class="truncate" title="'+esc(kw.text)+'">'+esc(kw.text)+'</span></td>';
      html += '<td class="text-xs">'+esc(kw.match_type)+'</td>';
      html += '<td class="text-xs">'+esc(kw.status)+'</td>';
      html += '<td class="t-right">'+fmtVND(kw.spend_30d)+'đ</td>';
      html += '<td class="t-right">'+fmtInt(kw.clicks_30d)+'</td>';
      html += '<td class="t-right">'+fmtPct(kw.ctr_30d)+'</td>';
      html += '<td class="t-right '+(kw.conv_30d>0?"text-green font-bold":"text-gray")+'">'+kw.conv_30d+'</td>';
      html += '<td><span class="rec rec-'+kw.recommendation+'">'+kw.recommendation+'</span></td>';
      html += '<td class="text-xs text-gray">'+esc(kw.reason)+'</td></tr>';
    }
    html += '</tbody></table></div>';
  }

  // Banners table VN
  var bs = c.banners || [];
  html += '<h3 style="margin-top:16px">Bảng Banner / Quảng cáo ('+(c.banners_count||0)+' banner, top '+bs.length+')</h3>';
  if(!bs.length) html += '<p class="text-xs text-gray">Chưa có dữ liệu banner.</p>';
  else {
    html += '<div class="tbl-wrap"><table><thead><tr>';
    html += '<th>Tên ad</th><th>Định dạng</th><th>Kích thước</th><th>Chiến dịch</th>';
    html += '<th class="t-right">Chi tiêu</th><th class="t-right">Hiển thị</th>';
    html += '<th class="t-right">Click</th><th class="t-right">CTR</th>';
    html += '<th>Khuyến nghị</th><th>Lý do</th></tr></thead><tbody>';
    for(var bi=0;bi<bs.length;bi++){
      var b = bs[bi];
      html += '<tr><td class="mono" title="'+esc(b.ad_id)+'">'+esc(b.ad_name)+'</td>';
      html += '<td class="text-xs">'+esc(b.ad_format)+'</td>';
      html += '<td class="text-xs">'+esc(b.current_size)+'</td>';
      html += '<td class="text-xs truncate" title="'+esc(b.campaign)+'">'+esc(b.campaign)+'</td>';
      html += '<td class="t-right">'+fmtVND(b.spend_30d)+'đ</td>';
      html += '<td class="t-right">'+fmtInt(b.impressions_30d)+'</td>';
      html += '<td class="t-right">'+fmtInt(b.clicks_30d)+'</td>';
      html += '<td class="t-right">'+fmtPct(b.ctr_30d)+'</td>';
      html += '<td><span class="rec rec-'+b.recommendation+'">'+b.recommendation+'</span></td>';
      html += '<td class="text-xs text-gray">'+esc(b.reason)+'</td></tr>';
    }
    html += '</tbody></table></div>';
  }

  // Suggested Keywords (NEW)
  var sk = c.suggested_keywords || [];
  html += '<div id="suggest-keywords-'+ck+'" class="suggest-block"><h3>Bộ từ khóa nên THÊM ('+sk.length+' gợi ý)</h3>';
  if(!sk.length) html += '<p class="text-xs text-gray">Chưa có gợi ý cho nhóm này.</p>';
  else {
    html += '<div class="tbl-wrap" style="background:white"><table><thead><tr>';
    html += '<th>Từ khóa đề xuất</th><th>Nhóm intent</th><th>Loại khớp nên dùng</th><th>Volume ước tính</th><th>Lý do</th>';
    html += '</tr></thead><tbody>';
    for(var si=0;si<sk.length;si++){
      var s = sk[si];
      html += '<tr><td class="font-bold">'+esc(s.keyword)+'</td>';
      html += '<td><span class="pill">'+esc(s.intent_group)+'</span></td>';
      html += '<td class="text-xs">'+esc(s.suggested_match_type)+'</td>';
      html += '<td class="text-xs">'+esc(s.estimated_volume)+'</td>';
      html += '<td class="text-xs text-gray">'+esc(s.reason)+'</td></tr>';
    }
    html += '</tbody></table></div></div>';
  }

  // Banner Improvement Tips (NEW)
  var bt = c.banner_improvement_tips || [];
  html += '<div id="suggest-banners-'+ck+'" class="suggest-block"><h3>Gợi ý cải thiện Banner ('+bt.length+' banner cần sửa)</h3>';
  if(!bt.length) html += '<p class="text-xs text-gray">Không có banner cần cải thiện nghiêm trọng.</p>';
  else {
    for(var ti=0;ti<bt.length;ti++){
      var tip = bt[ti];
      html += '<div class="tip-card">';
      html += '<div class="field"><span class="lbl">Banner:</span> <span class="mono">'+esc(tip.ad_name)+'</span> (id '+esc(tip.ad_id)+', size '+esc(tip.current_size)+', CTR '+fmtPct(tip.current_ctr)+')</div>';
      html += '<div class="field"><span class="lbl">Vấn đề:</span> '+esc(tip.problem)+'</div>';
      html += '<div class="field"><span class="lbl">Size nên dùng:</span> '+esc(tip.recommended_size)+'</div>';
      html += '<div class="field"><span class="lbl">Màu sắc:</span> '+esc(tip.recommended_colors)+'</div>';
      html += '<div class="field"><span class="lbl">Visual:</span> '+esc(tip.recommended_visual)+'</div>';
      html += '<div class="field"><span class="lbl">Headline:</span> "'+esc(tip.recommended_headline)+'"</div>';
      html += '<div class="field"><span class="lbl">CTA (nút hành động):</span> "'+esc(tip.recommended_cta)+'"</div>';
      html += '<div class="field"><span class="lbl">Social proof:</span> '+esc(tip.recommended_social_proof)+'</div>';
      html += '<div class="field text-xs" style="color:#6b7280;padding-top:4px;border-top:1px dashed #fde68a;margin-top:6px"><span class="lbl">Vì sao:</span> '+esc(tip.why)+'</div>';
      html += '</div>';
    }
  }
  html += '</div>';

  // A/B Test Suggestions (NEW)
  var ab = c.ab_test_suggestions || [];
  html += '<div id="suggest-abtest-'+ck+'" class="suggest-block"><h3>Gợi ý A/B Test ('+ab.length+' banner để test)</h3>';
  if(!ab.length) html += '<p class="text-xs text-gray">Không có banner cần A/B test.</p>';
  else {
    for(var ai=0;ai<ab.length;ai++){
      var tt = ab[ai];
      html += '<div class="tip-card">';
      html += '<div class="field"><span class="lbl">Banner test:</span> <span class="mono">'+esc(tt.ad_name)+'</span> (CTR hiện: '+fmtPct(tt.current_ctr)+')</div>';
      var variants = tt.test_variants || [];
      html += '<div class="field"><span class="lbl">Các variant:</span></div>';
      html += '<ol style="margin-left:24px;font-size:12px">';
      for(var vi=0;vi<variants.length;vi++){
        var v = variants[vi];
        html += '<li><strong>'+esc(v.variant)+'</strong> ('+esc(v.angle)+') — "'+esc(v.headline)+'" · '+esc(v.purpose)+'</li>';
      }
      html += '</ol>';
      html += '<div class="field"><span class="lbl">Phân chia ngân sách:</span> '+esc(tt.budget_split)+'</div>';
      html += '<div class="field"><span class="lbl">Tiêu chí thắng:</span> '+esc(tt.success_metric)+'</div>';
      html += '<div class="field text-xs" style="color:#047857"><span class="lbl">Kỳ vọng:</span> '+esc(tt.estimated_lift)+'</div>';
      html += '</div>';
    }
  }
  html += '</div>';

  // Title Analysis (NEW)
  var ta = c.title_analysis || [];
  html += '<div id="suggest-titles-'+ck+'" class="suggest-block"><h3>Phân tích Tiêu đề Quảng cáo ('+ta.length+' tiêu đề)</h3>';
  if(!ta.length) html += '<p class="text-xs text-gray">Chưa có tiêu đề dài đủ để phân tích trong nhóm này.</p>';
  else {
    html += '<div class="tbl-wrap" style="background:white"><table><thead><tr>';
    html += '<th>Tiêu đề (rút gọn)</th><th>Ad group</th><th class="t-right">Chi tiêu</th><th class="t-right">CTR</th><th>Chất lượng</th><th>Hành động</th><th>Gợi ý cải thiện</th>';
    html += '</tr></thead><tbody>';
    for(var tii=0;tii<ta.length;tii++){
      var tt2 = ta[tii];
      html += '<tr><td><span class="truncate" title="'+esc(tt2.full_title)+'">'+esc(tt2.title_snippet)+'</span></td>';
      html += '<td class="text-xs">'+esc(tt2.ad_group_name)+'</td>';
      html += '<td class="t-right">'+fmtVND(tt2.spend_30d)+'đ</td>';
      html += '<td class="t-right">'+fmtPct(tt2.ctr_30d)+'</td>';
      var qC = tt2.quality==="tốt"?"pill-green":(tt2.quality==="kém"?"pill-orange":"pill");
      html += '<td><span class="pill '+qC+'">'+esc(tt2.quality)+'</span></td>';
      html += '<td><span class="rec rec-'+(tt2.recommendation==="GIỮ"?"KEEP":(tt2.recommendation==="VIẾT LẠI"?"REPLACE":"REVIEW"))+'">'+esc(tt2.recommendation)+'</span></td>';
      html += '<td class="text-xs text-gray">'+esc(tt2.suggested_improvement||"-")+'</td></tr>';
    }
    html += '</tbody></table></div>';
  }
  html += '</div>';

  return html;
}

load();
</script>
</body>
</html>
