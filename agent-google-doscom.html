<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Google Doscom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f9fafb;color:#111827;font-size:14px;line-height:1.5}
a{color:#2563eb;text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;border:0;background:transparent;font:inherit}
.header{background:white;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 2px rgba(0,0,0,.04);position:sticky;top:0;z-index:20}
.header-inner{max-width:1280px;margin:0 auto;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:18px;font-weight:700}
.header-sub{font-size:11px;color:#6b7280}
main{max-width:1280px;margin:0 auto;padding:24px 16px}
.card{background:white;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-score{color:white}
.bg-A{background:linear-gradient(135deg,#10b981,#059669)}
.bg-B{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.bg-C{background:linear-gradient(135deg,#f59e0b,#d97706)}
.bg-D{background:linear-gradient(135deg,#f97316,#ea580c)}
.bg-F{background:linear-gradient(135deg,#ef4444,#dc2626)}
.grid-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:768px){.grid-summary{grid-template-columns:1fr 1fr}}
.metric-label{font-size:11px;text-transform:uppercase;color:#6b7280;letter-spacing:.04em}
.metric-value{font-size:32px;font-weight:700;margin-top:4px}
.metric-sub{font-size:11px;color:#6b7280;margin-top:4px}
section.block{margin-bottom:20px}
.block h2{font-size:16px;font-weight:700;margin-bottom:12px}
.block h3{font-size:13px;font-weight:700;margin-bottom:8px}
.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;padding-bottom:12px;border-bottom:1px solid #e5e7eb;margin-bottom:16px}
.cat-tab{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;background:#f3f4f6;color:#374151}
.cat-tab:hover{background:#e5e7eb}
.cat-tab.active{background:#2563eb;color:white}
.cat-overview{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
@media(max-width:768px){.cat-overview{grid-template-columns:repeat(3,1fr)}}
.cat-overview-item{background:#f9fafb;border-radius:6px;padding:8px}
.cat-overview-item .lbl{font-size:10px;color:#6b7280}
.cat-overview-item .val{font-size:14px;font-weight:700;margin-top:2px}
.priority-high{background:#fee2e2;border-left:4px solid #dc2626}
.priority-medium{background:#fef3c7;border-left:4px solid #d97706}
.priority-low{background:#dbeafe;border-left:4px solid #3b82f6}
.action-box{padding:10px 12px;border-radius:6px;margin-bottom:8px}
.action-box .title{font-weight:600;font-size:13px}
.action-box .detail{font-size:12px;color:#4b5563;margin-top:4px;line-height:1.45}
.action-box .save{font-size:11px;color:#047857;font-weight:600;margin-top:4px}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase}
.badge-high{background:#fecaca;color:#7f1d1d}
.badge-medium{background:#fde68a;color:#78350f}
.badge-low{background:#bfdbfe;color:#1e3a8a}
.tbl-wrap{overflow-x:auto;border:1px solid #e5e7eb;border-radius:6px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f9fafb;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#4b5563;text-align:left;padding:8px;border-bottom:1px solid #e5e7eb}
td{padding:6px 8px;border-bottom:1px solid #f3f4f6;vertical-align:top}
tbody tr:hover{background:#f9fafb}
.t-right{text-align:right}
.truncate{max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:bottom}
.mono{font-family:'SF Mono',Monaco,Consolas,'Courier New',monospace;font-size:11px}
.rec{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;display:inline-block}
.rec-KEEP{background:#d1fae5;color:#065f46}
.rec-SCALE{background:#bbf7d0;color:#14532d}
.rec-ADD_NEGATIVE{background:#fee2e2;color:#991b1b}
.rec-PAUSE{background:#fecaca;color:#7f1d1d}
.rec-REPLACE{background:#fed7aa;color:#9a3412}
.rec-REVIEW{background:#fef3c7;color:#854d0e}
.rec-MONITOR{background:#e5e7eb;color:#4b5563}
.pill{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;background:#eff6ff;color:#1e40af;margin-right:4px;margin-bottom:2px}
.pill-green{background:#d1fae5;color:#065f46}
.spinner{border:3px solid #e5e7eb;border-top-color:#3b82f6;border-radius:50%;width:36px;height:36px;animation:spin .8s linear infinite;margin:48px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;font-size:11px;color:#9ca3af;margin-top:24px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}}
.text-red{color:#dc2626}
.text-green{color:#047857}
.text-gray{color:#6b7280}
.font-bold{font-weight:700}
.text-sm{font-size:13px}
.text-xs{font-size:11px}
</style>
</head>
<body>
<header class="header">
<div class="header-inner">
<div style="display:flex;gap:10px;align-items:center"><span style="font-size:22px">AI</span><div><h1>Agent Google Doscom</h1><div class="header-sub">AI Insights v3 - Phan tich theo nhom san pham</div></div></div>
<div style="display:flex;gap:10px;align-items:center;font-size:13px"><a href="/">Dashboard</a><span style="color:#d1d5db">|</span><button onclick="location.reload()" style="color:#6b7280">Refresh</button></div>
</div>
</header>
<main id="main"><div id="loading"><div class="spinner"></div><p style="text-align:center;color:#6b7280;margin-top:8px">Dang tai bao cao...</p></div></main>
<script>
console.log('[AgentPage] script loaded, starting...');
var REPORT = null;
var currentCat = null;

function fmtVND(n){if(n==null||n===0)return '0';if(Math.abs(n)>=1e6)return (n/1e6).toFixed(1)+'tr';if(Math.abs(n)>=1e3)return (n/1e3).toFixed(0)+'K';return Math.round(n).toLocaleString('vi-VN')}
function fmtInt(n){return n==null?'-':n.toLocaleString('vi-VN')}
function fmtPct(n,d){if(d==null)d=2;return n==null?'-':(n*100).toFixed(d)+'%'}
function esc(s){if(s==null)return '';return String(s).split('&').join('&amp;').split('<').join('&lt;').split('>').join('&gt;').split('"').join('&quot;')}
function get(o,k,d){return (o&&o[k]!=null)?o[k]:d}

function load(){
  console.log('[AgentPage] load() called');
  var url = 'data/google-ads-daily-report.json?v='+Date.now();
  fetch(url).then(function(res){
    console.log('[AgentPage] fetch status:', res.status);
    if(!res.ok) throw new Error('HTTP '+res.status);
    return res.json();
  }).then(function(r){
    console.log('[AgentPage] JSON parsed, score:', r.score, 'categories:', Object.keys(r.categories||{}).length);
    REPORT = r;
    try { render(r); console.log('[AgentPage] render done'); }
    catch(err){ console.error('[AgentPage] render error:', err); showError('Loi render: '+err.message+'<br><pre>'+esc(err.stack||'')+'</pre>'); }
  }).catch(function(e){
    console.error('[AgentPage] fetch failed:', e);
    showError('Khong tai duoc bao cao: '+esc(e.message));
  });
}

function showError(msg){
  document.getElementById('main').innerHTML = '<div class="card" style="border-left:4px solid #dc2626;background:#fef2f2"><h3 style="color:#991b1b">Loi</h3><div style="margin-top:8px;font-size:13px">'+msg+'</div></div>';
}

function render(r){
  var g = r.grade || 'F';
  var cats = r.categories || {};
  var catKeys = [];
  for(var k in cats){
    if(cats[k].ads_spend_30d>0 || cats[k].keywords_count>0 || cats[k].banners_count>0) catKeys.push(k);
  }
  if(!currentCat && catKeys.length) currentCat = catKeys[0];
  var t = r.totals || {};
  var html = '';

  // Summary
  html += '<section class="grid-summary">';
  html += '<div class="card card-score bg-'+g+'"><div class="metric-label" style="color:rgba(255,255,255,.8)">Score</div>';
  html += '<div class="metric-value">'+r.score+'<span style="font-size:18px;opacity:.8">/100</span></div>';
  html += '<div style="font-size:14px;font-weight:600;margin-top:4px">Grade '+g+'</div></div>';
  html += '<div class="card"><div class="metric-label">ROAS proxy</div>';
  html += '<div class="metric-value '+(t.roas_overall<1?'text-red':'')+'">'+(t.roas_overall||0)+'x</div>';
  html += '<div class="metric-sub">Spend: '+fmtVND(t.ads_spend_30d)+'d - Rev: '+fmtVND(t.website_revenue_30d)+'d</div></div>';
  html += '<div class="card"><div class="metric-label">Hanh dong</div>';
  html += '<div class="metric-value">'+(t.total_actions||0)+'</div>';
  html += '<div class="metric-sub text-red">'+(t.urgent_actions||0)+' urgent</div></div>';
  html += '<div class="card"><div class="metric-label">Tiet kiem tiem nang</div>';
  html += '<div class="metric-value text-green">'+fmtVND(t.estimated_total_saving_vnd)+'d</div>';
  html += '<div class="metric-sub">/30 ngay</div></div>';
  html += '</section>';

  // Verdict
  html += '<section class="block card">';
  html += '<p style="font-weight:600;font-size:13px">'+esc(r.headline)+'</p>';
  html += '<p class="text-sm" style="margin-top:8px;color:#374151">'+esc(r.verdict)+'</p>';
  var period = r.period || {};
  html += '<p class="text-xs" style="color:#9ca3af;margin-top:6px">Generated: '+esc(r.generated_at)+' - Ky: '+esc(period.start)+' den '+esc(period.end)+'</p>';
  html += '</section>';

  // Products ranking
  html += '<section class="block card"><h2>Xep hang San pham theo Doanh thu (Pancake 30d)</h2>';
  html += '<div class="tbl-wrap"><table><thead><tr>';
  html += '<th>#</th><th>San pham</th><th>Category</th><th class="t-right">Doanh thu</th>';
  html += '<th class="t-right">Don</th><th class="t-right">AOV</th><th>Top keyword convert</th>';
  html += '</tr></thead><tbody>';
  var pr = r.products_ranking || [];
  for(var i=0;i<pr.length;i++){
    var p = pr[i];
    var kws = '';
    var krel = p.related_keywords_top_convert || [];
    for(var j=0;j<krel.length;j++){
      kws += '<span class="pill pill-green">'+esc(krel[j].text)+' ('+krel[j].conv_30d+')</span>';
    }
    if(!kws) kws = '<span class="text-gray">-</span>';
    html += '<tr><td class="text-gray">'+(i+1)+'</td>';
    html += '<td class="font-bold">'+esc(p.product)+'</td>';
    html += '<td><span class="pill">'+esc(p.category_name)+'</span></td>';
    html += '<td class="t-right text-green font-bold">'+fmtVND(p.revenue_30d)+'d</td>';
    html += '<td class="t-right">'+fmtInt(p.orders_30d)+'</td>';
    html += '<td class="t-right text-xs text-gray">'+fmtVND(p.avg_order_value)+'d</td>';
    html += '<td class="text-xs">'+kws+'</td></tr>';
  }
  html += '</tbody></table></div></section>';

  // Tabs
  html += '<section class="block card"><h2>Phan tich chi tiet theo Nhom san pham</h2><div class="cat-tabs">';
  for(var idx=0;idx<catKeys.length;idx++){
    var ck = catKeys[idx];
    var cc = cats[ck];
    var act = ck===currentCat;
    var hasUrgent = false;
    var sa = cc.summary_actions || [];
    for(var sai=0;sai<sa.length;sai++){ if(sa[sai].priority==='high'){hasUrgent=true;break;} }
    html += '<button class="cat-tab '+(act?'active':'')+'" onclick="switchCat(\''+ck+'\',event)">';
    html += esc(cc.display_name)+(hasUrgent?' <span style="color:#ef4444">o</span>':'')+'</button>';
  }
  html += '</div><div id="cat-content">'+renderCategory(cats[currentCat])+'</div></section>';

  // Key findings
  html += '<section class="block card" style="background:#eff6ff"><h3>Key Findings</h3><ul style="margin-left:16px;font-size:13px">';
  var kf = r.key_findings || [];
  for(var ki=0;ki<kf.length;ki++){ if(kf[ki]) html += '<li>'+esc(kf[ki])+'</li>'; }
  html += '</ul></section>';

  html += '<div class="footer">Agent Google Doscom v'+(r.version||'3.0')+' - Chay 3 ngay/lan luc 7:30 sang VN</div>';
  document.getElementById('main').innerHTML = html;
}

function switchCat(key, ev){
  currentCat = key;
  var tabs = document.querySelectorAll('.cat-tab');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
  var t = (ev && ev.target) ? ev.target : null;
  if(t) t.classList.add('active');
  document.getElementById('cat-content').innerHTML = renderCategory(REPORT.categories[key]);
}

function renderCategory(c){
  if(!c) return '<p class="text-gray">Khong co data.</p>';
  var html = '';

  // Overview
  html += '<div class="cat-overview">';
  html += '<div class="cat-overview-item"><div class="lbl">San pham</div><div class="val text-xs">'+((c.products||[]).join(', ')||'-')+'</div></div>';
  html += '<div class="cat-overview-item"><div class="lbl">Ads Spend</div><div class="val">'+fmtVND(c.ads_spend_30d)+'d</div></div>';
  html += '<div class="cat-overview-item"><div class="lbl">Revenue</div><div class="val text-green">'+fmtVND(c.revenue_pancake_30d)+'d</div></div>';
  html += '<div class="cat-overview-item"><div class="lbl">ROAS</div><div class="val '+(c.roas_proxy>=1.5?'text-green':'text-red')+'">'+c.roas_proxy+'x</div></div>';
  html += '<div class="cat-overview-item"><div class="lbl">Don</div><div class="val">'+fmtInt(c.orders_pancake_30d)+'</div></div>';
  html += '<div class="cat-overview-item"><div class="lbl">Avg CTR</div><div class="val">'+fmtPct(c.ads_ctr_30d)+'</div></div>';
  html += '</div>';

  // Actions
  var sa = c.summary_actions || [];
  if(sa.length){
    html += '<h3>Hanh dong de xuat</h3><div class="grid-2">';
    for(var i=0;i<sa.length;i++){
      var a = sa[i];
      html += '<div class="action-box priority-'+a.priority+'">';
      html += '<div style="display:flex;justify-content:space-between;gap:8px"><span class="title">'+esc(a.title)+'</span>';
      html += '<span class="badge badge-'+a.priority+'">'+a.priority+'</span></div>';
      html += '<div class="detail">'+esc(a.detail)+'</div>';
      if(a.estimated_saving_vnd>0) html += '<div class="save">Tiet kiem: '+fmtVND(a.estimated_saving_vnd)+'d/30d</div>';
      html += '</div>';
    }
    html += '</div>';
  } else {
    html += '<p class="text-xs text-gray" style="margin-bottom:12px">Khong co hanh dong can thuc hien.</p>';
  }

  // Keywords
  var kws = c.keywords || [];
  html += '<h3 style="margin-top:16px">Keywords ('+(c.keywords_count||0)+' meaningful, top '+kws.length+')</h3>';
  if(!kws.length){
    html += '<p class="text-xs text-gray">Khong co keyword.</p>';
  } else {
    html += '<div class="tbl-wrap"><table><thead><tr>';
    html += '<th>Keyword</th><th>Match</th><th>Status</th><th class="t-right">Spend</th>';
    html += '<th class="t-right">Click</th><th class="t-right">CTR</th><th class="t-right">Conv</th>';
    html += '<th>Rec</th><th>Ly do</th></tr></thead><tbody>';
    for(var ki=0;ki<kws.length;ki++){
      var k = kws[ki];
      html += '<tr><td><span class="truncate" title="'+esc(k.text)+'">'+esc(k.text)+'</span></td>';
      html += '<td class="text-xs">'+esc(k.match_type)+'</td>';
      html += '<td class="text-xs">'+esc(k.status)+'</td>';
      html += '<td class="t-right">'+fmtVND(k.spend_30d)+'d</td>';
      html += '<td class="t-right">'+fmtInt(k.clicks_30d)+'</td>';
      html += '<td class="t-right">'+fmtPct(k.ctr_30d)+'</td>';
      html += '<td class="t-right '+(k.conv_30d>0?'text-green font-bold':'text-gray')+'">'+k.conv_30d+'</td>';
      html += '<td><span class="rec rec-'+k.recommendation+'">'+k.recommendation+'</span></td>';
      html += '<td class="text-xs text-gray">'+esc(k.reason)+'</td></tr>';
    }
    html += '</tbody></table></div>';
  }

  // Banners
  var bs = c.banners || [];
  html += '<h3 style="margin-top:16px">Banners / Ads ('+(c.banners_count||0)+' meaningful, top '+bs.length+')</h3>';
  if(!bs.length){
    html += '<p class="text-xs text-gray">Khong co banner.</p>';
  } else {
    html += '<div class="tbl-wrap"><table><thead><tr>';
    html += '<th>Ad name</th><th>Format</th><th>Size</th><th>Campaign</th>';
    html += '<th class="t-right">Spend</th><th class="t-right">Imp</th>';
    html += '<th class="t-right">Click</th><th class="t-right">CTR</th>';
    html += '<th>Rec</th><th>Ly do</th></tr></thead><tbody>';
    for(var bi=0;bi<bs.length;bi++){
      var b = bs[bi];
      html += '<tr><td class="mono" title="'+esc(b.ad_id)+'">'+esc(b.ad_name)+'</td>';
      html += '<td class="text-xs">'+esc(b.ad_format)+'</td>';
      html += '<td class="text-xs">'+esc(b.current_size)+'</td>';
      html += '<td class="text-xs truncate" title="'+esc(b.campaign)+'">'+esc(b.campaign)+'</td>';
      html += '<td class="t-right">'+fmtVND(b.spend_30d)+'d</td>';
      html += '<td class="t-right">'+fmtInt(b.impressions_30d)+'</td>';
      html += '<td class="t-right">'+fmtInt(b.clicks_30d)+'</td>';
      html += '<td class="t-right">'+fmtPct(b.ctr_30d)+'</td>';
      html += '<td><span class="rec rec-'+b.recommendation+'">'+b.recommendation+'</span></td>';
      html += '<td class="text-xs text-gray">'+esc(b.reason)+'</td></tr>';
    }
    html += '</tbody></table></div>';
  }

  return html;
}

load();
console.log('[AgentPage] script init complete, load() called');
</script>
</body>
</html>
