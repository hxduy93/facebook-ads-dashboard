<script>
// â•گâ•گâ•گ LOADING SCREEN â€” runs immediately, before React â•گâ•گâ•گ
(function() {
  if (typeof THREE === 'undefined') { document.getElementById('loading-overlay').style.display='none'; return; }

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.z = 4.2;
  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.getElementById('loading-three').appendChild(renderer.domElement);
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Build globe dotted cloud
  const RADIUS=1.3, TOTAL=3500, PHI=(1+Math.sqrt(5))/2;
  function noise(x,y,z){
    let n=0;
    n+=Math.sin(x*2.8+1.3)*Math.cos(y*3.2-0.6);
    n+=Math.sin(y*4.1+2.1)*Math.cos(z*2.9+1.7);
    n+=Math.sin(z*3.5-0.8)*0.85;
    n+=Math.cos(x*5.6)*Math.sin(z*4.2)*0.55;
    n+=Math.sin(x*1.3)*Math.cos(y*1.1)*0.7;
    return n;
  }
  const cloud=[], nodes=[];
  for (let i=0;i<TOTAL;i++){
    const y=1-(i/(TOTAL-1))*2, r=Math.sqrt(1-y*y), t=(2*Math.PI*i)/PHI;
    const x=Math.cos(t)*r, z=Math.sin(t)*r;
    if (noise(x,y,z)>0.1) {
      const px=x*RADIUS, py=y*RADIUS, pz=z*RADIUS;
      cloud.push(px,py,pz);
      if (Math.random()<0.018) nodes.push(px,py,pz);
    }
  }
  const keptDots = cloud.length/3;

  const cloudGeom = new THREE.BufferGeometry();
  cloudGeom.setAttribute('position', new THREE.Float32BufferAttribute(cloud,3));
  const cloudPts = new THREE.Points(cloudGeom, new THREE.PointsMaterial({
    color:0x00a8d8, size:0.017, transparent:true, opacity:0.75, sizeAttenuation:true,
    depthWrite:false, blending:THREE.AdditiveBlending
  }));
  const nodeGeom = new THREE.BufferGeometry();
  nodeGeom.setAttribute('position', new THREE.Float32BufferAttribute(nodes,3));
  const nodePts = new THREE.Points(nodeGeom, new THREE.PointsMaterial({
    color:0x9df9ff, size:0.08, transparent:true, opacity:1.0, sizeAttenuation:true,
    depthWrite:false, blending:THREE.AdditiveBlending
  }));
  const innerSphere = new THREE.Mesh(
    new THREE.SphereGeometry(RADIUS*0.94,32,32),
    new THREE.MeshBasicMaterial({ color:0x001020, transparent:true, opacity:0.6, depthWrite:false })
  );
  const linesGroup = new THREE.Group();
  function rebuildLines(){
    while(linesGroup.children.length) linesGroup.remove(linesGroup.children[0]);
    const nC = nodes.length/3;
    for (let i=0;i<28;i++){
      const a=Math.floor(Math.random()*nC), b=Math.floor(Math.random()*nC);
      if (a===b) continue;
      const pa=new THREE.Vector3(nodes[a*3],nodes[a*3+1],nodes[a*3+2]);
      const pb=new THREE.Vector3(nodes[b*3],nodes[b*3+1],nodes[b*3+2]);
      const d=pa.distanceTo(pb);
      if (d>1.7 || d<0.3) continue;
      linesGroup.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([pa,pb]),
        new THREE.LineBasicMaterial({ color:0x00d4ff, transparent:true, opacity:0.25+Math.random()*0.45 })
      ));
    }
  }
  rebuildLines();
  const linesInt = setInterval(rebuildLines, 900);

  const outer = new THREE.Mesh(
    new THREE.SphereGeometry(RADIUS*1.06,24,16),
    new THREE.MeshBasicMaterial({ color:0x003855, wireframe:true, transparent:true, opacity:0.12 })
  );
  const globe = new THREE.Group();
  globe.add(innerSphere); globe.add(cloudPts); globe.add(nodePts); globe.add(linesGroup); globe.add(outer);
  globe.rotation.x = 0.35;
  scene.add(globe);

  document.getElementById('loading-nodeCount').innerHTML = 'NODES â•گ ' + keptDots.toLocaleString() + ' / ' + TOTAL.toLocaleString() + '<div class="dash">NETWORK ACTIVE</div>';
  const clockInt = setInterval(() => {
    document.getElementById('loading-clock').textContent = new Date().toTimeString().slice(0,8);
  }, 500);

  let rafId;
  function animate(){
    rafId = requestAnimationFrame(animate);
    globe.rotation.y += 0.0028;
    renderer.render(scene,camera);
  }
  animate();

  // â”€â”€ Typing effect â”€â”€
  function typeText(el, text, msPerChar, keepCursor, done){
    let i=0;
    el.innerHTML='<span class="type-cursor"></span>';
    const iv=setInterval(()=>{
      i++;
      el.innerHTML=text.substring(0,i)+'<span class="type-cursor"></span>';
      if (i>=text.length){
        clearInterval(iv);
        if (!keepCursor) el.innerHTML=text;
        if (done) done();
      }
    }, msPerChar);
  }

  let dotsInt;
  setTimeout(()=>{
    typeText(document.getElementById('loading-prefix'), '> PROJECT', 50, false, ()=>{
      setTimeout(()=>{
        typeText(document.getElementById('loading-brand'), 'DOSCOM', 90, false, ()=>{
          const t = document.getElementById('loading-trailer');
          let n=0; t.innerHTML='LOADING';
          dotsInt = setInterval(()=>{ n=(n+1)%4; t.textContent='LOADING'+'.'.repeat(n); }, 220);
        });
      }, 120);
    });
  }, 150);

  // â”€â”€ Progress bar â€” 3s total â”€â”€
  let p=0;
  const fill = document.getElementById('loading-fill');
  const pct  = document.getElementById('loading-pct');
  function tick(){
    p += Math.random()*3 + 2;
    if (p>100) p=100;
    fill.style.width = p + '%';
    pct.textContent = Math.floor(p) + '%';
    if (p<100) setTimeout(tick, 65);
    else setTimeout(fadeOut, 400);
  }
  setTimeout(tick, 200);

  function fadeOut(){
    const ov = document.getElementById('loading-overlay');
    ov.classList.add('hide');
    // Clean up after transition
    setTimeout(()=>{
      clearInterval(linesInt);
      clearInterval(clockInt);
      if (dotsInt) clearInterval(dotsInt);
      cancelAnimationFrame(rafId);
      renderer.dispose();
      if (ov.parentNode) ov.parentNode.removeChild(ov);
    }, 700);
  }
})();
</script>

const fmtVND = (n) => {
  if (n == null || isNaN(n)) return "â€”"
  const sign = n < 0 ? "-" : ""
  const a = Math.abs(n)
  if (a >= 1e9) return sign + (a / 1e9).toFixed(2) + " tل»·"
  if (a >= 1e6) return sign + (a / 1e6).toFixed(1) + " tr"
  if (a >= 1e3) return sign + (a / 1e3).toFixed(0) + "K"
  return sign + Math.round(a).toString()
}
// Format tiل»پn ؤ‘ل؛§y ؤ‘ل»§ cأ³ dل؛¥u phأ¢n cأ،ch phل؛§n nghأ¬n (vi-VN) â€” dأ¹ng cho bل؛£ng Lل»£i nhuل؛­n

// Get date range based on filter key.
// IMPORTANT: all Date math is done in UTC to avoid the browser-local-timezone
// bug where `new Date("2026-04-09T00:00:00")` in a UTC+7 browser becomes
// 2026-04-08T17:00Z, causing .toISOString() to return the wrong day.
function getDateRange(filterKey, customRange) {
  const today = new Date(TODAY + "T00:00:00Z")  // parse as UTC, not local
  if (filterKey === "custom") {
    const s = customRange && customRange.start
    const e = customRange && customRange.end
    if (!s || !e) {
      // Default: last 7 days khi chئ°a chل»چn
      const start = new Date(today); start.setUTCDate(start.getUTCDate() - 6)
      return { start: start.toISOString().slice(0, 10), end: TODAY }
    }
    // Swap nل؛؟u user nhل؛­p end < start
    return { start: s <= e ? s : e, end: s <= e ? e : s }
  }
  if (filterKey === "today") {
    return { start: TODAY, end: TODAY }
  }
  if (filterKey === "yesterday") {
    const y = new Date(today); y.setUTCDate(y.getUTCDate() - 1)
    const ys = y.toISOString().slice(0, 10)
    return { start: ys, end: ys }
  }
  if (filterKey === "lastweek") {
    // Tuل؛§n trئ°ل»›c: thل»© 2 â†’ chل»§ nhل؛­t cل»§a tuل؛§n liل»پn trئ°ل»›c (theo lل»‹ch ISO, tأ­nh ل»ں UTC)
    const dow = today.getUTCDay() // 0=CN, 1=T2, ..., 6=T7
    const toMon = (dow === 0 ? 6 : dow - 1)
    const monThis = new Date(today); monThis.setUTCDate(monThis.getUTCDate() - toMon)
    const monLast = new Date(monThis); monLast.setUTCDate(monLast.getUTCDate() - 7)
    const sunLast = new Date(monLast); sunLast.setUTCDate(sunLast.getUTCDate() + 6)
    return { start: monLast.toISOString().slice(0, 10), end: sunLast.toISOString().slice(0, 10) }
  }
  if (filterKey === "thismonth") {
    // Ngأ y 1 cل»§a thأ،ng hiل»‡n tل؛،i â†’ hأ´m nay
    const y = today.getUTCFullYear(), m = today.getUTCMonth()
    const first = new Date(Date.UTC(y, m, 1))
    return { start: first.toISOString().slice(0, 10), end: TODAY }
  }
  if (filterKey === "lastmonth") {
    // Ngأ y 1 ؤ‘ل؛؟n ngأ y cuل»‘i cل»§a thأ،ng trئ°ل»›c
    const y = today.getUTCFullYear(), m = today.getUTCMonth()
    const first = new Date(Date.UTC(y, m - 1, 1))
    const last  = new Date(Date.UTC(y, m, 0))  // day 0 cل»§a thأ،ng nأ y = ngأ y cuل»‘i thأ،ng trئ°ل»›c
    return { start: first.toISOString().slice(0, 10), end: last.toISOString().slice(0, 10) }
  }
  const f = TIME_FILTERS.find(f => f.key === filterKey)
  const start = new Date(today); start.setUTCDate(start.getUTCDate() - (f.days - 1))
  return { start: start.toISOString().slice(0, 10), end: TODAY }
}

// Filter daily array by date range
function filterDaily(daily, range) {
  return daily.filter(d => d.date >= range.start && d.date <= range.end)
}

// Sum daily metrics
function sumDaily(daily) {
  return daily.reduce((acc, d) => ({
    spend: acc.spend + (d.spend || 0),
    impressions: acc.impressions + (d.impressions || 0),
    clicks: acc.clicks + (d.clicks || 0),
    reach: acc.reach + (d.reach || 0),
    registrations: acc.registrations + (d.registrations || 0)
  }), { spend: 0, impressions: 0, clicks: 0, reach: 0, registrations: 0 })
}

// =============================================================
// JS port cل»§a detect_profit_product() trong update_dashboard.py â€” PHل؛¢I giل»¯ ؤ‘ل»“ng bل»™.
function detectProfitProduct(name) {
  if (!name) return null
  let n = name.toLowerCase().replace(/_/g, " ").replace(/-/g, " ")
  n = n.split(/\s+/).filter(Boolean).join(" ")
  if (n.includes("da8.1 pro") || n.includes("da 8.1 pro") || n.includes("da8 1 pro")) return "DA8.1 Pro"
  if (n.includes("da8.1") || n.includes("da 8.1") || n.includes("da8 1")) return "DA8.1"
  if (n.includes("noma 922") || n.includes("noma922")) return "Noma 922"
  if (n.includes("noma 911") || n.includes("noma911")) return "Noma 911"
  if (n.includes("dr4 plus") || n.includes("dr4plus")) return "DR4 Plus"
  if (n.includes("dr1")) return "DR1"
  if (n.includes("dv1 pro") || n.includes("dv1pro")) return "DV1 Pro"
  if (n.includes("d1 pro") || n.includes("d1pro")) return "D1 Pro"
  if (n.includes("d8 pro") || n.includes("d8pro")) return "D8 Pro"
  for (const code of ["d1", "d2", "d3", "d4"]) {
    // Dأ¹ng non-lookbehind regex ؤ‘ل»ƒ tئ°ئ،ng thأ­ch Safari cإ©
    const re = new RegExp(`(?:^|[^a-z0-9])${code}(?:[^a-z0-9]|$)`)
    if (re.test(n)) return code.toUpperCase()
  }
  return null
}

function accountShortLabel(accountId) {

// Trل؛£ vل»پ danh sأ،ch campaign ؤ‘أ£ match ؤ‘أ؛ng product cho staff + spend trong dateRange
function campaignsForProduct(product, adKeys, range) {
  const campaigns = (typeof DATA !== "undefined" ? DATA.campaigns : null) || []
  const adKeySet = new Set(adKeys)
  const rows = []
  campaigns.forEach(c => {
    const staff = ACCOUNT_STAFF[c.account_id]
    if (!adKeySet.has(staff)) return
    if (detectProfitProduct(c.name || "") !== product) return
    let spendInRange = 0
    ;(c.daily || []).forEach(d => {
      if (d.date >= range.start && d.date <= range.end) spendInRange += (d.spend || 0)
    })
    rows.push({
      id: c.id,
      name: c.name || "(khأ´ng tأھn)",
      accountId: c.account_id,
      accountShort: accountShortLabel(c.account_id),
      staff,
      spend: spendInRange,
    })
  })
  rows.sort((a, b) => b.spend - a.spend)
  return rows
}

// Trل؛£ vل»پ list campaign KHأ”NG match SP nأ o (ؤ‘ل»ƒ debug tأھn campaign sai chuل؛©n)
function unassignedCampaigns(adKeys, range) {

  const rows = []
  campaigns.forEach(c => {

    if (!adKeySet.has(staff)) return
    if (detectProfitProduct(c.name || "") !== null) return
    let spendInRange = 0
    ;(c.daily || []).forEach(d => {
      if (d.date >= range.start && d.date <= range.end) spendInRange += (d.spend || 0)
    })
    if (spendInRange <= 0) return
    rows.push({
      id: c.id,
      name: c.name || "(khأ´ng tأھn)",
      accountId: c.account_id,
      accountShort: accountShortLabel(c.account_id),
      staff,
      spend: spendInRange,
    })
  })
  rows.sort((a, b) => b.spend - a.spend)
  return rows
}

// =============================================================
// REVENUE HELPERS (Pancake POS â€” data/product-revenue.json)
// =============================================================
// Ad data dأ¹ng tأھn rأ؛t gل»چn (D1, Noma911, DR1). Pancake dأ¹ng tأھn ؤ‘ل؛§y ؤ‘ل»§
// (D1, DR1, Noma 911, Noma 922, DA8.1, DA8.1 Pro). Normalize 2 chiل»پu.
const AD_TO_REV_NAME = {
  "D1": "D1",
  "DR1": "DR1",
  "Noma911": "Noma 911",
  "Noma922": "Noma 922",
  "DA8.1": "DA8.1",
  "DA8.1 Pro": "DA8.1 Pro"
}

// Sum revenue of 1 product trong khoل؛£ng date range (inclusive)
function sumRevenueForProduct(adName, range) {
  const rev = (typeof DATA !== "undefined" ? DATA.revenue : null) || {}
  const products = rev.products || {}
  const revName = AD_TO_REV_NAME[adName] || adName
  const p = products[revName]
  if (!p || !p.by_date) return 0
  let total = 0
  for (const [date, amount] of Object.entries(p.by_date)) {
    if (date >= range.start && date <= range.end) total += amount || 0
  }
  return total
}

// Sum revenue cho nhiل»پu products + build daily-by-date dataset
function revenueByDate(adNames, range) {
  const rev = (typeof DATA !== "undefined" ? DATA.revenue : null) || {}
  const products = rev.products || {}
  const map = {}
  adNames.forEach(adName => {
    const revName = AD_TO_REV_NAME[adName] || adName
    const p = products[revName]
    if (!p || !p.by_date) return
    for (const [date, amount] of Object.entries(p.by_date)) {
      if (date < range.start || date > range.end) continue
      map[date] = (map[date] || 0) + (amount || 0)
    }
  })
  return map
}

  const filteredAccounts = selectedAccount === "all" ? accounts : accounts.filter(a => a.id === selectedAccount)

  // Aggregate KPIs based on time filter
  const kpis = useMemo(() => {
    let totals = { spend: 0, impressions: 0, clicks: 0, reach: 0, registrations: 0 }
    filteredAccounts.forEach(a => {
      const t = sumDaily(filterDaily(a.daily, dateRange))
      Object.keys(totals).forEach(k => totals[k] += t[k])
    })
    totals.cpl = totals.registrations ? totals.spend / totals.registrations : 0
    totals.ctr = totals.impressions ? (totals.clicks / totals.impressions * 100) : 0

  // 7d vs 7d comparison (always last 7 vs prev 7, regardless of filter)
  const weekComp = useMemo(() => {

    const today = new Date(TODAY + "T00:00:00Z")  // UTC â€” trأ،nh shift timezone
    const prevStart = new Date(today); prevStart.setUTCDate(prevStart.getUTCDate() - 13)
    const prevEnd = new Date(today); prevEnd.setUTCDate(prevEnd.getUTCDate() - 7)
    const prevRange = { start: prevStart.toISOString().slice(0,10), end: prevEnd.toISOString().slice(0,10) }
    const sumAcrossAccounts = (range) => {
      let s = { spend: 0, registrations: 0 }
      filteredAccounts.forEach(a => {
        const t = sumDaily(filterDaily(a.daily, range))
        s.spend += t.spend
        s.registrations += t.registrations
      })
      return s
    }
    return { last: sumAcrossAccounts(last7Range), prev: sumAcrossAccounts(prevRange) }
  }, [filteredAccounts])

  // Products data filtered by time + account (account filter doesn't affect products since products span accounts)
  const productsData = useMemo(() => {
    const list = Object.entries(DATA.products).map(([name, daily]) => {
      // If account filter is active, recompute from campaigns
      let dailyFiltered
      if (selectedAccount === "all") {
        dailyFiltered = filterDaily(daily, dateRange)
      } else {
        // Aggregate from campaigns of this product in selected account
        const camps = DATA.campaigns.filter(c => c.product === name && c.account_id === selectedAccount)
        const map = {}
        camps.forEach(c => {
          c.daily.forEach(d => {
            if (!map[d.date]) map[d.date] = { date: d.date, spend: 0, registrations: 0, impressions: 0, clicks: 0 }
            map[d.date].spend += d.spend

      const revenue = sumRevenueForProduct(name, dateRange)

// Current time in Vietnam timezone (+07:00) formatted as "YYYY-MM-DDTHH:MM"
// for <input type="datetime-local"> default value.
function nowVnDatetime() {
  const now = new Date()
  const vn = new Date(now.getTime() + (now.getTimezoneOffset() + 7 * 60) * 60000)
  const y = vn.getFullYear()
  const m = String(vn.getMonth() + 1).padStart(2, "0")
  const d = String(vn.getDate()).padStart(2, "0")
  const hh = String(vn.getHours()).padStart(2, "0")
  const mm = String(vn.getMinutes()).padStart(2, "0")
  return `${y}-${m}-${d}T${hh}:${mm}`
}

    "ALL":           { label: "Team Ads FB",   sources: ["DUY", "PHUONG_NAM"],                                  adKeys: ["DUY", "PHUONG_NAM"], color: { bg: "bg-red-50",     border: "border-red-300" },     showCloseBtn: false },

    // WEBSITE â€” component riأھng (GoogleAdsProfit) vل»›i rows theo category + spend Google Ads

  }

  if (staff.isGoogleAds) {

  const isInRange = (ymd) => {
    if (!dateRange?.start || !dateRange?.end) return true

  const VAT_RATE = 0.10

  // Helper: compute rows cho 1 tل؛­p status.
  // Ad spend dأ¹ng CHUNG cho cل؛£ 2 bل؛£ng (chi phأ­ thل؛­t sل»± ؤ‘أ£ tiأھu, khأ´ng phأ¢n biل»‡t ؤ‘ئ،n cأ³ hoأ n hay khأ´ng).
  const computeRows = (STATUSES_KEEP) => {
    const rows = PRODUCTS.map(p => {
      let revenueP = 0
      let unitsP = 0
      let ordersP = 0
      staff.sources.forEach(srcKey => {

          if (pData.units_by_date) {

          } else if (pData.units && pData.total > 0) {
            const inRangeRev = Object.entries(pData.by_date || {})
              .filter(([d]) => isInRange(d))
              .reduce((s, [, v]) => s + (v || 0), 0)
            const ratio = pData.total > 0 ? inRangeRev / pData.total : 0
            unitsP += Math.round((pData.units || 0) * ratio)

          if (pData.orders_by_date) {
            Object.entries(pData.orders_by_date).forEach(([d, c]) => {
              if (isInRange(d)) ordersP += (c || 0)

          }

      staff.adKeys.forEach(adKey => {

        })
      })

      return {
        product: p,

    return { rows, tot, totMargin }

        <div className="flex items-center gap-2 mb-2 flex-wrap">

            Gل»“m <span className="font-semibold">ؤگأ£ giao + ؤگang hoأ n + ؤگang xل»­ lأ½</span> آ· <span className="text-red-600 font-semibold">ؤگأƒ LOل؛ I ؤگأ£ hoأ n + ؤگأ£ hل»§y</span>

  )

// 5 micro category (khأ´ng map SP Pancake â€” chل»‰ trل»« spend): CAM4G / CAMWIFI / CAMNLMT / ANTIREC / RAZOR
//   â†’ lل؛¥y spend tل»« campaigns_raw, match regex tأھn campaign (mل»—i SP cأ³ 1 camp Search + 1 camp Remarketing)
// 1 bucket tل»•ng hل»£p: OTHER_MISC â€” cأ،c camp cأ²n lل؛،i cل»§a OTHER_CAM/OTHER_SIM/OTHER khأ´ng match micro (Cam Mini, Sim 4G, mأ،y massage, rل»­a hoa quل؛£, thiل؛؟t bل»‹ chؤƒm sأ³câ€¦)
const GOOGLE_CATEGORIES = [
  { key: "MAYDO",     label: "Mأ،y dأ²",                 products: ["D1", "D1 Pro", "D2", "D3", "D4", "D8 Pro"] },
  { key: "DINHVI",    label: "ؤگل»‹nh vل»‹",                products: ["DV1 Pro"] },
  { key: "GHIAM",     label: "Ghi أ¢m",                 products: ["DR1", "DR4 Plus"] },
  { key: "CAMCALL",   label: "Camera gل»چi 2 chiل»پu",     products: ["DA8.1", "DA8.1 Pro"] },
  { key: "CAM4G",     label: "Camera 4G",              products: [], isMicro: true,
    campaignTest: n => /cam(?:era)?\s*4g/i.test(n) },
  { key: "CAMWIFI",   label: "Camera WiFi",            products: [], isMicro: true,
    campaignTest: n => /cam(?:era)?\s*wifi/i.test(n) },
  { key: "CAMNLMT",   label: "Camera NLMT (nؤƒng lئ°ل»£ng mل؛·t trل»‌i)", products: [], isMicro: true,
    campaignTest: n => /nlmt/i.test(n) || /nؤƒng lئ°ل»£ng mل؛·t trل»‌i/i.test(n) },
  { key: "ANTIREC",   label: "Chل»‘ng ghi أ¢m",           products: [], isMicro: true,
    campaignTest: n => /chل»‘ng\s*ghi\s*أ¢m/i.test(n) || /chong\s*ghi\s*am/i.test(n) },
  { key: "RAZOR",     label: "Mأ،y cل؛،o rأ¢u",            products: [], isMicro: true,
    campaignTest: n => /cل؛،o\s*rأ¢u/i.test(n) || /cao\s*rau/i.test(n) },
  { key: "OTHER_MISC", label: "Khأ،c (Cam Mini, Sim 4G, mأ،y massage, rل»­a hoa quل؛£, thiل؛؟t bل»‹ chؤƒm sأ³câ€¦)", products: [], isMisc: true },
]
// Category gل»‘c (trong by_category) mأ  micro sل؛½ re-categorize lل؛،i (5 nhأ³m "OTHER_*" cل»§a script detect cإ©)
const GOOGLE_OTHER_SOURCE_KEYS = ["OTHER_CAM", "OTHER_DI", "OTHER_SIM", "OTHER_RAZOR", "OTHER"]

function GoogleAdsProfit({ dateRange, onClose }) {
  const revenue = (typeof DATA !== "undefined" ? DATA.revenue : null) || {}
  const groups = revenue.source_groups || {}
  const productCosts = (typeof DATA !== "undefined" ? DATA.product_costs : null) || {}
  const googleAds = (typeof DATA !== "undefined" ? DATA.google_ads : null) || { by_category: {}, campaigns_raw: [] }
  const [campModal, setCampModal] = useState(null)

  const isInRange = (ymd) => {
    if (!dateRange?.start || !dateRange?.end) return true
    return ymd >= dateRange.start && ymd <= dateRange.end
  }
  const VAT_RATE = 0.10
  const SOURCE = "WEBSITE"
  const g = groups[SOURCE]

  // Pre-build micro + OTHER_MISC spend buckets tل»« campaigns_raw.
  // Chل»‰ re-categorize cأ،c campaign thuل»™c category gل»‘c "OTHER_*" (khأ´ng ؤ‘ل»¥ng MAYDO/DINHVI/GHIAM/CAMCALL).
  const microSpend = {}
  GOOGLE_CATEGORIES.filter(c => c.isMicro || c.key === "OTHER_MISC").forEach(c => {
    microSpend[c.key] = { by_date: {}, _total: 0, campaigns: new Set() }
  })
  ;(googleAds.campaigns_raw || []).forEach(row => {
    if (!GOOGLE_OTHER_SOURCE_KEYS.includes(row.category)) return
    const name = row.campaign || ""
    let target = null
    for (const cat of GOOGLE_CATEGORIES) {
      if (cat.campaignTest && cat.campaignTest(name)) { target = cat.key; break }
    }
    if (!target) target = "OTHER_MISC"
    const d = row.date
    const sp = Number(row.spend) || 0
    if (!microSpend[target]) return
    microSpend[target].by_date[d] = (microSpend[target].by_date[d] || 0) + sp
    microSpend[target]._total += sp
    microSpend[target].campaigns.add(name)
  })

  const computeRows = (STATUSES_KEEP) => {
    const rows = GOOGLE_CATEGORIES.map(cat => {
      let revenueC = 0, unitsC = 0, ordersC = 0, costTotal = 0
      // Micro + Misc category khأ´ng cأ³ product mapping â†’ khأ´ng tأ­nh revenue Pancake
      if (g && !cat.isMisc && !cat.isMicro) {
        cat.products.forEach(p => {
          STATUSES_KEEP.forEach(stKey => {
            const pData = g.products_by_status?.[stKey]?.[p]
            if (!pData) return
            Object.entries(pData.by_date || {}).forEach(([d, v]) => {
              if (isInRange(d)) revenueC += (v || 0)
            })
            let unitsProd = 0
            if (pData.units_by_date) {
              Object.entries(pData.units_by_date).forEach(([d, u]) => {
                if (isInRange(d)) unitsProd += (u || 0)
              })
            } else if (pData.units && pData.total > 0) {
              const inRangeRev = Object.entries(pData.by_date || {})
                .filter(([d]) => isInRange(d)).reduce((s, [, v]) => s + (v || 0), 0)
              const ratio = pData.total > 0 ? inRangeRev / pData.total : 0
              unitsProd = Math.round((pData.units || 0) * ratio)
            }
            unitsC += unitsProd
            const costEntry = productCosts[p] || {}
            const costPerUnit = Number(costEntry.gia_nhap_vnd) || 0
            costTotal += costPerUnit * unitsProd
            if (pData.orders_by_date) {
              Object.entries(pData.orders_by_date).forEach(([d, c]) => {
                if (isInRange(d)) ordersC += (c || 0)
              })
            }
          })
        })
      }

      // Google Ads spend â€” micro/misc lل؛¥y tل»« microSpend (re-categorize), main lل؛¥y tل»« by_category
      let spendC = 0
      if (cat.isMicro || cat.key === "OTHER_MISC") {
        const bucket = microSpend[cat.key]
        if (bucket && bucket.by_date) {
          Object.entries(bucket.by_date).forEach(([d, v]) => {
            if (isInRange(d)) spendC += (v || 0)
          })
        }
      } else {
        const bucket = googleAds.by_category[cat.key]
        if (bucket && bucket.by_date) {
          Object.entries(bucket.by_date).forEach(([d, v]) => {
            if (isInRange(d)) spendC += (v || 0)
          })
        }
      }

      const vat = revenueC * VAT_RATE
      const profit = revenueC - vat - spendC - costTotal
      const margin = revenueC > 0 ? (profit / revenueC) * 100 : null
      return {
        cat: cat.key,
        label: cat.label,
        products: cat.products,
        isMisc: !!cat.isMisc,
        isMicro: !!cat.isMicro,
        units: unitsC,
        orders: ordersC,
        revenue: revenueC,
        vat,
        adSpend: spendC,
        totalCost: costTotal,
        profit,
        margin,
      }
    })
    const tot = rows.reduce((a, r) => ({
      revenue: a.revenue + r.revenue,
      vat: a.vat + r.vat,
      adSpend: a.adSpend + r.adSpend,
      totalCost: a.totalCost + r.totalCost,
      profit: a.profit + r.profit,
      units: a.units + r.units,
      orders: a.orders + r.orders,
    }), { revenue: 0, vat: 0, adSpend: 0, totalCost: 0, profit: 0, units: 0, orders: 0 })
    const totMargin = tot.revenue > 0 ? (tot.profit / tot.revenue) * 100 : null
    return { rows, tot, totMargin }
  }

  const beforeReturns = computeRows(["delivered", "returning", "other", "returned"])
  // SAU HOأ€N: khل»›p Pancake POS â€” chل»‰ giل»¯ delivered + other. Loل؛،i returning + returned + canceled.
  const afterReturns  = computeRows(["delivered", "other"])
  const lossByReturns = beforeReturns.tot.profit - afterReturns.tot.profit

  const renderTable = (data) => (

            <th className="py-2 px-3 text-right font-semibold">ؤگئ،n</th>
            <th className="py-2 px-3 text-right font-semibold">DT Website</th>
            <th className="py-2 px-3 text-right font-semibold text-amber-700">VAT 10%</th>
            <th className="py-2 px-3 text-right font-semibold text-blue-700">Google Ads</th>
            <th className="py-2 px-3 text-right font-semibold">خ£ Giأ، nhل؛­p</th>
            <th className="py-2 px-3 text-right font-bold border-l border-gray-300">Lل»¢I NHUل؛¬N</th>
            <th className="py-2 px-3 text-right font-semibold">Biأھn LN</th>
          </tr>
        </thead>
        <tbody>
          {data.rows.map(r => {
            const hasData = r.revenue > 0 || r.adSpend > 0
            return (
              <tr key={r.cat} className={`border-b border-gray-100 ${hasData ? "" : "opacity-40"} hover:bg-gray-50/60`}>
                <td className="py-2 px-3 font-semibold text-gray-900 max-w-[300px]">
                  <span className="inline-flex items-center gap-1.5 flex-wrap">
                    <span>{r.label}</span>
                    <button
                      onClick={() => setCampModal({ category: r.cat, isMisc: r.isMisc, isMicro: r.isMicro })}
                      className="text-[9px] px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 font-bold hover:bg-blue-600 hover:text-white border border-blue-300 tracking-wider"
                      title={`Xem campaign Google Ads nhأ³m ${r.label}`}
                    >
                      CAMP
                    </button>
                  </span>
                  {!r.isMisc && !r.isMicro && r.products.length > 0 && (
                    <div className="text-[10px] text-gray-500 mt-0.5 font-normal">{r.products.join(", ")}</div>
                  )}
                  {r.isMicro && (
                    <div className="text-[10px] text-gray-500 mt-0.5 font-normal italic">1 camp Search + 1 camp Remarketing</div>
                  )}
                </td>
                <td className="py-2 px-3 text-right text-gray-800">{r.units > 0 ? fmtNum(r.units) : "â€”"}</td>
                <td className="py-2 px-3 text-right text-gray-600">{r.orders > 0 ? fmtNum(r.orders) : "â€”"}</td>
                <td className="py-2 px-3 text-right font-semibold text-gray-900">{r.revenue > 0 ? fmtVNDFull(r.revenue) + "â‚«" : "â€”"}</td>
                <td className="py-2 px-3 text-right text-amber-700">{r.vat > 0 ? "-" + fmtVNDFull(r.vat) + "â‚«" : "â€”"}</td>
                <td className="py-2 px-3 text-right text-blue-700">{r.adSpend > 0 ? "-" + fmtVNDFull(r.adSpend) + "â‚«" : "â€”"}</td>
                <td className="py-2 px-3 text-right text-gray-700">{r.totalCost > 0 ? "-" + fmtVNDFull(r.totalCost) + "â‚«" : "â€”"}</td>
                <td className={`py-2 px-3 text-right font-extrabold border-l border-gray-300 ${r.profit > 0 ? "text-emerald-700" : r.profit < 0 ? "text-red-600" : "text-gray-400"}`}>
                  {hasData ? fmtVNDFull(r.profit) + "â‚«" : "â€”"}
                </td>
                <td className={`py-2 px-3 text-right font-semibold ${r.margin == null ? "text-gray-300" : r.margin > 0 ? "text-emerald-700" : "text-red-600"}`}>
                  {r.margin == null ? "â€”" : r.margin.toFixed(1) + "%"}
                </td>
              </tr>
            )
          })}
          <tr className="bg-gray-100 border-t-2 border-gray-300">
            <td className="py-3 px-3 font-extrabold text-gray-900">Tل»”NG</td>
            <td className="py-3 px-3 text-right font-bold text-gray-900">{fmtNum(data.tot.units)}</td>
            <td className="py-3 px-3 text-right font-bold text-gray-900">{fmtNum(data.tot.orders)}</td>
            <td className="py-3 px-3 text-right font-bold text-gray-900">{fmtVNDFull(data.tot.revenue)}â‚«</td>
            <td className="py-3 px-3 text-right font-bold text-amber-700">-{fmtVNDFull(data.tot.vat)}â‚«</td>
            <td className="py-3 px-3 text-right font-bold text-blue-700">-{fmtVNDFull(data.tot.adSpend)}â‚«</td>
            <td className="py-3 px-3 text-right font-bold text-gray-800">-{fmtVNDFull(data.tot.totalCost)}â‚«</td>
            <td className={`py-3 px-3 text-right font-extrabold border-l border-gray-300 ${data.tot.profit > 0 ? "text-emerald-700" : "text-red-600"}`}>{fmtVNDFull(data.tot.profit)}â‚«</td>
            <td className={`py-3 px-3 text-right font-bold ${data.totMargin == null ? "text-gray-400" : data.totMargin > 0 ? "text-emerald-700" : "text-red-600"}`}>
              {data.totMargin == null ? "â€”" : data.totMargin.toFixed(1) + "%"}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  )

  return (
    <div className="mb-6 rounded-xl border-2 border-emerald-300 bg-emerald-50 p-5 shadow-sm">
      <div className="flex items-start justify-between mb-4 flex-wrap gap-2">
        <div>
          <h2 className="text-lg font-bold text-gray-900 tracking-tight flex items-center gap-2">
            <DollarSign className="w-5 h-5 text-emerald-600" /> Lل»£i nhuل؛­n â€” Google Ads / Website
          </h2>
          <p className="text-xs text-gray-600 mt-1">
            Doanh thu: <span className="font-semibold">Pancake nguل»“n Website</span> آ· Chi phأ­: <span className="font-semibold">Google Ads TK {googleAds.account_name || "MHDI"}</span> آ· {fmtDate(dateRange.start)} â†’ {fmtDate(dateRange.end)}
            {" آ· "}
            <span className="font-mono text-[10px] bg-white/80 px-1.5 py-0.5 rounded border border-gray-200">
              LN = DT âˆ’ DTأ—10% VAT âˆ’ Google Ads âˆ’ Giأ، nhل؛­p أ— SL
            </span>
          </p>
        </div>
        <button
          onClick={onClose}
          className="text-xs px-3 py-1.5 rounded-md bg-white border border-gray-300 hover:bg-gray-100 text-gray-600"
          title="ؤگأ³ng (quay vل»پ Team Ads FB)"
        >
          âœ• ؤگأ³ng
        </button>
      </div>

      {/* Bل؛¢NG 1 â€” TRئ¯ل»ڑC HOأ€N */}
      <div className="mb-2">
        <div className="flex items-center gap-2 mb-2 flex-wrap">
          <span className="text-xs font-bold text-amber-900 bg-amber-100 px-2 py-1 rounded border border-amber-300">ًں“ٹ LN TRئ¯ل»ڑC HOأ€N</span>
          <span className="text-[11px] text-gray-600">Gل»“m <span className="font-semibold">ؤگأ£ giao + ؤگang hoأ n + ؤگang xل»­ lأ½ + ؤگأ£ hoأ n</span> آ· loل؛،i ؤگأ£ hل»§y</span>
        </div>

      </div>

      <div className="my-3 px-4 py-3 bg-white rounded-lg border-2 border-dashed border-gray-300 flex flex-wrap items-center justify-center gap-x-4 gap-y-2 text-sm">
        <span className="text-gray-700">
          LN trئ°ل»›c hoأ n: <span className={`font-extrabold ${beforeReturns.tot.profit > 0 ? "text-emerald-700" : "text-red-600"}`}>{fmtVNDFull(beforeReturns.tot.profit)}â‚«</span>
        </span>
        <span className="text-gray-400 text-lg">â†’</span>
        <span className="text-gray-700">
          Hoأ n mل؛¥t: <span className={`font-extrabold ${lossByReturns > 0 ? "text-red-600" : "text-gray-500"}`}>-{fmtVNDFull(Math.abs(lossByReturns))}â‚«</span>
        </span>
        <span className="text-gray-400 text-lg">â†’</span>
        <span className="text-gray-700">
          LN sau hoأ n: <span className={`font-extrabold ${afterReturns.tot.profit > 0 ? "text-emerald-700" : "text-red-600"}`}>{fmtVNDFull(afterReturns.tot.profit)}â‚«</span>
        </span>
      </div>

      {/* Bل؛¢NG 2 â€” SAU HOأ€N */}
      <div className="mt-2">
        <div className="flex items-center gap-2 mb-2 flex-wrap">
          <span className="text-xs font-bold text-white bg-emerald-600 px-2 py-1 rounded border border-emerald-700">âœ… LN SAU HOأ€N</span>
          <span className="text-[11px] text-gray-600">Gل»“m <span className="font-semibold">ؤگأ£ giao + ؤگang hoأ n + ؤگang xل»­ lأ½</span> آ· <span className="text-red-600 font-semibold">ؤگأƒ LOل؛ I ؤگأ£ hoأ n + ؤگأ£ hل»§y</span></span>
        </div>
        {renderTable(afterReturns)}
      </div>

      <p className="text-[11px] text-gray-600 mt-3 italic">
        * Doanh thu = Pancake nguل»“n Website (khأ´ng kل»ƒ Zalo OA + Hotline) آ· Google Ads spend = TK MHDI, category detect tل»« tأھn campaign (RMK/Search/Shopping) آ· 4 dأ²ng ؤ‘ل؛§u (Mأ،y dأ²/ؤگل»‹nh vل»‹/Ghi أ¢m/Camera gل»چi 2 chiل»پu) cأ³ mapping SP â†’ tأ­nh LN thل؛­t. 5 dأ²ng micro (Camera 4G/WiFi/NLMT, Chل»‘ng ghi أ¢m, Mأ،y cل؛،o rأ¢u) + "Khأ،c" = SP khأ´ng cأ³ DT tل»« nguل»“n Website â†’ LN = 0 âˆ’ spend. Data Google Ads sync tل»« Windsor.ai â€” cل؛­p nhل؛­t thل»§ cأ´ng qua file <code className="bg-white px-1 rounded border">data/google-ads-spend.json</code>.
      </p>

      {campModal && (
        <GoogleCampaignsModal
          category={campModal.category}

          isMicro={campModal.isMicro}

          onClose={() => setCampModal(null)}
        />
      )}
    </div>
  )
}

function GoogleCampaignsModal({ category, isMisc, isMicro, dateRange, onClose }) {
  const googleAds = (typeof DATA !== "undefined" ? DATA.google_ads : null) || { campaigns_raw: [] }
  const raw = googleAds.campaigns_raw || []

  // Micro / OTHER_MISC â†’ match campaign theo regex cل»§a category (khأ´ng filter theo r.category).
  // Main category (MAYDO/DINHVI/GHIAM/CAMCALL) â†’ filter r.category === category.
  // OTHER_MISC â†’ chل»‰ cأ،c campaign thuل»™c source keys "OTHER_*" + KHأ”NG match regex micro nأ o.
  const catDef = GOOGLE_CATEGORIES.find(c => c.key === category)
  const isOtherMisc = category === "OTHER_MISC"
  const microCats = GOOGLE_CATEGORIES.filter(c => c.isMicro)

  const byCampaign = {}
  raw.forEach(r => {
    if (r.date < dateRange.start || r.date > dateRange.end) return
    let match = false
    if (isMicro && catDef && catDef.campaignTest) {
      // Chل»‰ cأ،c campaign thuل»™c source "OTHER_*" + match regex cل»§a micro category nأ y
      if (GOOGLE_OTHER_SOURCE_KEYS.includes(r.category) && catDef.campaignTest(r.campaign || "")) {
        match = true
      }
    } else if (isOtherMisc) {
      // Cأ،c campaign source "OTHER_*" khأ´ng match regex micro nأ o
      if (GOOGLE_OTHER_SOURCE_KEYS.includes(r.category)) {
        const matchedMicro = microCats.some(c => c.campaignTest && c.campaignTest(r.campaign || ""))
        if (!matchedMicro) match = true
      }
    } else if (isMisc) {
      // (backward compat â€” khأ´ng cأ²n dأ¹ng sau refactor, nhئ°ng giل»¯ an toأ n)
      if (GOOGLE_OTHER_SOURCE_KEYS.includes(r.category)) match = true
    } else {
      // Main category
      if (r.category === category) match = true
    }
    if (!match) return

    const key = r.campaign
    byCampaign[key] = byCampaign[key] || { name: key, category: r.category, spend: 0, clicks: 0, impressions: 0 }
    byCampaign[key].spend += (r.spend || 0)
    byCampaign[key].clicks += (r.clicks || 0)
    byCampaign[key].impressions += (r.impressions || 0)
  })
  const rows = Object.values(byCampaign).sort((a, b) => b.spend - a.spend)
  const total = rows.reduce((s, r) => s + r.spend, 0)
  const title = isOtherMisc
    ? "Google Ads â€” KHأپC (Cam Mini / Sim 4G / mأ،y khأ،c)"
    : (catDef ? `Google Ads â€” ${catDef.label}` : `Google Ads â€” ${category}`)

  return (
    <div className="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-xl shadow-2xl max-w-4xl w-full max-h-[85vh] overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="px-5 py-4 border-b border-gray-200 flex items-center justify-between bg-gradient-to-r from-emerald-50 to-teal-50">
          <div className="min-w-0">
            <h3 className="font-bold text-gray-900 text-base">ًں“ٹ {title}</h3>
            <p className="text-[11px] text-gray-600 mt-0.5">
              {fmtDate(dateRange.start)} â†’ {fmtDate(dateRange.end)} آ· {rows.length} campaign آ· Tل»•ng: <span className="font-bold text-blue-700">{fmtVND(total)}â‚«</span>
            </p>
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-xl font-bold w-8 h-8 flex items-center justify-center rounded hover:bg-gray-100 flex-shrink-0 ml-2">âœ•</button>
        </div>
        <div className="overflow-y-auto flex-1 p-4">
          {rows.length === 0 ? (
            <p className="text-sm text-gray-500 text-center py-12 italic">
              Khأ´ng cأ³ campaign Google Ads nأ o thuل»™c nhأ³m nأ y trong range {fmtDate(dateRange.start)} â†’ {fmtDate(dateRange.end)}.
            </p>
          ) : (
            <table className="w-full text-xs">
              <thead>
                <tr className="bg-gray-50 border-b-2 border-gray-200 text-gray-700">
                  <th className="py-2 px-2 text-left font-semibold w-8">#</th>
                  <th className="py-2 px-2 text-left font-semibold">Campaign</th>
                  <th className="py-2 px-2 text-left font-semibold">Category</th>
                  <th className="py-2 px-2 text-right font-semibold">Clicks</th>
                  <th className="py-2 px-2 text-right font-semibold">Spend</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => (

  const STAFF_FILTER_MAP = {
    ALL:           { label: "Tل؛¥t cل؛£",     sourceKeys: groupsOrder },
    DUY:           { label: "Duy",        sourceKeys: ["DUY"] },
    PHUONG_NAM:    { label: "Phئ°ئ،ng Nam", sourceKeys: ["PHUONG_NAM"] },
    WEBSITE_STAFF: { label: "WEBSITE",    sourceKeys: ["WEBSITE", "ZALO_OA", "HOTLINE"] },
  }
  const STAFF_FILTER_ORDER = ["ALL", "DUY", "PHUONG_NAM", "WEBSITE_STAFF"]

  // Brand color cho tل»«ng group
  const GROUP_COLOR = {
    "DUY":        { bg: "bg-blue-50",   border: "border-blue-300",   text: "text-blue-700",   bar: "bg-blue-500"   },
    "PHUONG_NAM": { bg: "bg-purple-50", border: "border-purple-300", text: "text-purple-700", bar: "bg-purple-500" },
    "WEBSITE":    { bg: "bg-emerald-50",border: "border-emerald-300",text: "text-emerald-700",bar: "bg-emerald-500"},
    "ZALO_OA":    { bg: "bg-amber-50",  border: "border-amber-300",  text: "text-amber-700",  bar: "bg-amber-500"  },
    "HOTLINE":    { bg: "bg-red-50",    border: "border-red-300",    text: "text-red-700",    bar: "bg-red-500"    },
  }

  // Helper: filter by_date theo dateRange
  const isInRange = (ymd) => {
    if (!dateRange?.start || !dateRange?.end) return true
    return ymd >= dateRange.start && ymd <= dateRange.end
  }

  // Danh sأ،ch nguل»“n ؤ‘ئ°ل»£c show dل»±a theo staffFilter
  const activeSourceKeys = STAFF_FILTER_MAP[staffFilter].sourceKeys

  // KHل»ڑP POS PANCAKE â€” chل»‰ giل»¯ delivered + other (loل؛،i returning/returned/canceled).
  // Match RevenueByStaffBreakdown.STATUSES_KEEP ؤ‘ل»ƒ 2 bل؛£ng consistent.
  const STATUSES_KEEP = ["delivered", "other"]

  // Tأ­nh revenue + orders mل»—i group trong range, kأ¨m breakdown theo product
  const rows = activeSourceKeys.map(key => {
    const g = groups[key]
    if (!g) return null
    const prodTotals = {}
    const prodOrders = {}
    let totalRev = 0

    // Field mل»›i (cأ³ tأ،ch status) vs field cإ© (fallback)
    const hasProductsByStatus = !!g.products_by_status
    const hasOrderCountByStatus = !!g.order_count_by_status_by_date
    const hasOrderRevByStatus = !!g.order_revenue_by_status_by_date
    const hasOrdersByDate = !!g.total_orders_by_date

    PRODUCTS.forEach(p => {
      let sum = 0
      let ord = 0
      if (hasProductsByStatus) {
        STATUSES_KEEP.forEach(st => {
          const pData = g.products_by_status[st]?.[p] || {}
          Object.entries(pData.by_date || {}).forEach(([d, v]) => {
            if (isInRange(d)) sum += (v || 0)
          })
          Object.entries(pData.orders_by_date || {}).forEach(([d, c]) => {
            if (isInRange(d)) ord += (c || 0)
          })
        })
      } else {
        // Fallback: snapshot cإ© â€” dأ¹ng products merged (all status). Khأ´ng khل»›p POS 100%.
        const pData = g.products?.[p] || {}
        Object.entries(pData.by_date || {}).forEach(([d, v]) => {
          if (isInRange(d)) sum += (v || 0)
        })
        if (pData.orders_by_date) {
          Object.entries(pData.orders_by_date).forEach(([d, c]) => {
            if (isInRange(d)) ord += (c || 0)
          })
        } else {
          ord = pData.orders || 0
        }
      }
      prodTotals[p] = sum
      prodOrders[p] = ord
    })

    // Tل»•ng doanh thu nguل»“n (khأ´ng bأ³ 13 SP chأ­nh) â€” match POS:
    if (hasOrderRevByStatus) {
      totalRev = 0
      STATUSES_KEEP.forEach(st => {
        Object.entries(g.order_revenue_by_status_by_date[st] || {}).forEach(([d, v]) => {
          if (isInRange(d)) totalRev += (v || 0)
        })
      })
    } else {
      // Fallback: sum 13 SP (kأ©m chأ­nh xأ،c vأ¬ bل»ڈ SP phل»¥)
      totalRev = PRODUCTS.reduce((s, p) => s + (prodTotals[p] || 0), 0)
    }

    // Tل»•ng ؤ‘ئ،n nguل»“n (loل؛،i hoأ n/hل»§y)
    let totalOrders = 0
    if (hasOrderCountByStatus) {
      STATUSES_KEEP.forEach(st => {
        Object.entries(g.order_count_by_status_by_date[st] || {}).forEach(([d, c]) => {
          if (isInRange(d)) totalOrders += (c || 0)
        })
      })
    } else if (hasOrdersByDate) {
      Object.entries(g.total_orders_by_date).forEach(([d, c]) => {
        if (isInRange(d)) totalOrders += c
      })
    } else {
      totalOrders = g.total_orders || 0
    }

    return {
      key,
      label: g.label || key,
      totalRev,
      totalOrders,
      prodTotals,
      prodOrders,
      color: GROUP_COLOR[key] || GROUP_COLOR["DUY"],
      fallbackOrders: !hasOrderCountByStatus && !hasOrdersByDate,
    }
  }).filter(Boolean)

  // Grand total (sum cأ،c group ؤ‘ang hiل»ƒn thل»‹) ؤ‘ل»ƒ tأ­nh % share
  const grandRev = rows.reduce((s, r) => s + r.totalRev, 0)
  const grandOrders = rows.reduce((s, r) => s + r.totalOrders, 0)
  const anyFallback = rows.some(r => r.fallbackOrders)
  // Product totals (across all groups ؤ‘ang hiل»ƒn thل»‹) for column bar scale
  const productMax = {}
  PRODUCTS.forEach(p => {
    productMax[p] = Math.max(1, ...rows.map(r => r.prodTotals[p] || 0))
  })

  // Grid column count tأ¹y sل»‘ nguل»“n ؤ‘ang hiل»ƒn thل»‹
  const gridColsCls = rows.length >= 5 ? "md:grid-cols-5"
                    : rows.length === 3 ? "md:grid-cols-3"
                    : rows.length === 2 ? "md:grid-cols-2"
                    : "md:grid-cols-1"

  return (
    <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm mb-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h2 className="text-lg font-bold text-red-700 tracking-tight">ًں’° Doanh thu theo nguل»“n â€” 5 kأھnh bأ،n hأ ng</h2>
          <p className="text-xs text-gray-500 mt-1">
            Pancake POS آ· lل»چc theo nhأ¢n sل»±: <span className="font-semibold text-gray-700">{STAFF_FILTER_MAP[staffFilter].label}</span>
            {" آ· "}{rows.length} nguل»“n
          </p>
        </div>
        <div className="text-right">
          <div className="text-xs text-gray-500">Tل»•ng</div>
          <div className="text-xl font-extrabold text-gray-900">{fmtVND(grandRev)}â‚«</div>
          <div className="text-[11px] text-gray-500">{grandOrders.toLocaleString("vi-VN")} ؤ‘ئ،n</div>
        </div>
      </div>

      {/* Toggle filter theo NHأ‚N Sل»° */}
      <div className="mb-4">
        <p className="text-[11px] font-semibold text-gray-500 uppercase tracking-wide mb-2">Chل»چn nhأ¢n sل»±</p>
        <div className="flex flex-wrap gap-2">
          {STAFF_FILTER_ORDER.map(k => (
            <button
              key={k}
              onClick={() => setStaffFilter(k)}
              className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition border ${
                staffFilter === k
                  ? "bg-red-600 text-white border-red-600 shadow-sm"
                  : "bg-white text-gray-700 border-gray-200 hover:bg-red-50 hover:border-red-200"
              }`}
            >
              {STAFF_FILTER_MAP[k].label}
            </button>
          ))}
        </div>
      </div>

      {/* Card hأ ng ngang: 1 card / group ؤ‘ang hiل»ƒn thل»‹ */}
      <div className={`grid grid-cols-1 ${gridColsCls} gap-3 mb-5`}>
        {rows.map(r => {
          const pct = grandRev > 0 ? (r.totalRev / grandRev * 100) : 0
          return (
            <div key={r.key} className={`rounded-lg border ${r.color.border} ${r.color.bg} p-3`}>
              <div className={`text-xs font-bold uppercase tracking-wide ${r.color.text} mb-1`}>{r.label}</div>
              <div className="text-xl font-extrabold text-gray-900 leading-tight">{fmtVND(r.totalRev)}â‚«</div>
              <div className="text-[11px] text-gray-600 mt-1">{r.totalOrders.toLocaleString("vi-VN")} ؤ‘ئ،n آ· {pct.toFixed(1)}%</div>
              <div className="mt-2 h-1.5 bg-white/60 rounded-full overflow-hidden">
                <div className={`h-full ${r.color.bar}`} style={{ width: pct + "%" }}></div>
              </div>
            </div>
          )
        })}
      </div>

      {/* Bل؛£ng chi tiل؛؟t: row = product, col = group ؤ‘ang hiل»ƒn thل»‹. Cell: N ؤ‘ئ،n آ· Yâ‚« */}
      <div className="overflow-x-auto">
        <table className="w-full text-xs">
          <thead>
            <tr className="bg-gray-50 border-b border-gray-200">
              <th className="py-2 px-3 text-left font-semibold text-gray-700">Sل؛£n phل؛©m</th>
              {rows.map(r => (
                <th key={r.key} className={`py-2 px-3 text-right font-bold ${r.color.text}`}>{r.label}</th>
              ))}
              <th className="py-2 px-3 text-right font-semibold text-gray-900 border-l border-gray-200">Tل»•ng</th>
            </tr>
          </thead>
          <tbody>
            {PRODUCTS.map(p => {
              const rowTotal = rows.reduce((s, r) => s + (r.prodTotals[p] || 0), 0)
              const rowOrders = rows.reduce((s, r) => s + (r.prodOrders[p] || 0), 0)
              if (rowTotal === 0 && rowOrders === 0) return null
              return (
                <tr key={p} className="border-b border-gray-100 hover:bg-gray-50">
                  <td className="py-2 px-3 font-medium text-gray-800">{p}</td>
                  {rows.map(r => {
                    const v = r.prodTotals[p] || 0
                    const ord = r.prodOrders[p] || 0
                    const pct = productMax[p] > 0 ? (v / productMax[p]) * 100 : 0
                    return (
                      <td key={r.key} className="py-2 px-3 text-right">
                        {v > 0 || ord > 0 ? (
                          <div className="flex flex-col items-end gap-0.5">
                            <span className="font-semibold text-gray-800">{v > 0 ? fmtVND(v) : "â€”"}</span>
                            <span className="text-[10px] text-gray-500">{ord.toLocaleString("vi-VN")} ؤ‘ئ،n</span>
                            {v > 0 && (
                              <div className="w-10 h-1 bg-gray-100 rounded-full overflow-hidden">
                                <div className={`h-full ${r.color.bar}`} style={{ width: pct + "%" }}></div>
                              </div>
                            )}
                          </div>
                        ) : <span className="text-gray-300">â€”</span>}
                      </td>
                    )
                  })}
                  <td className="py-2 px-3 text-right font-bold text-gray-900 border-l border-gray-200">
                    <div className="flex flex-col items-end">
                      <span>{fmtVND(rowTotal)}</span>
                      <span className="text-[10px] font-normal text-gray-500">{rowOrders.toLocaleString("vi-VN")} ؤ‘ئ،n</span>
                    </div>
                  </td>
                </tr>
              )
            })}
            {/* Tل»•ng cل»™t cuل»‘i */}
            <tr className="bg-gray-50 border-t-2 border-gray-300">
              <td className="py-2 px-3 font-bold text-gray-900">Tل»•ng nguل»“n</td>
              {rows.map(r => (
                <td key={r.key} className={`py-2 px-3 text-right font-bold ${r.color.text}`}>
                  <div className="flex flex-col items-end">
                    <span>{fmtVND(r.totalRev)}</span>
                    <span className="text-[10px] font-normal text-gray-500">{r.totalOrders.toLocaleString("vi-VN")} ؤ‘ئ،n</span>
                  </div>
                </td>
              ))}
              <td className="py-2 px-3 text-right font-extrabold text-gray-900 border-l border-gray-200">
                <div className="flex flex-col items-end">
                  <span>{fmtVND(grandRev)}</span>
                  <span className="text-[10px] font-normal text-gray-600">{grandOrders.toLocaleString("vi-VN")} ؤ‘ئ،n</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <p className="text-[11px] text-gray-500 mt-3">
        * Doanh thu + sل»‘ ؤ‘ئ،n theo bل»™ lل»چc thل»‌i gian phأ­a trأھn (mل»چi trل؛،ng thأ،i â€” giao / ؤ‘ang hoأ n / ؤ‘أ£ hoأ n / hل»§y / xل»­ lأ½).
        {anyFallback && (
          <span className="block text-amber-600 mt-1">
            âڑ  Sل»‘ ؤ‘ئ،n ؤ‘ang hiل»ƒn thل»‹ tل»•ng 90 ngأ y (snapshot cإ© chئ°a cأ³ orders_by_date) â€” sل؛½ tل»± cل؛­p nhل؛­t sau khi workflow Pancake chل؛،y lل؛§n kل؛؟.
          </span>
        )}
      </p>
    </div>
  )
}

// =============================================================
// SUB-COMPONENT: Revenue breakdown theo STATUS (ؤ‘أ£ giao / ؤ‘ang hoأ n / ؤ‘أ£ hoأ n / â€¦)
// React theo dateRange + staffFilter (cأ¹ng filter vل»›i box Doanh thu theo nguل»“n).
// Khi staffFilter khأ،c ALL â†’ tل»± compute lل؛،i tل»« DATA.revenue.source_groups[KEY].products_by_status
// =============================================================
function RevenueStatusBreakdown({ dateRange, staffFilter }) {
  const productOrder = [
    "D1", "D1 Pro", "D2", "D3", "D4", "D8 Pro",
    "DR1", "DR4 Plus",
    "DV1 Pro",
    "DA8.1", "DA8.1 Pro",
    "Noma 911", "Noma 922",
  ]

  const STATUS_META = [
    { key: "delivered", label: "ؤگأ£ giao",     color: "text-emerald-600", bg: "bg-emerald-50" },
    { key: "returning", label: "ؤگang hoأ n",   color: "text-amber-600",   bg: "bg-amber-50"   },
    { key: "returned",  label: "ؤگأ£ hoأ n",     color: "text-red-600",     bg: "bg-red-50"     },
    { key: "canceled",  label: "ؤگأ£ hل»§y",      color: "text-gray-500",    bg: "bg-gray-100"   },
    { key: "other",     label: "ؤگang xل»­ lأ½",  color: "text-blue-600",    bg: "bg-blue-50"    }
  ]

  // Mapping nhأ¢n sل»± â†’ danh sأ،ch source keys ؤ‘ل»ƒ gل»™p
  const STAFF_TO_SOURCES = {
    ALL:           ["DUY", "PHUONG_NAM", "WEBSITE", "ZALO_OA", "HOTLINE"],
    DUY:           ["DUY"],
    PHUONG_NAM:    ["PHUONG_NAM"],
    WEBSITE_STAFF: ["WEBSITE", "ZALO_OA", "HOTLINE"],
  }
  const STAFF_LABEL = {
    ALL: "Tل؛¥t cل؛£ nhأ¢n sل»±",
    DUY: "Nhأ¢n sل»± Duy",
    PHUONG_NAM: "Nhأ¢n sل»± Phئ°ئ،ng Nam",
    WEBSITE_STAFF: "Nhأ¢n sل»± WEBSITE (Website + Zalo OA + Hotline)",
  }

  // Self-compute revenueByStatus theo staffFilter + dateRange
  // - Doanh thu per cell: lل؛¥y tل»« source_groups[KEY].products_by_status[status][product].by_date
  // - Sل»‘ ؤ‘ئ،n per cell:    lل؛¥y tل»« source_groups[KEY].products_by_status[status][product].orders_by_date
  const { revenueByStatus, anyFallback } = React.useMemo(() => {
    const revenue = (typeof DATA !== "undefined" ? DATA.revenue : null) || {}
    const groups = revenue.source_groups || {}
    const sourceKeys = STAFF_TO_SOURCES[staffFilter] || STAFF_TO_SOURCES.ALL
    const statusKeys = ["delivered", "returning", "returned", "canceled", "other"]
    const isInRange = (d) => {
      if (!dateRange?.start || !dateRange?.end) return true
      return d >= dateRange.start && d <= dateRange.end
    }

    const result = {}
    let sawOrdersByDate = false
    let sawNoOrdersByDate = false

    statusKeys.forEach(sk => {
      const products = {}       // {product: revenue}
      const productsOrders = {} // {product: orders}
      let total = 0
      let totalOrders = 0

      productOrder.forEach(p => {
        let sum = 0
        let ord = 0
        sourceKeys.forEach(srcKey => {
          const g = groups[srcKey]
          if (!g) return
          const pData = g.products_by_status?.[sk]?.[p] || {}
          // Doanh thu theo date
          Object.entries(pData.by_date || {}).forEach(([d, v]) => {
            if (isInRange(d)) sum += v || 0
          })
          // Sل»‘ ؤ‘ئ،n theo date (nل؛؟u cأ³)
          if (pData.orders_by_date) {
            sawOrdersByDate = true
            Object.entries(pData.orders_by_date).forEach(([d, c]) => {
              if (isInRange(d)) ord += c || 0
            })
          } else if (pData.orders != null) {
            // Fallback: tل»•ng 90d (snapshot cإ©)
            sawNoOrdersByDate = true
            ord += pData.orders || 0
          }
        })
        products[p] = sum
        productsOrders[p] = ord
        total += sum
        totalOrders += ord
      })
      result[sk] = { products, productsOrders, total, totalOrders }
    })

    return {
      revenueByStatus: result,
      anyFallback: sawNoOrdersByDate && !sawOrdersByDate,
    }
  }, [dateRange, staffFilter])

  // Hأ ng "Tل»•ng ؤ‘أ£ tل؛،o" = cل»™ng dل»“n 5 status
  const totalByProduct = {}
  const totalOrdersByProduct = {}
  productOrder.forEach(p => {
    totalByProduct[p]       = STATUS_META.reduce((s, st) => s + (revenueByStatus[st.key]?.products?.[p] || 0), 0)
    totalOrdersByProduct[p] = STATUS_META.reduce((s, st) => s + (revenueByStatus[st.key]?.productsOrders?.[p] || 0), 0)
  })
  const grandTotal  = Object.values(totalByProduct).reduce((s, v) => s + v, 0)
  const grandOrders = Object.values(totalOrdersByProduct).reduce((s, v) => s + v, 0)

  return (
    <div className="mb-6 bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
      <div className="flex items-center justify-between flex-wrap gap-2 mb-1">
        <h2 className="text-lg font-semibold text-gray-900 flex items-center gap-2">
          <Package className="w-5 h-5 text-red-600" />
          Doanh thu theo trل؛،ng thأ،i â€” Pancake
        </h2>
        <div className="text-right">
          <div className="text-[11px] text-gray-500">Tل»•ng ؤ‘أ£ tل؛،o</div>
          <div className="text-base font-extrabold text-red-600">{fmtVND(grandTotal)}â‚«</div>
          <div className="text-[11px] text-gray-500">{grandOrders.toLocaleString("vi-VN")} ؤ‘ئ،n</div>
        </div>
      </div>
      <p className="text-xs text-gray-500 mb-4">
        Bأ³c tأ،ch doanh thu + sل»‘ ؤ‘ئ،n theo status آ· Khoل؛£ng: <span className="font-semibold text-gray-700">{fmtDate(dateRange.start)} â†’ {fmtDate(dateRange.end)}</span> آ· Nhأ¢n sل»±: <span className="font-semibold text-gray-700">{STAFF_LABEL[staffFilter] || "Tل؛¥t cل؛£"}</span>
      </p>
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b-2 border-gray-200 text-gray-600">
              <th className="py-2 px-3 text-left font-semibold">Trل؛،ng thأ،i</th>
              {productOrder.map(p => (
                <th key={p} className="py-2 px-3 text-right font-semibold">{p}</th>
              ))}
              <th className="py-2 px-3 text-right font-bold bg-gray-50">Tل»•ng</th>
            </tr>
          </thead>
          <tbody>
            {STATUS_META.map(st => {
              const row = revenueByStatus[st.key] || { products: {}, productsOrders: {}, total: 0, totalOrders: 0 }
              return (
                <tr key={st.key} className="border-b border-gray-100 hover:bg-gray-50">
                  <td className={`py-2 px-3 font-medium ${st.color}`}>
                    <span className={`inline-block w-2 h-2 rounded-full mr-2 ${st.bg}`} style={{ border: "2px solid currentColor" }} />
                    {st.label}
                    <span className="ml-2 text-[10px] font-normal text-gray-400">({row.totalOrders.toLocaleString("vi-VN")} ؤ‘ئ،n)</span>
                  </td>
                  {productOrder.map(p => {
                    const v = row.products?.[p] || 0
                    const ord = row.productsOrders?.[p] || 0
                    return (
                      <td key={p} className="py-2 px-3 text-right">
                        {v > 0 || ord > 0 ? (
                          <div className="flex flex-col items-end">
                            <span className={`font-medium ${v > 0 ? "text-gray-900" : "text-gray-400"}`}>{v > 0 ? fmtVND(v) + "â‚«" : "â€”"}</span>
                            <span className="text-[10px] text-gray-500">{ord.toLocaleString("vi-VN")} ؤ‘ئ،n</span>
                          </div>
                        ) : <span className="text-gray-300">â€”</span>}
                      </td>
                    )
                  })}
                  <td className={`py-2 px-3 text-right font-bold ${row.total > 0 ? st.color : "text-gray-300"} bg-gray-50`}>
                    {row.total > 0 ? (
                      <div className="flex flex-col items-end">
                        <span>{fmtVND(row.total)}â‚«</span>
                        <span className="text-[10px] font-normal text-gray-500">{row.totalOrders.toLocaleString("vi-VN")} ؤ‘ئ،n</span>
                      </div>
                    ) : "â€”"}
                  </td>
                </tr>
              )
            })}
            <tr className="border-t-2 border-gray-300 bg-gray-50">
              <td className="py-3 px-3 font-bold text-gray-900">
                Tل»•ng ؤ‘أ£ tل؛،o
                <span className="ml-2 text-[10px] font-normal text-gray-600">({grandOrders.toLocaleString("vi-VN")} ؤ‘ئ،n)</span>
              </td>
              {productOrder.map(p => {
                const v = totalByProduct[p] || 0
                const ord = totalOrdersByProduct[p] || 0
                return (
                  <td key={p} className={`py-3 px-3 text-right font-bold ${v > 0 ? "text-gray-900" : "text-gray-300"}`}>
                    {v > 0 || ord > 0 ? (
                      <div className="flex flex-col items-end">
                        <span>{v > 0 ? fmtVND(v) + "â‚«" : "â€”"}</span>
                        <span className="text-[10px] font-normal text-gray-500">{ord.toLocaleString("vi-VN")} ؤ‘ئ،n</span>
                      </div>
                    ) : "â€”"}
                  </td>
                )
              })}
              <td className="py-3 px-3 text-right font-bold text-red-600 bg-red-50">
                {grandTotal > 0 ? (

// SUB-COMPONENT: Performance Analysis (text insights)

function PerformanceAnalysis({ kpis, weekComp, productsData, campaignsFiltered, timeFilter, dateRange }) {
  const filterLabel = TIME_FILTERS.find(f => f.key === timeFilter)?.label || ""

  // ============ HELPER: split daily array into first half / second half
  const splitHalves = (daily) => {
    if (!daily || daily.length < 2) return null
    const mid = Math.floor(daily.length / 2)
    const first = daily.slice(0, mid)
    const second = daily.slice(mid)
    const sumIt = (arr) => arr.reduce((a, d) => ({
      spend: a.spend + (d.spend||0),
      reg: a.reg + (d.registrations||0),
      clicks: a.clicks + (d.clicks||0),
      imp: a.imp + (d.impressions||0)
    }), { spend:0, reg:0, clicks:0, imp:0 })
    return { first: sumIt(first), second: sumIt(second), days: daily.length }
  }

  // ============ PRODUCT DEEP-DIVE ANALYSIS
  const productDiagnoses = productsData.map(p => {
    const t = p.totals
    const cpl = t.registrations ? t.spend / t.registrations : null
    const ctr = t.impressions ? (t.clicks / t.impressions * 100) : 0
    const cpc = t.clicks ? (t.spend / t.clicks) : 0
    const cvr = t.clicks ? (t.registrations / t.clicks * 100) : 0  // click â†’ reg
    const cpm = t.impressions ? (t.spend / t.impressions * 1000) : 0

    // Trend within selected period
    const halves = splitHalves(p.daily)
    let trend = null
    if (halves && halves.days >= 4) {
      const cpl1 = halves.first.reg ? halves.first.spend / halves.first.reg : null
      const cpl2 = halves.second.reg ? halves.second.spend / halves.second.reg : null
      if (cpl1 != null && cpl2 != null) {
        const delta = ((cpl2 - cpl1) / cpl1 * 100)
        trend = { cpl1, cpl2, delta, regDelta: halves.second.reg - halves.first.reg }
      } else if (cpl1 == null && cpl2 != null) {
        trend = { cpl1: null, cpl2, delta: -100, regDelta: halves.second.reg - halves.first.reg, status: "improving" }
      } else if (cpl1 != null && cpl2 == null) {
        trend = { cpl1, cpl2: null, delta: 999, regDelta: halves.second.reg - halves.first.reg, status: "declining" }
      }
    }

    // ============ DIAGNOSIS LOGIC
    // Benchmarks: CTR â‰¥1.5% tل»‘t, CPL <200K tل»‘t, CVR â‰¥2% tل»‘t
    const symptoms = []
    const actions = []
    let severity = "good" // good | warn | bad

    if (!t.registrations) {
      severity = "bad"
      symptoms.push(`ؤگأ£ chi ${fmtVND(t.spend)}â‚« nhئ°ng chئ°a cأ³ ؤ‘ؤƒng kأ½ nأ o`)
      if (ctr < 1) symptoms.push(`CTR rل؛¥t thل؛¥p ${ctr.toFixed(2)}% â†’ creative khأ´ng hل؛¥p dل؛«n`)
      if (cpc > 5000) symptoms.push(`CPC cao ${fmtVND(cpc)}â‚« â†’ ؤ‘ل»‘i tئ°ل»£ng cل؛،nh tranh hoل؛·c creative kأ©m`)
      actions.push("Tل؛،m dل»«ng ngay cأ،c campaign ؤ‘ang chل؛،y cل»§a sل؛£n phل؛©m nأ y")
      actions.push("Thay creative mل»›i (hook 3 giأ¢y ؤ‘ل؛§u, CTA rأµ rأ ng) trئ°ل»›c khi chل؛،y lل؛،i")
      actions.push("Xem lل؛،i form ؤ‘ؤƒng kأ½: sل»‘ trئ°ل»‌ng, tل»‘c ؤ‘ل»™ tل؛£i, mobile UX")
    } else {
      // Has conversions â€” diagnose CPL
      const isHighCpl = cpl > 300000
      const isLowCtr = ctr < 1.2
      const isLowCvr = cvr < 1.5
      const isGoodCtr = ctr >= 1.5
      const isGoodCpl = cpl < 200000

      if (isGoodCpl && isGoodCtr) {
        severity = "good"
        symptoms.push(`CPL tل»‘t ${fmtVND(cpl)}â‚« آ· CTR khoل؛» ${ctr.toFixed(2)}% آ· CVR ${cvr.toFixed(1)}%`)
        actions.push("Tؤƒng ngأ¢n sأ،ch 20â€“30% ؤ‘ل»ƒ scale, theo dأµi CPL khأ´ng vئ°ل»£t 1.3x")
        actions.push("Nhأ¢n bل؛£n campaign sang Lookalike audience ؤ‘ل»ƒ mل»ں rل»™ng quy mأ´")
      } else if (isHighCpl && isLowCtr) {
        severity = "bad"
        symptoms.push(`CPL cao ${fmtVND(cpl)}â‚« + CTR thل؛¥p ${ctr.toFixed(2)}% â†’ creative khأ´ng hأ؛t`)
        actions.push("Refresh creative: thل»­ 3â€“5 hook khأ،c (pain point, social proof, demo nhanh)")
        actions.push("Test format mل»›i: video dل»چc 9:16 â‰¤15s, carousel so sأ،nh, UGC")
        actions.push("Thu hل؛¹p/ؤ‘ل»•i targeting nل؛؟u CPM > 80K")
      } else if (isHighCpl && !isLowCtr && isLowCvr) {
        severity = "warn"
        symptoms.push(`CTR ل»•n ${ctr.toFixed(2)}% nhئ°ng CVR chل»‰ ${cvr.toFixed(1)}% â†’ click vأ o nhئ°ng khأ´ng ؤ‘ؤƒng kأ½`)
        actions.push("Vل؛¥n ؤ‘ل»پ ل»ں landing page/form, khأ´ng phل؛£i quل؛£ng cأ،o")
        actions.push("Rأ؛t gل»چn form (â‰¤4 trئ°ل»‌ng), thأھm mأ£ giل؛£m/ئ°u ؤ‘أ£i rأµ rأ ng")
        actions.push("Kiل»ƒm tra tل»‘c ؤ‘ل»™ tل؛£i mobile, lل»—i pixel, redirect")
      } else if (isHighCpl) {
        severity = "warn"
        symptoms.push(`CPL ${fmtVND(cpl)}â‚« cao hئ،n benchmark`)
        actions.push("A/B test 2 nhأ³m creative khأ،c phong cأ،ch, giل»¯ targeting")
        actions.push("ؤگل؛·t CBO + tل»‘i ئ°u cho conversion, ؤ‘ل»ƒ ML phأ¢n bل»• ngأ¢n sأ،ch")
      } else {
        severity = "good"
        symptoms.push(`CPL ${fmtVND(cpl)}â‚« trong ngئ°ل»،ng tل»‘t آ· CTR ${ctr.toFixed(2)}% آ· CVR ${cvr.toFixed(1)}%`)
        actions.push("Duy trأ¬ creative, scale ngأ¢n sأ،ch tل»« tل»« 15â€“20%/tuل؛§n")
      }

      // Trend overrides
      if (trend && trend.delta > 30) {
        severity = severity === "good" ? "warn" : severity
        symptoms.push(`âڑ ï¸ڈ CPL ؤ‘ang xل؛¥u ؤ‘i: nل»­a ؤ‘ل؛§u kل»³ ${trend.cpl1 ? fmtVND(trend.cpl1) : "â€”"}â‚« â†’ nل»­a cuل»‘i ${trend.cpl2 ? fmtVND(trend.cpl2) : "â€”"}â‚« (+${trend.delta.toFixed(0)}%)`)
        actions.push("Dل؛¥u hiل»‡u audience fatigue: refresh creative trong 3 ngأ y tل»›i hoل؛·c rotate audience")
      } else if (trend && trend.delta < -20) {
        symptoms.push(`ًں“ˆ CPL ؤ‘ang cل؛£i thiل»‡n: ${trend.cpl1 ? fmtVND(trend.cpl1) : "â€”"}â‚« â†’ ${trend.cpl2 ? fmtVND(trend.cpl2) : "â€”"}â‚« (${trend.delta.toFixed(0)}%)`)
        actions.push("ؤگأ  tل»‘t â€” khأ´ng thay ؤ‘ل»•i creative, tؤƒng nhل؛¹ budget 10â€“15%")
      }
    }

    return { name: p.name, t, cpl, ctr, cpc, cvr, cpm, trend, severity, symptoms, actions }
  }).sort((a, b) => (b.t.spend - a.t.spend))

  // ============ CAMPAIGN TREND ANALYSIS
  const campsWithTrend = campaignsFiltered.map(c => {
    const halves = splitHalves(c._daily)
    if (!halves || halves.days < 4) return { ...c, _trend: null }
    const cpl1 = halves.first.reg ? halves.first.spend / halves.first.reg : null
    const cpl2 = halves.second.reg ? halves.second.spend / halves.second.reg : null
    let status = "stable", delta = 0
    if (cpl1 != null && cpl2 != null) {
      delta = ((cpl2 - cpl1) / cpl1 * 100)
      status = delta < -15 ? "improving" : delta > 25 ? "declining" : "stable"
    } else if (cpl1 == null && cpl2 != null && halves.second.reg > 0) {
      status = "improving"; delta = -100
    } else if (cpl1 != null && cpl2 == null && halves.first.reg > 0) {
      status = "declining"; delta = 999
    }
    return { ...c, _trend: { status, delta, cpl1, cpl2, reg1: halves.first.reg, reg2: halves.second.reg } }
  })

  const improving = campsWithTrend.filter(c => c._trend?.status === "improving" && c._spend > 100000).sort((a,b) => (a._trend.delta - b._trend.delta)).slice(0, 4)
  const declining = campsWithTrend.filter(c => c._trend?.status === "declining" && c._spend > 100000).sort((a,b) => (b._trend.delta - a._trend.delta)).slice(0, 4)

  // ============ OVERALL STATS
  const wastedSpend = campaignsFiltered.filter(c => c._reg === 0).reduce((s, c) => s + c._spend, 0)
  const wastedPct = kpis.spend ? (wastedSpend / kpis.spend * 100) : 0
  const overallCtr = kpis.impressions ? (kpis.clicks / kpis.impressions * 100) : 0

  const spendDelta = weekComp.prev.spend ? ((weekComp.last.spend - weekComp.prev.spend) / weekComp.prev.spend * 100) : 0
  const regDelta = weekComp.prev.registrations ? ((weekComp.last.registrations - weekComp.prev.registrations) / weekComp.prev.registrations * 100) : 0

  // Sل؛£n phل؛©m cل؛§n tل»‘i ئ°u (severity bad/warn)
  const needsFix = productDiagnoses.filter(p => p.severity !== "good")

  return (

        </div>

        </div>
        <div className="bg-cyan-50 rounded-lg p-3 border border-cyan-100">
          <p className="text-[10px] uppercase font-semibold text-cyan-700">CTR</p>
          <p className="text-lg font-bold text-cyan-900 mt-1">{overallCtr.toFixed(2)}%</p>
        </div>
        <div className="bg-indigo-50 rounded-lg p-3 border border-indigo-100">
          <p className="text-[10px] uppercase font-semibold text-indigo-700">CVR (clickâ†’ؤگK)</p>

        <div className="bg-purple-50 rounded-lg p-3 border border-purple-100">
