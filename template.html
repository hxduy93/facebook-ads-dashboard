  const handleGoalChange = (g) => {
    setOptGoal(g)
    const goals = OBJECTIVE_GOALS[objective] || []
    const match = goals.find(x => x.goal === g)
    if (match) {
      setDestType(match.dest)
      setAds(curr => curr.map(a => ({ ...a, cta: match.cta })))
    }
  }

  // ── Ad array operations ──
  const addAd = () => {
    setAds(curr => [...curr, makeEmptyAd(curr.length)])
  }

  const removeAd = (id) => {
    setAds(curr => curr.length > 1 ? curr.filter(a => a.id !== id) : curr)
  }

  const updateAd = (id, patch) => {
    setAds(curr => curr.map(a => a.id === id ? { ...a, ...patch } : a))
  }

  const handleVideoSelect = (id, e) => {
    const file = e.target.files[0]
    if (file) {
      updateAd(id, { videoFile: file, imageFile: null, mediaPreview: URL.createObjectURL(file) })
    }
  }

  const handleImageSelect = (id, e) => {
    const file = e.target.files[0]
    if (file) {
      updateAd(id, { imageFile: file, videoFile: null, mediaPreview: URL.createObjectURL(file) })
    }
  }

  // ── Build url_tags string for Meta adcreative.url_tags field ──
  // Format: "utm_source=X&utm_medium=Y&..." — Meta sẽ tự append vào mọi link click
  // Đây là field "Thông số URL" trong Ads Manager UI. Link đích được giữ nguyên.
  const buildUtmString = (ad) => {
    const params = new URLSearchParams()
    if (ad.utmSource)   params.set("utm_source",   ad.utmSource)
    if (ad.utmMedium)   params.set("utm_medium",   ad.utmMedium)
    if (ad.utmCampaign) params.set("utm_campaign", ad.utmCampaign)
    if (ad.utmContent)  params.set("utm_content",  ad.utmContent)
    if (ad.utmTerm)     params.set("utm_term",     ad.utmTerm)
    return params.toString()
  }

  // ── AI generate content for a specific ad ──
  const handleGenerateContent = async (targetAdId) => {
    setAiTargetAdId(targetAdId)
    setAiLoading(true)
    setAiError("")
    setAiVariants([])
    setAiSelectedId(null)
    try {
      const notes = [
        aiKeyword ? `Từ khóa chính phải có: ${aiKeyword}` : "",
        aiDirection ? `Hướng content: ${aiDirection}` : "",
      ].filter(Boolean).join(" | ")

      const res = await fetch("/api/generate-ad-copy", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          product,
          format: objective,
          formatLabel: (OBJECTIVES[objective] || {}).label || objective,
          cta: (ads.find(a => a.id === targetAdId) || {}).cta || "LEARN_MORE",
          notes,
        }),
      })
      const data = await res.json()
      if (!res.ok || !data.variants) {
        throw new Error(data.error || "Lỗi không xác định")
      }
      setAiVariants(data.variants)
    } catch (err) {
      setAiError(err.message)
    } finally {
      setAiLoading(false)
    }
  }

  const handleUseVariant = (v) => {
    if (!aiTargetAdId) return
    updateAd(aiTargetAdId, { headline: v.headline || "", adCopy: v.primary_text || "" })
    setAiSelectedId(v.id)
  }

  // ── Build publish summary ──
  const buildSummary = () => {
    const today = new Date().toISOString().slice(0, 10)
    const objCfg = OBJECTIVES[objective]
    const finalCampaignName = campaignName || `${product} - ${objCfg.label} - ${today}`
    const finalAdsetName = adsetName || `${product} - AdSet - ${today}`

    return {
      campaign_name: finalCampaignName,
      adset_name: finalAdsetName,
      objective,
      objective_label: objCfg.label,
      buying_type: buyingType,
      account_id: account,
      account_name: ACCOUNTS[account] || account,
      page_id: page,
      page_name: (PAGES[page] || page),
      pixel_id: pixel,
      pixel_name: PIXELS[pixel] || pixel,
      optimization_goal: optGoal,
      optimization_goal_label: GOAL_LABELS[optGoal] || optGoal,
      destination_type: destType,
      billing_event: billingEvent,
      // Conversion event (chỉ apply khi optimization_goal = OFFSITE_CONVERSIONS)
      promoted_event: conversionEvent === "OTHER" ? (customEventName.trim() || null) : conversionEvent,
      promoted_event_label: conversionEvent === "OTHER"
        ? (customEventName || "(custom)")
        : ((PIXEL_EVENTS.find(e => e.value === conversionEvent) || {}).label || conversionEvent),
      // Attribution window spec
      attribution_spec: (ATTRIBUTION_PRESETS.find(p => p.value === attributionPreset) || {}).spec || null,
      attribution_label: (ATTRIBUTION_PRESETS.find(p => p.value === attributionPreset) || {}).label || "",
      // Pacing
      pacing_type: pacingType,
      launch_status: launchStatus, // "ACTIVE" | "PAUSED"
      budget_level: budgetLevel, // "campaign" (CBO) | "adset" (ABO)
      budget_type: budgetType,
      budget_amount: Number(budget),
      budget_display: `${Number(budget).toLocaleString("vi-VN")}đ ${budgetType === "daily" ? "/ngày" : "trọn đời"} (${budgetLevel === "campaign" ? "CBO" : "ABO"})`,
      start_time: startDate,
      end_time: endDate,
      // Targeting (Đối tượng) — gender, age, geo
      targeting: {
        geo_locations: { countries: countries.length ? countries : ["VN"] },
        age_min: Number(ageMin) || 18,
        age_max: Number(ageMax) || 65,
        ...(gender === "male" ? { genders: [1] } : gender === "female" ? { genders: [2] } : {}),
      },
      gender,
      gender_label: gender === "all" ? "Tất cả" : gender === "male" ? "Nam" : "Nữ",
      age_min: Number(ageMin) || 18,
      age_max: Number(ageMax) || 65,
      countries: countries.length ? countries : ["VN"],
      ads: ads.map((a, idx) => ({
        ad_name: a.adName || `${finalCampaignName} - Ad ${idx + 1}`,
        headline: a.headline,
        ad_copy: a.adCopy,
        cta: a.cta,
        // Link đích — GIỮ NGUYÊN, không append UTM
        link: a.link,
        // UTM đi vào field "Thông số URL" của Meta (adcreative.url_tags)
        url_tags: buildUtmString(a),
        utm: {
          source:   a.utmSource,
          medium:   a.utmMedium,
          campaign: a.utmCampaign,
          content:  a.utmContent,
          term:     a.utmTerm,
        },
        video_filename: a.videoFile?.name || null,
        image_filename: a.imageFile?.name || null,
      })),
      created_at: new Date().toISOString(),
    }
  }

  const handlePublish = () => {
    setStatus("ready")
    setStatusMsg(JSON.stringify(buildSummary(), null, 2))
  }

  const handleConfirm = async () => {
    setStatus("sending")
    setStatusMsg("Đang upload media và tạo campaign trên Meta Ads...")
    const config = buildSummary()

    // Backup config to localStorage (safety net if endpoint fails)
    try {
      const pending = JSON.parse(localStorage.getItem("doscom_pending_ads") || "[]")
      pending.push(config)
      localStorage.setItem("doscom_pending_ads", JSON.stringify(pending))
    } catch(e) {}

    // Build multipart FormData — config JSON + 1 file per ad
    const fd = new FormData()
    fd.append("config", JSON.stringify(config))
    ads.forEach((a, idx) => {
      if (a.videoFile) fd.append(`video_${idx}`, a.videoFile, a.videoFile.name)
      else if (a.imageFile) fd.append(`image_${idx}`, a.imageFile, a.imageFile.name)
    })

    try {
      const res = await fetch("/api/create-campaign", { method: "POST", body: fd })
      const data = await res.json()
      if (!res.ok || !data.success) {
        const step = data.step || "unknown"
        const partialMsg = data.partial ? ` (đã tạo: ${JSON.stringify(data.partial)})` : ""
        throw new Error(`[${step}] ${data.error || "Lỗi không xác định"}${partialMsg}`)
      }
      setStatus("done")
      setStatusMsg(JSON.stringify({
        ok: true,
        campaign_id: data.campaign_id,
        adset_id: data.adset_id,
        ads_created: (data.ads || []).length,
        open_in_ads_manager: data.ads_manager_url,
      }, null, 2))
    } catch (e) {
      setStatus("error")
      setStatusMsg(`Lỗi: ${e.message}\n\nConfig đã backup vào localStorage — có thể paste vào chat Claude để tạo bằng tay.`)
    }
  }

  // Initialize defaults
  React.useEffect(() => { handleProductChange("D1") }, [])

  // ── Validations ──
  const allAdsHaveContent = ads.every(a => a.headline && a.adCopy)
  const canPublish = allAdsHaveContent

  const selectClass = "w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white"
  const inputClass = "w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
  const labelClass = "block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5"
  const sectionHeaderClass = "flex items-center gap-3 mb-5 pb-3 border-b-2"

  // ── Render ──
  return (
    <div className="space-y-6">
      {/* HEADER */}
      <div className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-xl p-6 text-white">
        <h2 className="text-xl font-bold flex items-center gap-2"><Megaphone /> Tạo Quảng Cáo Facebook</h2>
        <p className="text-blue-100 text-sm mt-1">Cấu hình theo đúng cấu trúc: Chiến dịch → Nhóm quảng cáo → Quảng cáo</p>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        {/* LEFT 2 COLUMNS — Main form (stacked sections) */}
        <div className="lg:col-span-2 space-y-6">

          {/* ═══════════════ SECTION 1: CHIẾN DỊCH ═══════════════ */}
          <div className="bg-white rounded-xl border-2 border-blue-200 p-5 shadow-sm">
            <div className={sectionHeaderClass + " border-blue-500"}>
              <div className="w-10 h-10 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold text-lg">1</div>
              <div>
                <h3 className="text-base font-bold text-blue-900">Chiến dịch (Campaign)</h3>
                <p className="text-xs text-gray-500 mt-0.5">Cấu hình cấp chiến dịch: mục tiêu, loại hình mua</p>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="md:col-span-2">
                <label className={labelClass}>Sản phẩm</label>
                <select value={product} onChange={e => handleProductChange(e.target.value)} className={selectClass}>
                  {Object.keys(PRODUCTS).map(p => <option key={p} value={p}>{p}</option>)}
                </select>
              </div>

              <div className="md:col-span-2">
                <label className={labelClass}>Đặt tên chiến dịch</label>
                <input
                  type="text"
                  value={campaignName}
                  onChange={e => setCampaignName(e.target.value)}
                  className={inputClass}
                  placeholder={`VD: ${product} - ${(OBJECTIVES[objective] || {}).label || "Leads"} - ${new Date().toISOString().slice(0,10)}`}
                />
                <p className="text-xs text-gray-400 mt-1">Để trống sẽ tự đặt: {`${product} - ${(OBJECTIVES[objective] || {}).label || ""} - ${new Date().toISOString().slice(0,10)}`}</p>
              </div>

              <div className="md:col-span-2">
                <label className={labelClass}>Mục tiêu chiến dịch</label>
                <select value={objective} onChange={e => handleObjectiveChange(e.target.value)} className={selectClass}>
                  {Object.entries(OBJECTIVES).map(([key, cfg]) => (
                    <option key={key} value={key}>{cfg.label}</option>
                  ))}
                </select>
                <p className="text-xs text-gray-500 mt-1">{(OBJECTIVES[objective] || {}).desc} <span className="text-gray-400">· API: {objective}</span></p>
              </div>

              <div className="md:col-span-2">
                <div className="flex items-center justify-between mb-1.5">
                  <label className="text-xs font-semibold text-gray-600 uppercase tracking-wide">Loại hình mua (Buying Type)</label>
                  <button type="button" onClick={() => setShowBuyingInfo(!showBuyingInfo)} className="text-xs text-blue-600 hover:underline">
                    {showBuyingInfo ? "Ẩn giải thích" : "ℹ️ Giải thích"}
                  </button>
                </div>
                <select value={buyingType} onChange={e => setBuyingType(e.target.value)} className={selectClass}>
                  {BUYING_TYPES.map(b => <option key={b.value} value={b.value}>{b.label}</option>)}
                </select>
                {showBuyingInfo && (
                  <div className="mt-2 bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-gray-700 space-y-2">
                    <div>
                      <p className="font-bold text-blue-900">Đấu giá (AUCTION)</p>
                      <p>Cách mua mặc định trên Meta — hệ thống tự đấu giá với advertiser khác để giành placement.</p>
                      <p className="text-gray-600">• Linh hoạt: tạm dừng/chỉnh sửa bất kỳ lúc nào</p>
                      <p className="text-gray-600">• Ngân sách tùy ý</p>
                      <p className="text-gray-600">• Dùng cho mọi objective</p>
                      <p className="font-semibold text-blue-700">→ Dùng cho 99% trường hợp.</p>
                    </div>
                    <div>
                      <p className="font-bold text-blue-900">Đặt trước (RESERVED)</p>
                      <p>Đặt trước inventory với giá + số impression cố định.</p>
                      <p className="text-gray-600">• Chỉ áp dụng cho Reach & Frequency, TopView</p>
                      <p className="text-gray-600">• Cần booking trước, không hoàn tiền</p>
                      <p className="text-gray-600">• Đảm bảo reach chính xác</p>
                      <p className="font-semibold text-blue-700">→ Dùng cho campaign brand awareness lớn (launch sản phẩm, TVC).</p>
                    </div>
                  </div>
                )}
              </div>

              {/* BUDGET LEVEL TOGGLE — CBO vs ABO */}
              <div className="md:col-span-2">
                <label className={labelClass}>Cấp ngân sách (Budget Level)</label>
                <div className="flex gap-2">
                  <button
                    type="button"
                    onClick={() => setBudgetLevel("campaign")}
                    className={`flex-1 py-2.5 text-xs font-semibold rounded-lg border transition ${budgetLevel === "campaign" ? "bg-blue-50 border-blue-500 text-blue-700" : "bg-white border-gray-300 text-gray-500"}`}
                  >
                    Ngân sách chiến dịch (CBO)
                  </button>
                  <button
                    type="button"
                    onClick={() => setBudgetLevel("adset")}
                    className={`flex-1 py-2.5 text-xs font-semibold rounded-lg border transition ${budgetLevel === "adset" ? "bg-blue-50 border-blue-500 text-blue-700" : "bg-white border-gray-300 text-gray-500"}`}
                  >
                    Ngân sách nhóm quảng cáo (ABO)
                  </button>
                </div>
                <p className="text-xs text-gray-500 mt-1.5">
                  {budgetLevel === "campaign"
                    ? "CBO: Meta tự chia ngân sách giữa các nhóm quảng cáo theo hiệu quả. Budget đặt ở cấp chiến dịch."
                    : "ABO: Mỗi nhóm quảng cáo có ngân sách riêng, bạn tự control. Budget đặt ở cấp nhóm quảng cáo."}
                </p>
              </div>

              {/* BUDGET INPUTS — shown when CBO */}
              {budgetLevel === "campaign" && (
                <>
                  <div>
                    <label className={labelClass}>Loại ngân sách</label>
                    <div className="flex gap-2">
                      <button type="button" onClick={() => setBudgetType("daily")} className={`flex-1 py-2 text-xs font-semibold rounded-lg border transition ${budgetType === "daily" ? "bg-blue-50 border-blue-500 text-blue-700" : "bg-white border-gray-300 text-gray-500"}`}>Theo ngày</button>
                      <button type="button" onClick={() => setBudgetType("lifetime")} className={`flex-1 py-2 text-xs font-semibold rounded-lg border transition ${budgetType === "lifetime" ? "bg-blue-50 border-blue-500 text-blue-700" : "bg-white border-gray-300 text-gray-500"}`}>Trọn đời</button>
                    </div>
                  </div>
                  <div>
                    <label className={labelClass}>Ngân sách {budgetType === "daily" ? "/ngày" : "tổng"} (VND)</label>
                    <input type="number" value={budget} onChange={e => setBudget(e.target.value)} className={inputClass} placeholder="300000" step="50000" />
                    <p className="text-xs text-gray-400 mt-1">{Number(budget).toLocaleString("vi-VN")}đ {budgetType === "daily" ? "/ngày" : "trọn đời"}</p>
                  </div>
                </>
              )}
            </div>
          </div>

          {/* ═══════════════ SECTION 2: NHÓM QUẢNG CÁO ═══════════════ */}
          <div className="bg-white rounded-xl border-2 border-purple-200 p-5 shadow-sm">
            <div className={sectionHeaderClass + " border-purple-500"}>
              <div className="w-10 h-10 rounded-full bg-purple-500 text-white flex items-center justify-center font-bold text-lg">2</div>
              <div>
                <h3 className="text-base font-bold text-purple-900">Nhóm quảng cáo (Ad Set)</h3>
                <p className="text-xs text-gray-500 mt-0.5">Tối ưu hóa, tài khoản, trang, pixel, ngân sách & lịch chạy</p>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="md:col-span-2">
                <label className={labelClass}>Đặt tên nhóm quảng cáo</label>
                <input
                  type="text"
                  value={adsetName}
                  onChange={e => setAdsetName(e.target.value)}
                  className={inputClass}
                  placeholder={`VD: ${product} - AdSet - ${new Date().toISOString().slice(0,10)}`}
                />
              </div>

              <div>
                <label className={labelClass}>Mục tiêu tối ưu hóa (Optimization Goal)</label>
                <select value={optGoal} onChange={e => handleGoalChange(e.target.value)} className={selectClass}>
                  {(OBJECTIVE_GOALS[objective] || []).map(g => (
                    <option key={g.goal} value={g.goal}>{GOAL_LABELS[g.goal] || g.goal}</option>
                  ))}
                </select>
                <p className="text-xs text-gray-400 mt-1">API: {optGoal}</p>
              </div>

              <div>
                <label className={labelClass}>Điểm đến (Destination)</label>
                <select value={destType} onChange={e => setDestType(e.target.value)} className={selectClass}>
                  {Object.entries(DESTINATION_LABELS).map(([v, l]) => (
                    <option key={v} value={v}>{l}</option>
                  ))}
                </select>
              </div>

              {/* CONVERSION EVENT — chỉ hiện khi optimization = OFFSITE_CONVERSIONS */}
              {optGoal === "OFFSITE_CONVERSIONS" && (
                <div className="md:col-span-2">
                  <label className={labelClass}>Hành động bạn muốn mọi người thực hiện (Sự kiện chuyển đổi)</label>
                  <select value={conversionEvent} onChange={e => setConversionEvent(e.target.value)} className={selectClass}>
                    {PIXEL_EVENTS.map(e => (
                      <option key={e.value} value={e.value}>{e.label}</option>
                    ))}
                  </select>
                  {conversionEvent === "OTHER" && (
                    <input
                      type="text"
                      value={customEventName}
                      onChange={e => setCustomEventName(e.target.value)}
                      className={inputClass + " mt-2"}
                      placeholder="VD: ClickButton, ScrollDepth_50_percent, SubmitForm..."
                    />
                  )}
                  <p className="text-xs text-gray-500 mt-1">
                    ⚠️ Pixel <span className="font-semibold">{PIXELS[pixel] || ""}</span> phải đã fire event này (check Events Manager) trong 7 ngày qua — không Meta sẽ reject.
                  </p>
                </div>
              )}

              <div className="md:col-span-2">
                <div className="flex items-center justify-between mb-1.5">
                  <label className="text-xs font-semibold text-gray-600 uppercase tracking-wide">Sự kiện tính phí (Billing Event)</label>
                  <button type="button" onClick={() => setShowBillingInfo(!showBillingInfo)} className="text-xs text-blue-600 hover:underline">
                    {showBillingInfo ? "Ẩn giải thích" : "ℹ️ Giải thích"}
                  </button>
                </div>
                <select value={billingEvent} onChange={e => setBillingEvent(e.target.value)} className={selectClass}>
                  {BILLING_EVENTS.map(b => <option key={b.value} value={b.value}>{b.label}</option>)}
                </select>
                {showBillingInfo && (
                  <div className="mt-2 bg-purple-50 border border-purple-200 rounded-lg p-3 text-xs text-gray-700 space-y-2">
                    <p className="font-semibold text-purple-900">Billing Event quyết định <u>khi nào</u> Meta thu tiền của bạn (khác với Optimization Goal — mục tiêu tối ưu).</p>
                    <div>
                      <p className="font-bold">Mỗi lần hiển thị (CPM)</p>
                      <p>Trả tiền cho mỗi 1,000 lần quảng cáo hiển thị. Mặc định cho hầu hết objective. Ổn định, predict được chi phí.</p>
                    </div>
                    <div>
                      <p className="font-bold">Mỗi lần nhấp liên kết (CPC)</p>
                      <p>Chỉ trả khi có người nhấp. Chỉ dùng được với optimization goal = Link Clicks. Rủi ro nếu CTR thấp.</p>
                    </div>
                    <div>
                      <p className="font-bold">ThruPlay</p>
                      <p>Trả khi người xem coi hết 15s video (hoặc hết video nếu &lt; 15s). Dùng với Video Views.</p>
                    </div>
                    <div>
                      <p className="font-bold">Mỗi lượt tương tác</p>
                      <p>Trả cho mỗi tương tác (like/comment/share). Dùng với Engagement.</p>
                    </div>
                    <p className="font-semibold text-purple-700">→ Quy tắc: 99% dùng <u>Mỗi lần hiển thị (CPM)</u> — Meta tự tối ưu để bạn trả ít nhất cho kết quả mong muốn.</p>
                  </div>
                )}
              </div>

              <div>
                <label className={labelClass}>Tài khoản quảng cáo</label>
                <select value={account} onChange={e => setAccount(e.target.value)} className={selectClass}>
                  {Object.entries(ACCOUNTS).map(([id, name]) => <option key={id} value={id}>{name}</option>)}
                </select>
              </div>

              <div>
                <label className={labelClass}>Facebook Page</label>
                <select value={page} onChange={e => setPage(e.target.value)} className={selectClass}>
                  {Object.entries(PAGES).map(([id, name]) => <option key={id} value={id}>{name}</option>)}
                </select>
              </div>

              <div className="md:col-span-2">
                <label className={labelClass}>Pixel (tên + ID theo Trình quản lý sự kiện)</label>
                <select value={pixel} onChange={e => setPixel(e.target.value)} className={selectClass}>
                  {Object.entries(PIXELS).map(([id, name]) => (
                    <option key={id} value={id}>{name} — {id}</option>
                  ))}
                </select>
                {pixel && (
                  <p className="text-xs text-gray-500 mt-1">
                    <span className="font-semibold">{PIXELS[pixel]}</span>
                    <span className="text-gray-400"> · Pixel ID: </span>
                    <span className="font-mono text-gray-700">{pixel}</span>
                  </p>
                )}
              </div>

              {/* ATTRIBUTION WINDOW — Cài đặt ghi nhận */}
              <div className="md:col-span-2">
                <label className={labelClass}>Cài đặt ghi nhận (Attribution Window)</label>
                <select value={attributionPreset} onChange={e => setAttributionPreset(e.target.value)} className={selectClass}>
                  {ATTRIBUTION_PRESETS.map(p => (
                    <option key={p.value} value={p.value}>{p.label}</option>
                  ))}
                </select>
                <p className="text-xs text-gray-500 mt-1">Khoảng thời gian Meta tính lượt chuyển đổi sau khi user thấy/click quảng cáo</p>
              </div>

              {/* PACING TYPE — Loại phân phối */}
              <div className="md:col-span-2">
                <label className={labelClass}>Loại phân phối (Pacing)</label>
                <select value={pacingType} onChange={e => setPacingType(e.target.value)} className={selectClass}>
                  {PACING_TYPES.map(p => (
                    <option key={p.value} value={p.value}>{p.label}</option>
                  ))}
                </select>
              </div>

              {/* BUDGET — chỉ hiện khi ABO */}
              {budgetLevel === "adset" ? (
                <>
                  <div>
                    <label className={labelClass}>Loại ngân sách</label>
                    <div className="flex gap-2">
                      <button type="button" onClick={() => setBudgetType("daily")} className={`flex-1 py-2 text-xs font-semibold rounded-lg border transition ${budgetType === "daily" ? "bg-blue-50 border-blue-500 text-blue-700" : "bg-white border-gray-300 text-gray-500"}`}>Theo ngày</button>
                      <button type="button" onClick={() => setBudgetType("lifetime")} className={`flex-1 py-2 text-xs font-semibold rounded-lg border transition ${budgetType === "lifetime" ? "bg-blue-50 border-blue-500 text-blue-700" : "bg-white border-gray-300 text-gray-500"}`}>Trọn đời</button>
                    </div>
                  </div>
                  <div>
                    <label className={labelClass}>Ngân sách {budgetType === "daily" ? "/ngày" : "tổng"} (VND)</label>
                    <input type="number" value={budget} onChange={e => setBudget(e.target.value)} className={inputClass} placeholder="300000" step="50000" />
                    <p className="text-xs text-gray-400 mt-1">{Number(budget).toLocaleString("vi-VN")}đ {budgetType === "daily" ? "/ngày" : "trọn đời"}</p>
                  </div>
                </>
              ) : (
                <div className="md:col-span-2 bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-blue-700">
                  💡 <span className="font-semibold">Ngân sách đang đặt ở cấp chiến dịch (CBO)</span> — chỉnh ngân sách ở Section 1.
                </div>
              )}

              {/* ═══════════════ ĐỐI TƯỢNG (TARGETING) ═══════════════ */}
              <div className="md:col-span-2 border-t border-gray-200 pt-4 mt-1">
                <h4 className="text-xs font-bold text-purple-900 uppercase tracking-wide mb-3 flex items-center gap-2">
                  <span className="inline-block w-1.5 h-1.5 rounded-full bg-purple-500"></span>
                  Đối tượng (Targeting)
                </h4>
              </div>

              {/* Giới tính */}
              <div>
                <label className={labelClass}>Giới tính</label>
                <div className="flex gap-2">
                  <button
                    type="button"
                    onClick={() => setGender("all")}
                    className={`flex-1 py-2 text-xs font-semibold rounded-lg border transition ${gender === "all" ? "bg-purple-50 border-purple-500 text-purple-700" : "bg-white border-gray-300 text-gray-500 hover:bg-gray-50"}`}
                  >Tất cả</button>
                  <button
                    type="button"
                    onClick={() => setGender("male")}
                    className={`flex-1 py-2 text-xs font-semibold rounded-lg border transition ${gender === "male" ? "bg-purple-50 border-purple-500 text-purple-700" : "bg-white border-gray-300 text-gray-500 hover:bg-gray-50"}`}
                  >Nam</button>
                  <button
                    type="button"
                    onClick={() => setGender("female")}
                    className={`flex-1 py-2 text-xs font-semibold rounded-lg border transition ${gender === "female" ? "bg-purple-50 border-purple-500 text-purple-700" : "bg-white border-gray-300 text-gray-500 hover:bg-gray-50"}`}
                  >Nữ</button>
                </div>
              </div>

              {/* Độ tuổi */}
              <div>
                <label className={labelClass}>Độ tuổi</label>
                <div className="flex items-center gap-2">
                  <input
                    type="number"
                    min="13"
                    max="65"
                    value={ageMin}
                    onChange={e => {
                      const v = Math.max(13, Math.min(65, parseInt(e.target.value) || 13))
                      setAgeMin(v)
                      if (v > ageMax) setAgeMax(v)
                    }}
                    className={inputClass + " flex-1"}
                  />
                  <span className="text-gray-500 text-sm font-semibold">→</span>
                  <input
                    type="number"
                    min="13"
                    max="65"
                    value={ageMax}
                    onChange={e => {
                      const v = Math.max(13, Math.min(65, parseInt(e.target.value) || 65))
                      setAgeMax(v)
                      if (v < ageMin) setAgeMin(v)
                    }}
                    className={inputClass + " flex-1"}
                  />
                </div>
                <p className="text-xs text-gray-400 mt-1">
                  {ageMin} – {ageMax}{ageMax >= 65 ? "+" : ""} tuổi. Meta giới hạn 13–65 (65 = 65+).
                </p>
              </div>

              {/* Vị trí (quốc gia) */}
              <div className="md:col-span-2">
                <label className={labelClass}>Vị trí (Quốc gia)</label>
                <div className="flex flex-wrap gap-2 mb-2 min-h-[34px] p-2 border border-gray-200 rounded-lg bg-gray-50">
                  {countries.length === 0 ? (
                    <span className="text-xs text-gray-400 italic self-center">Chưa chọn quốc gia nào — thêm ít nhất 1</span>
                  ) : (
                    countries.map(code => {
                      const match = DOSCOM_COUNTRIES.find(c => c.code === code)
                      const label = match ? `${match.name} (${code})` : code
                      return (
                        <span key={code} className="inline-flex items-center gap-1.5 bg-purple-100 text-purple-800 text-xs font-semibold px-2.5 py-1 rounded-full">
                          {label}
                          <button
                            type="button"
                            onClick={() => setCountries(prev => prev.filter(x => x !== code))}
                            className="hover:text-purple-900 font-bold text-sm leading-none"
                            title="Xóa"
                          >×</button>
                        </span>
                      )
                    })
                  )}
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                  <select
                    className={selectClass}
                    value=""
                    onChange={e => {
                      const v = e.target.value
                      if (v && !countries.includes(v)) setCountries(prev => [...prev, v])
                    }}
                  >
                    <option value="">+ Thêm từ danh sách phổ biến...</option>
                    {DOSCOM_COUNTRIES.filter(c => !countries.includes(c.code)).map(c => (
                      <option key={c.code} value={c.code}>{c.name} ({c.code})</option>
                    ))}
                  </select>
                  <div className="flex gap-2">
                    <input
                      type="text"
                      value={customCountry}
                      onChange={e => setCustomCountry(e.target.value.toUpperCase().replace(/[^A-Z]/g, "").slice(0, 2))}
                      placeholder="Mã ISO (VD: IN, BR)"
                      className={inputClass + " flex-1 uppercase"}
                      maxLength={2}
                    />
                    <button
                      type="button"
                      onClick={() => {
                        const code = customCountry.trim().toUpperCase()
                        if (code.length === 2 && !countries.includes(code)) {
                          setCountries(prev => [...prev, code])
                          setCustomCountry("")
                        }
                      }}
                      disabled={customCountry.length !== 2 || countries.includes(customCountry)}
                      className="px-3 py-2 text-xs font-semibold rounded-lg border border-purple-500 text-purple-700 bg-purple-50 hover:bg-purple-100 disabled:opacity-40 disabled:cursor-not-allowed"
                    >Thêm</button>
                  </div>
                </div>
                <p className="text-xs text-gray-500 mt-1">Mặc định: Việt Nam. Target tùy ý nhiều quốc gia bằng mã ISO 3166-1 alpha-2.</p>
              </div>

              {/* ═══════════════ LỊCH CHẠY ═══════════════ */}
              <div className="md:col-span-2 border-t border-gray-200 pt-4 mt-1">
                <h4 className="text-xs font-bold text-purple-900 uppercase tracking-wide mb-3 flex items-center gap-2">
                  <span className="inline-block w-1.5 h-1.5 rounded-full bg-purple-500"></span>
                  Lịch chạy (Schedule)
                </h4>
              </div>

              <div>
                <label className={labelClass}>Thời gian bắt đầu</label>
                <input type="datetime-local" value={startDate} onChange={e => setStartDate(e.target.value)} className={inputClass} />
                <p className="text-xs text-gray-400 mt-1">Mặc định: thời điểm hiện tại khi load trang. Giờ VN (+07:00).</p>
              </div>
              <div>
                <label className={labelClass}>Thời gian kết thúc (tùy chọn)</label>
                <input type="datetime-local" value={endDate} onChange={e => setEndDate(e.target.value)} className={inputClass} />
                <p className="text-xs text-gray-400 mt-1">Để trống = chạy vô thời hạn (chỉ ABO daily). Giờ VN.</p>
              </div>
            </div>
          </div>

          {/* ═══════════════ SECTION 3: QUẢNG CÁO ═══════════════ */}
          <div className="bg-white rounded-xl border-2 border-green-200 p-5 shadow-sm">
            <div className={sectionHeaderClass + " border-green-500"}>
              <div className="w-10 h-10 rounded-full bg-green-500 text-white flex items-center justify-center font-bold text-lg">3</div>
              <div className="flex-1">
                <h3 className="text-base font-bold text-green-900">Quảng cáo (Ads)</h3>
                <p className="text-xs text-gray-500 mt-0.5">Nội dung, media, CTA, link đích và UTM — có thể tạo nhiều quảng cáo trong cùng 1 nhóm</p>
              </div>
              <span className="bg-green-100 text-green-700 text-xs font-bold px-2.5 py-1 rounded-full">{ads.length} quảng cáo</span>
            </div>

            <div className="space-y-5">
              {ads.map((ad, adIdx) => (
                <div key={ad.id} className="border-2 border-dashed border-gray-300 rounded-xl p-4 bg-gray-50 hover:bg-white transition">
                  {/* Ad header */}
                  <div className="flex items-center justify-between mb-4 pb-3 border-b border-gray-200">
                    <div className="flex items-center gap-2">
                      <span className="w-8 h-8 rounded-lg bg-green-500 text-white flex items-center justify-center font-bold text-sm">#{adIdx + 1}</span>
                      <h4 className="text-sm font-bold text-gray-800">Quảng cáo #{adIdx + 1}</h4>
                    </div>
                    {ads.length > 1 && (
                      <button type="button" onClick={() => removeAd(ad.id)} className="text-xs text-red-600 hover:text-red-800 hover:underline font-semibold">
                        ✕ Xóa quảng cáo này
                      </button>
                    )}
                  </div>

                  <div className="space-y-4">
                    {/* Ad name */}
                    <div>
                      <label className={labelClass}>Đặt tên quảng cáo</label>
                      <input
                        type="text"
                        value={ad.adName}
                        onChange={e => updateAd(ad.id, { adName: e.target.value })}
                        className={inputClass}
                        placeholder={`VD: ${product} - Ad ${adIdx + 1} - Video Pain Point`}
                      />
                    </div>

                    {/* Media upload */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                      <div>
                        <label className={labelClass}>Upload video</label>
                        <input
                          type="file"
                          accept="video/*"
                          onChange={e => handleVideoSelect(ad.id, e)}
                          className="w-full text-xs text-gray-500 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                        />
                      </div>
                      <div>
                        <label className={labelClass}>Hoặc upload ảnh</label>
                        <input
                          type="file"
                          accept="image/*"
                          onChange={e => handleImageSelect(ad.id, e)}
                          className="w-full text-xs text-gray-500 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-gray-50 file:text-gray-700 hover:file:bg-gray-100"
                        />
                      </div>
                    </div>

                    {ad.mediaPreview && (
                      <div className="rounded-lg overflow-hidden border border-gray-200 bg-white">
                        {ad.videoFile ? (
                          <video src={ad.mediaPreview} controls className="w-full max-h-40 object-contain" />
                        ) : (
                          <img src={ad.mediaPreview} className="w-full max-h-40 object-contain" />
                        )}
                        <p className="text-xs text-gray-500 p-2 text-center">{ad.videoFile?.name || ad.imageFile?.name}</p>
                      </div>
                    )}

                    {/* Content */}
                    <div>
                      <label className={labelClass}>Tiêu đề (Headline)</label>
                      <input
                        type="text"
                        value={ad.headline}
                        onChange={e => updateAd(ad.id, { headline: e.target.value })}
                        className={inputClass}
                        placeholder="VD: Máy dò nghe lén D1 — Bảo vệ riêng tư"
                      />
                    </div>

                    <div>
                      <label className={labelClass}>Nội dung quảng cáo (Primary Text)</label>
                      <textarea
                        value={ad.adCopy}
                        onChange={e => updateAd(ad.id, { adCopy: e.target.value })}
                        className={inputClass + " h-28 resize-none"}
                        placeholder="Nhập nội dung quảng cáo hoặc dùng AI Content Generator bên dưới..."
                      />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                      <div>
                        <label className={labelClass}>Call to Action (CTA)</label>
                        <select value={ad.cta} onChange={e => updateAd(ad.id, { cta: e.target.value })} className={selectClass}>
                          {CTAS.map(c => <option key={c} value={c}>{c.replace(/_/g, " ")}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className={labelClass}>Link đích (Landing page)</label>
                        <input
                          type="url"
                          value={ad.link}
                          onChange={e => updateAd(ad.id, { link: e.target.value })}
                          className={inputClass}
                          placeholder="https://doscom.vn/san-pham/d1"
                        />
                      </div>
                    </div>

                    {/* UTM BOX */}
                    <div className="bg-amber-50 border-2 border-amber-200 rounded-lg p-3">
                      <h5 className="text-xs font-bold text-amber-900 mb-2 flex items-center gap-1.5">
                        🔗 UTM Tracking Parameters
                        <span className="text-[10px] font-normal text-amber-700">— để track traffic trên GA/Pancake</span>
                      </h5>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                        <div>
                          <label className="text-[10px] font-semibold text-amber-800 uppercase">utm_source</label>
                          <input type="text" value={ad.utmSource} onChange={e => updateAd(ad.id, { utmSource: e.target.value })} className="w-full border border-amber-300 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-amber-500" placeholder="facebook" />
                        </div>
                        <div>
                          <label className="text-[10px] font-semibold text-amber-800 uppercase">utm_medium</label>
                          <input type="text" value={ad.utmMedium} onChange={e => updateAd(ad.id, { utmMedium: e.target.value })} className="w-full border border-amber-300 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-amber-500" placeholder="paid / cpc" />
                        </div>
                        <div>
                          <label className="text-[10px] font-semibold text-amber-800 uppercase">utm_campaign</label>
                          <input type="text" value={ad.utmCampaign} onChange={e => updateAd(ad.id, { utmCampaign: e.target.value })} className="w-full border border-amber-300 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-amber-500" placeholder={`${product}_${new Date().toISOString().slice(0,7)}`} />
                        </div>
                        <div>
                          <label className="text-[10px] font-semibold text-amber-800 uppercase">utm_content</label>
                          <input type="text" value={ad.utmContent} onChange={e => updateAd(ad.id, { utmContent: e.target.value })} className="w-full border border-amber-300 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-amber-500" placeholder={`ad${adIdx + 1}_video`} />
                        </div>
                        <div className="md:col-span-2">
                          <label className="text-[10px] font-semibold text-amber-800 uppercase">utm_term (tùy chọn — keyword)</label>
                          <input type="text" value={ad.utmTerm} onChange={e => updateAd(ad.id, { utmTerm: e.target.value })} className="w-full border border-amber-300 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-amber-500" placeholder="chong_nghe_len" />
                        </div>
                      </div>
                      {ad.link && (
                        <div className="mt-2 bg-white border border-amber-200 rounded p-2 space-y-1.5">
                          <div>
                            <p className="text-[10px] font-semibold text-amber-800 uppercase mb-0.5">Link đích (giữ nguyên)</p>
                            <p className="text-xs font-mono text-gray-700 break-all">{ad.link}</p>
                          </div>
                          {buildUtmString(ad) && (
                            <div className="pt-1 border-t border-amber-100">
                              <p className="text-[10px] font-semibold text-amber-800 uppercase mb-0.5">→ Thông số URL (điền vào ô "Thông số URL" của Meta)</p>
                              <p className="text-xs font-mono text-gray-700 break-all">{buildUtmString(ad)}</p>
                            </div>
                          )}
                        </div>
                      )}
                    </div>

                    {/* AI Content Generator button */}
                    <button
                      type="button"
                      onClick={() => handleGenerateContent(ad.id)}
                      disabled={aiLoading}
                      className={`w-full py-2.5 rounded-lg font-bold text-xs shadow-sm transition flex items-center justify-center gap-2 ${
                        aiLoading && aiTargetAdId === ad.id
                          ? "bg-amber-200 text-amber-700 cursor-wait"
                          : "bg-gradient-to-r from-amber-500 to-orange-500 text-white hover:from-amber-600 hover:to-orange-600"
                      }`}
                    >
                      {aiLoading && aiTargetAdId === ad.id ? (
                        <>
                          <div className="animate-spin w-4 h-4 border-2 border-amber-700 border-t-transparent rounded-full"></div>
                          Đang viết content cho Ad #{adIdx + 1}...
                        </>
                      ) : (
                        <><Wand /> Sinh content AI cho Ad #{adIdx + 1}</>
                      )}
                    </button>

                    {/* AI variants shown only for the target ad */}
                    {aiTargetAdId === ad.id && aiError && (
                      <div className="bg-red-50 border border-red-200 rounded-lg p-3">
                        <p className="text-xs font-semibold text-red-700 mb-1">Lỗi sinh content</p>
                        <p className="text-xs text-red-600">{aiError}</p>
                      </div>
                    )}
                    {aiTargetAdId === ad.id && aiVariants.length > 0 && (
                      <div className="space-y-2">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                          {aiVariants.map((v) => {
                            const styleConfig = {
                              "A": { color: "pink",  emoji: "💝", label: "Cảm xúc" },
                              "B": { color: "blue",  emoji: "🧠", label: "Lý trí" },
                              "C": { color: "red",   emoji: "⏰", label: "Khẩn cấp" },
                            }
                            const cfg = styleConfig[v.id] || { color: "gray", emoji: "📝", label: v.style }
                            const isSelected = aiSelectedId === v.id
                            return (
                              <div key={v.id} className={`bg-white rounded-lg border-2 p-2 ${isSelected ? `border-${cfg.color}-500` : "border-gray-200"}`}>
                                <div className={`text-[10px] font-bold mb-1.5 text-${cfg.color}-700 flex items-center gap-1`}>
                                  <span>{cfg.emoji}</span>
                                  <span>Bản {v.id} — {cfg.label}</span>
                                </div>
                                <div className="space-y-1 text-[11px]">
                                  <p className="font-semibold text-gray-800">{v.headline}</p>
                                  <p className="text-gray-600 whitespace-pre-wrap leading-tight max-h-24 overflow-y-auto">{v.primary_text}</p>
                                </div>
                                <button
                                  type="button"
                                  onClick={() => handleUseVariant(v)}
                                  className={`mt-2 w-full py-1.5 rounded text-[11px] font-bold text-white ${isSelected ? "bg-green-600" : `bg-${cfg.color}-500 hover:bg-${cfg.color}-600`}`}
                                >
                                  {isSelected ? "✓ Đã fill" : "Dùng bản này"}
                                </button>
                              </div>
                            )
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              ))}

              {/* BUTTON: Tạo thêm quảng cáo */}
              <button
                type="button"
                onClick={addAd}
                className="w-full py-3 border-2 border-dashed border-green-400 text-green-700 rounded-xl font-semibold text-sm hover:bg-green-50 hover:border-green-500 transition flex items-center justify-center gap-2"
              >
                <span className="text-lg">+</span> Tạo thêm quảng cáo
              </button>
            </div>

            {/* AI Content input shared (applied when clicking generate on a specific ad) */}
            <div className="mt-5 bg-amber-50 border border-amber-200 rounded-lg p-3">
              <p className="text-xs font-semibold text-amber-900 mb-2">⚙️ Cấu hình AI Content (áp dụng cho ad bạn bấm sinh)</p>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                <input
                  type="text"
                  value={aiKeyword}
                  onChange={e => setAiKeyword(e.target.value)}
                  className="w-full border border-amber-300 rounded px-2 py-1.5 text-xs"
                  placeholder="Từ khóa chính (VD: chống nghe lén)"
                />
                <input
                  type="text"
                  value={aiDirection}
                  onChange={e => setAiDirection(e.target.value)}
                  className="w-full border border-amber-300 rounded px-2 py-1.5 text-xs"
                  placeholder="Hướng content (VD: nhấn mạnh đi công tác)"
                />
              </div>
            </div>
          </div>

        </div>

        {/* RIGHT COLUMN — Preview & Publish */}
        <div className="space-y-5">
          <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm sticky top-4">
            <h3 className="text-sm font-bold text-gray-800 mb-4 flex items-center gap-2"><Eye /> Xem trước cấu hình</h3>

            <div className="space-y-1 text-sm">
              {[
                ["Chiến dịch", campaignName || `${product} - ${(OBJECTIVES[objective] || {}).label} - ${new Date().toISOString().slice(0,10)}`],
                ["Mục tiêu", (OBJECTIVES[objective] || {}).label],
                ["Loại hình mua", (BUYING_TYPES.find(b => b.value === buyingType) || {}).label],
                ["Nhóm QC", adsetName || `${product} - AdSet - ${new Date().toISOString().slice(0,10)}`],
                ["Tối ưu hóa", GOAL_LABELS[optGoal] || optGoal],
                ["Điểm đến", DESTINATION_LABELS[destType] || destType],
                ["Tính phí", (BILLING_EVENTS.find(b => b.value === billingEvent) || {}).label],
                ["Tài khoản", ACCOUNTS[account]],
                ["Page", (PAGES[page] || "").split(" (")[0]],
                ["Pixel", `${PIXELS[pixel] || ""} · ${pixel}`],
                ["Ngân sách", `${Number(budget).toLocaleString("vi-VN")}đ ${budgetType === "daily" ? "/ngày" : "trọn đời"} (${budgetLevel === "campaign" ? "CBO" : "ABO"})`],
                ["Giới tính", gender === "all" ? "Tất cả" : gender === "male" ? "Nam" : "Nữ"],
                ["Độ tuổi", `${ageMin} – ${ageMax}${ageMax >= 65 ? "+" : ""}`],
                ["Vị trí", (countries.length ? countries : ["VN"]).join(", ")],
                ["Lịch", `${(startDate || "Ngay").replace("T", " ")} → ${(endDate || "∞").replace("T", " ")}`],
                ["Số quảng cáo", `${ads.length} ad(s)`],
              ].map(([label, val], i) => (
                <div key={i} className="flex justify-between py-1 border-b border-gray-50 gap-2">
                  <span className="text-gray-400 text-xs whitespace-nowrap">{label}</span>
                  <span className="font-semibold text-xs text-right truncate">{val}</span>
                </div>
              ))}
            </div>

            {/* LAUNCH STATUS TOGGLE */}
            <div className="mt-4 bg-gray-50 border border-gray-200 rounded-lg p-3">
              <label className="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 block">Trạng thái sau khi tạo</label>
              <div className="flex gap-2">
                <button
                  type="button"
                  onClick={() => setLaunchStatus("ACTIVE")}
                  className={`flex-1 py-2 text-xs font-semibold rounded-lg border transition ${launchStatus === "ACTIVE" ? "bg-green-50 border-green-500 text-green-700" : "bg-white border-gray-300 text-gray-500"}`}
                >
                  🟢 Bật ngay (ACTIVE)
                </button>
                <button
                  type="button"
                  onClick={() => setLaunchStatus("PAUSED")}
                  className={`flex-1 py-2 text-xs font-semibold rounded-lg border transition ${launchStatus === "PAUSED" ? "bg-amber-50 border-amber-500 text-amber-700" : "bg-white border-gray-300 text-gray-500"}`}
                >
                  ⏸️ Tạm dừng để review
                </button>
              </div>
              <p className="text-[11px] text-gray-500 mt-1.5">
                {launchStatus === "ACTIVE"
                  ? "⚠️ Campaign + AdSet + Ad sẽ ACTIVE ngay — Meta bắt đầu review và tiêu tiền sau khi duyệt (~15-60 phút)"
                  : "An toàn: Tạo ở trạng thái PAUSED, bạn review trên Ads Manager rồi mới bật"}
              </p>
            </div>

            {/* PUBLISH BUTTON */}
            <button
              type="button"
              onClick={handlePublish}
              disabled={!canPublish}
              className={`w-full mt-3 py-4 rounded-xl text-white font-bold text-sm shadow-lg transition flex items-center justify-center gap-2 ${
                !canPublish
                  ? "bg-gray-300 cursor-not-allowed"
                  : launchStatus === "ACTIVE"
                    ? "bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 active:scale-[0.98]"
                    : "bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 active:scale-[0.98]"
              }`}
            >
              <Megaphone /> Tạo chiến dịch ({ads.length} ads) {launchStatus === "ACTIVE" ? "— Bật ngay" : "— Tạm dừng"}
            </button>

            {!canPublish && (
              <p className="text-xs text-gray-400 text-center mt-2">Điền tiêu đề & nội dung cho tất cả các ad</p>
            )}

            {/* STATUS */}
            {status === "ready" && (
              <div className="mt-3 bg-amber-50 border border-amber-200 rounded-xl p-3">
                <p className="text-xs font-semibold text-amber-800 mb-2">Xác nhận tạo chiến dịch?</p>
                <pre className="text-[10px] bg-white p-2 rounded border border-amber-100 overflow-auto max-h-40 whitespace-pre-wrap">{statusMsg}</pre>
                <div className="flex gap-2 mt-2">
                  <button onClick={handleConfirm} className="flex-1 bg-blue-600 text-white py-2 rounded-lg text-xs font-semibold hover:bg-blue-700">Xác nhận & Gửi</button>
                  <button onClick={() => setStatus(null)} className="flex-1 bg-gray-100 text-gray-600 py-2 rounded-lg text-xs font-semibold hover:bg-gray-200">Hủy</button>
                </div>
              </div>
            )}
            {status === "sending" && (
              <div className="mt-3 bg-blue-50 border border-blue-200 rounded-xl p-3 text-center">
                <div className="animate-spin inline-block w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full mb-1"></div>
                <p className="text-xs text-blue-700">{statusMsg}</p>
              </div>
            )}
            {status === "done" && (() => {
              let parsed = null
              try { parsed = JSON.parse(statusMsg) } catch(e) {}
              return (
                <div className="mt-3 bg-green-50 border border-green-200 rounded-xl p-3">
                  <p className="text-xs font-semibold text-green-800 mb-2">✅ Đã tạo thành công trên Meta!</p>
                  {parsed ? (
                    <div className="space-y-1 text-[11px] text-green-700">
                      <p><span className="text-green-500">Campaign:</span> <span className="font-mono">{parsed.campaign_id}</span></p>
                      <p><span className="text-green-500">AdSet:</span> <span className="font-mono">{parsed.adset_id}</span></p>
                      <p><span className="text-green-500">Ads tạo:</span> {parsed.ads_created}</p>
                      {parsed.open_in_ads_manager && (
                        <a href={parsed.open_in_ads_manager} target="_blank" rel="noreferrer" className="block mt-2 text-center bg-blue-600 text-white py-2 rounded-lg text-xs font-semibold hover:bg-blue-700">
                          Mở trong Ads Manager →
                        </a>
                      )}
                    </div>
                  ) : (
                    <pre className="text-[10px] whitespace-pre-wrap text-green-600">{statusMsg}</pre>
                  )}
                  <button onClick={() => { setStatus(null); setAds([makeEmptyAd(0)]); setCampaignName(""); setAdsetName("") }} className="mt-2 w-full bg-green-600 text-white py-2 rounded-lg text-xs font-semibold hover:bg-green-700">
                    Tạo chiến dịch mới
                  </button>
                </div>
              )
            })()}
            {status === "error" && (
              <div className="mt-3 bg-red-50 border border-red-200 rounded-xl p-3">
                <p className="text-xs font-semibold text-red-800 mb-1">❌ Tạo chiến dịch thất bại</p>
                <pre className="text-[10px] whitespace-pre-wrap text-red-700 max-h-60 overflow-auto">{statusMsg}</pre>
                <button onClick={() => setStatus(null)} className="mt-2 w-full bg-gray-200 text-gray-700 py-2 rounded-lg text-xs font-semibold hover:bg-gray-300">
                  Thử lại
                </button>
              </div>
            )}
          </div>

          {/* INSTRUCTIONS */}
          <div className="bg-gray-50 rounded-xl p-4 border border-gray-200">
            <h4 className="text-xs font-bold text-gray-600 uppercase mb-2">Quy trình</h4>
            <div className="space-y-1.5 text-xs text-gray-500">
              <p><span className="font-bold text-gray-700">1.</span> Điền 3 mục: Chiến dịch → Nhóm QC → Quảng cáo</p>
              <p><span className="font-bold text-gray-700">2.</span> "Tạo thêm quảng cáo" để thêm ad vào cùng 1 nhóm</p>
              <p><span className="font-bold text-gray-700">3.</span> Ấn "Tạo chiến dịch" → Xác nhận & Gửi</p>
              <p><span className="font-bold text-gray-700">4.</span> Hệ thống tự upload media + tạo Campaign/AdSet/Ad (PAUSED) qua Meta API</p>
              <p><span className="font-bold text-gray-700">5.</span> Review trên Ads Manager → Bật ACTIVE</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  )
}


// =============================================================
// SUB-COMPONENT: Competitor Research (Chrome-scraped data)
// =============================================================
function CompetitorResearch() {
  const [radarProduct, setRadarProduct] = useState("Noma911")
  const [radarData, setRadarData] = useState(null)
  const [radarLoading, setRadarLoading] = useState(false)
  const [radarError, setRadarError] = useState(null)

  const PRODUCTS = ["Máy dò D1", "DR1", "Noma911", "Da8.1", "Da8.1 Pro"]

  // Fetch radar data from static JSON file
  const fetchRadar = () => {
    setRadarLoading(true)
    setRadarError(null)
    fetch("/data/radar-latest.json")
      .then(r => r.json())
      .then(d => {
        if (!d.reports || d.reports.length === 0) { setRadarData(null); setRadarLoading(false); return }
        const match = d.reports.find(r => r.product === radarProduct)
        setRadarData(match || d.reports[0])
        setRadarLoading(false)
      })
      .catch(e => { setRadarError(e.message); setRadarLoading(false) })
  }

  React.useEffect(() => { fetchRadar() }, [radarProduct])

  // Open Cowork with pre-built prompt
  const openCoworkAnalysis = () => {
    const prompt = encodeURIComponent(
      `Chạy skill competitor-radar cho sản phẩm "${radarProduct}". Chạy ngay, không hỏi thêm.`
    )
    window.open(`https://claude.ai/new?q=${prompt}`, "_blank")
  }

  return (
    <div>
      {/* RADAR AI PANEL */}
      <div className="mb-6 bg-gradient-to-r from-purple-50 to-blue-50 rounded-xl border border-purple-200 p-5 shadow-sm">
        <div className="flex flex-wrap items-center justify-between gap-4 mb-4">
          <div>
            <h3 className="font-bold text-gray-900 text-lg flex items-center gap-2">
              🛰️ Radar AI — Phân tích đối thủ
            </h3>
            <p className="text-xs text-gray-600 mt-1">Chọn sản phẩm → Bấm phân tích → Claude sẽ tìm kiếm & đẩy kết quả về đây</p>
          </div>
          <div className="flex items-center gap-3">
            <select
              value={radarProduct}
              onChange={e => setRadarProduct(e.target.value)}
              className="px-4 py-2.5 rounded-lg border border-gray-300 bg-white text-sm font-medium text-gray-700 focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
            >
              {PRODUCTS.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
            <button
              onClick={openCoworkAnalysis}
              className="px-5 py-2.5 rounded-lg bg-purple-600 text-white text-sm font-semibold hover:bg-purple-700 transition shadow-md flex items-center gap-2"
            >
              🔍 Phân tích đối thủ
            </button>
            <button
              onClick={fetchRadar}
              className="px-3 py-2.5 rounded-lg bg-white border border-gray-300 text-sm text-gray-600 hover:bg-gray-50 transition"
              title="Tải lại kết quả"
            >
              🔄
            </button>
          </div>
        </div>

        {/* Radar Results */}
        {radarLoading && (
          <div className="text-center py-8 text-gray-500 text-sm">⏳ Đang tải dữ liệu radar...</div>
        )}
        {radarError && (
          <div className="p-3 rounded-lg bg-red-50 border border-red-200 text-xs text-red-800">
            ⚠️ Lỗi: {radarError}. KV có thể chưa được setup — xem hướng dẫn bên dưới.
          </div>
        )}
        {!radarLoading && !radarError && !radarData && (
          <div className="text-center py-8 border-2 border-dashed border-purple-200 rounded-lg bg-white/50">
            <div className="text-4xl mb-2">🛰️</div>
            <p className="text-sm text-gray-600">Chưa có dữ liệu radar cho <strong>{radarProduct}</strong></p>
            <p className="text-xs text-gray-400 mt-1">Bấm "Phân tích đối thủ" để bắt đầu — kết quả sẽ hiển thị tại đây</p>
          </div>
        )}
        {!radarLoading && radarData && <RadarResultPanel data={radarData} />}
      </div>

      {/* Known Competitors section removed */}
    </div>
  )
}

// SUB-COMPONENT: Radar Result Panel (hiển thị kết quả phân tích AI — CI Report v5.0)

  const threatColors = {

    medium: "bg-amber-100 text-amber-800 border-amber-300",
    high: "bg-red-100 text-red-800 border-red-300",
    critical: "bg-red-200 text-red-900 border-red-400"
  }
  const threatLabel = { low: "Thấp", medium: "Trung bình", high: "Cao", critical: "Nghiêm trọng" }
  const threatEmoji = { low: "🟢", medium: "🟡", high: "🔴", critical: "🔴" }
  const riskColors = { "CAO": "text-red-700 bg-red-50", "TB": "text-amber-700 bg-amber-50", "THẤP": "text-emerald-700 bg-emerald-50" }
  const sentimentComp = data.sentiment?.competitors_summary || data.sentiment?.competitors

  return (
    <div className="bg-white rounded-lg border border-gray-200 overflow-hidden">
      {/* Header */}
      <div className="p-4 border-b border-gray-100 flex flex-wrap items-center justify-between gap-3">

            {data.version && <span className="text-xs text-gray-400 font-normal">{data.version}</span>}
            <span className={`px-2 py-0.5 text-xs rounded-full border ${threatColors[data.threat_level] || threatColors.medium}`}>

          <p className="text-xs text-gray-500 mt-1">Cập nhật: {data.saved_at ? new Date(data.saved_at).toLocaleString("vi-VN") : data.analyzed_at || "—"}</p>

      </div>

      {/* Weekly Changes (v5.1) */}
      {data.weekly_changes && (
        <div className="p-4 border-b border-gray-100 bg-gradient-to-r from-blue-50 to-indigo-50">
          <div className="flex items-center justify-between mb-4">
            <h5 className="text-lg font-extrabold text-red-700 flex items-center gap-2 tracking-tight">📊 Thay đổi tuần này</h5>
            <span className="text-xs text-gray-500 font-medium">
              {data.weekly_changes.baseline_date ? new Date(data.weekly_changes.baseline_date).toLocaleDateString("vi-VN") : "?"} → {data.weekly_changes.current_date ? new Date(data.weekly_changes.current_date).toLocaleDateString("vi-VN") : "hôm nay"}
            </span>
          </div>
          {data.weekly_changes.summary && (
            <div className="text-sm text-indigo-900 bg-white/60 rounded-lg p-3 mb-4 border-l-4 border-red-500 border border-indigo-200 leading-relaxed">{data.weekly_changes.summary}</div>
          )}
          {/* Top 3 changes */}
          {data.weekly_changes.top_3_changes && data.weekly_changes.top_3_changes.length > 0 && (
            <div className="space-y-2 mb-4">

                <div key={i} className="flex items-start gap-2 text-sm">

                  <span className="text-gray-800 leading-snug"><strong>{c}</strong></span>

              ))}
            </div>
          )}
          {/* Threat changes */}
          {data.weekly_changes.threat_changes && data.weekly_changes.threat_changes.length > 0 && (

                {data.weekly_changes.new_content.map((nc, i) => (
                  <div key={i} className="text-sm text-gray-700 bg-white/60 rounded px-3 py-1.5">
                    <strong className="text-gray-900">{nc.competitor}</strong> ({nc.platform}): <span className="font-semibold text-red-600">{nc.count} bài mới</span> — {nc.description}

          {data.weekly_changes.new_competitors && data.weekly_changes.new_competitors.length > 0 && (

        <div className="p-4 border-b border-gray-100">

            </div>
            <div className="p-3 rounded-lg bg-amber-50 border border-amber-200">
              <div className="font-semibold text-amber-800 text-xs mb-1">⚡ Quyết định hôm nay</div>
              <div className="text-xs text-amber-700">{data.ceo_summary.decision_today}</div>

          </div>
        </div>
      )}

      {/* Top 3 Signals (v5.0) */}
      {data.top_3_signals && data.top_3_signals.length > 0 && (

// =============================================================
// SUB-COMPONENT: Revenue breakdown theo 5 source group
// (DUY · PHƯƠNG NAM · Website · Zalo OA · Hotline)
// =============================================================
function RevenueBySourceBreakdown({ dateRange }) {
  const revenue = (typeof DATA !== "undefined" ? DATA.revenue : null) || {}
  const groupsOrder = revenue.source_groups_order || []
  const groups = revenue.source_groups || {}

  if (!groupsOrder.length || !Object.keys(groups).length) {
    return null
  }

  // Product list (match PRODUCT_LIST trong fetch script)
  const PRODUCTS = ["D1", "DR1", "Noma 911", "Noma 922", "DA8.1", "DA8.1 Pro"]

  // Brand color cho từng group
  const GROUP_COLOR = {
    "DUY":        { bg: "bg-blue-50",   border: "border-blue-300",   text: "text-blue-700",   bar: "bg-blue-500"   },
    "PHUONG_NAM": { bg: "bg-purple-50", border: "border-purple-300", text: "text-purple-700", bar: "bg-purple-500" },
    "WEBSITE":    { bg: "bg-emerald-50",border: "border-emerald-300",text: "text-emerald-700",bar: "bg-emerald-500"},
    "ZALO_OA":    { bg: "bg-amber-50",  border: "border-amber-300",  text: "text-amber-700",  bar: "bg-amber-500"  },
    "HOTLINE":    { bg: "bg-red-50",    border: "border-red-300",    text: "text-red-700",    bar: "bg-red-500"    },
  }

  // Helper: filter by_date theo dateRange
  const isInRange = (ymd) => {
    if (!dateRange?.start || !dateRange?.end) return true
    return ymd >= dateRange.start && ymd <= dateRange.end
  }

  // Tính revenue + orders mỗi group trong range, kèm breakdown theo product
  const rows = groupsOrder.map(key => {
    const g = groups[key]
    if (!g) return null
    const prodTotals = {}
    let totalRev = 0
    let totalOrders = 0

    PRODUCTS.forEach(p => {
      const pData = g.products?.[p] || { by_date: {}, orders: 0 }
      let sum = 0
      Object.entries(pData.by_date || {}).forEach(([d, v]) => {
        if (isInRange(d)) sum += v
      })
      prodTotals[p] = sum
      totalRev += sum
      totalOrders += pData.orders || 0
    })

    return {
      key,
      label: g.label || key,
      totalRev,
      totalOrders: g.total_orders || totalOrders,
      prodTotals,
      color: GROUP_COLOR[key] || GROUP_COLOR["DUY"],
    }
  }).filter(Boolean)

  // Grand total (sum 5 groups) để tính % share
  const grandRev = rows.reduce((s, r) => s + r.totalRev, 0)
  // Product totals (across all groups) for column bar scale
  const productMax = {}
  PRODUCTS.forEach(p => {
    productMax[p] = Math.max(1, ...rows.map(r => r.prodTotals[p] || 0))
  })

  return (
    <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm mb-6">
      <div className="flex items-center justify-between mb-4">
        <div>
          <h2 className="text-lg font-bold text-red-700 tracking-tight">💰 Doanh thu theo nguồn — 5 kênh bán hàng</h2>
          <p className="text-xs text-gray-500 mt-1">Pancake POS · tách theo DUY, PHƯƠNG NAM, Website, Zalo OA, Hotline</p>
        </div>
        <div className="text-right">
          <div className="text-xs text-gray-500">Tổng 5 nguồn</div>
          <div className="text-xl font-extrabold text-gray-900">{fmtVND(grandRev)}₫</div>
        </div>
      </div>

      {/* Card hàng ngang: 1 card / group */}
      <div className="grid grid-cols-1 md:grid-cols-5 gap-3 mb-5">
        {rows.map(r => {
          const pct = grandRev > 0 ? (r.totalRev / grandRev * 100) : 0
          return (
            <div key={r.key} className={`rounded-lg border ${r.color.border} ${r.color.bg} p-3`}>
              <div className={`text-xs font-bold uppercase tracking-wide ${r.color.text} mb-1`}>{r.label}</div>
              <div className="text-xl font-extrabold text-gray-900 leading-tight">{fmtVND(r.totalRev)}₫</div>
              <div className="text-[11px] text-gray-600 mt-1">{r.totalOrders.toLocaleString("vi-VN")} đơn · {pct.toFixed(1)}% tổng</div>
              {/* Share bar */}
              <div className="mt-2 h-1.5 bg-white/60 rounded-full overflow-hidden">
                <div className={`h-full ${r.color.bar}`} style={{ width: pct + "%" }}></div>
              </div>
            </div>
          )
        })}
      </div>

      {/* Bảng chi tiết: row = product, col = group */}
      <div className="overflow-x-auto">
        <table className="w-full text-xs">
          <thead>
            <tr className="bg-gray-50 border-b border-gray-200">
              <th className="py-2 px-3 text-left font-semibold text-gray-700">Sản phẩm</th>
              {rows.map(r => (
                <th key={r.key} className={`py-2 px-3 text-right font-bold ${r.color.text}`}>{r.label}</th>
              ))}
              <th className="py-2 px-3 text-right font-semibold text-gray-900 border-l border-gray-200">Tổng</th>
            </tr>
          </thead>
          <tbody>
            {PRODUCTS.map(p => {
              const rowTotal = rows.reduce((s, r) => s + (r.prodTotals[p] || 0), 0)
              if (rowTotal === 0) return null
              return (
                <tr key={p} className="border-b border-gray-100 hover:bg-gray-50">
                  <td className="py-2 px-3 font-medium text-gray-800">{p}</td>
                  {rows.map(r => {
                    const v = r.prodTotals[p] || 0
                    const pct = productMax[p] > 0 ? (v / productMax[p]) * 100 : 0
                    return (
                      <td key={r.key} className="py-2 px-3 text-right">
                        <div className="flex items-center justify-end gap-2">
                          <div className="text-gray-700">{v > 0 ? fmtVND(v) : "—"}</div>
                          {v > 0 && (
                            <div className="w-12 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                              <div className={`h-full ${r.color.bar}`} style={{ width: pct + "%" }}></div>
                            </div>
                          )}
                        </div>
                      </td>
                    )
                  })}
                  <td className="py-2 px-3 text-right font-bold text-gray-900 border-l border-gray-200">{fmtVND(rowTotal)}</td>
                </tr>
              )
            })}
            {/* Tổng cột cuối */}
            <tr className="bg-gray-50 border-t-2 border-gray-300">
              <td className="py-2 px-3 font-bold text-gray-900">Tổng nguồn</td>
              {rows.map(r => (
                <td key={r.key} className={`py-2 px-3 text-right font-bold ${r.color.text}`}>{fmtVND(r.totalRev)}</td>
              ))}
              <td className="py-2 px-3 text-right font-extrabold text-gray-900 border-l border-gray-200">{fmtVND(grandRev)}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <p className="text-[11px] text-gray-500 mt-3">
        * Doanh thu = tất cả đơn đã tạo trong khoảng thời gian đã chọn (bao gồm mọi trạng thái — giao / đang hoàn / đã hoàn / hủy / xử lý).
      </p>
    </div>
  )
}
