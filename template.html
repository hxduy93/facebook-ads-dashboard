<script>
// ═══ LOADING SCREEN — runs immediately, before React ═══
(function() {
  if (typeof THREE === 'undefined') { document.getElementById('loading-overlay').style.display='none'; return; }

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.z = 4.2;
  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.getElementById('loading-three').appendChild(renderer.domElement);
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Build globe dotted cloud
  const RADIUS=1.3, TOTAL=3500, PHI=(1+Math.sqrt(5))/2;
  function noise(x,y,z){
    let n=0;
    n+=Math.sin(x*2.8+1.3)*Math.cos(y*3.2-0.6);
    n+=Math.sin(y*4.1+2.1)*Math.cos(z*2.9+1.7);
    n+=Math.sin(z*3.5-0.8)*0.85;
    n+=Math.cos(x*5.6)*Math.sin(z*4.2)*0.55;
    n+=Math.sin(x*1.3)*Math.cos(y*1.1)*0.7;
    return n;
  }
  const cloud=[], nodes=[];
  for (let i=0;i<TOTAL;i++){
    const y=1-(i/(TOTAL-1))*2, r=Math.sqrt(1-y*y), t=(2*Math.PI*i)/PHI;
    const x=Math.cos(t)*r, z=Math.sin(t)*r;
    if (noise(x,y,z)>0.1) {
      const px=x*RADIUS, py=y*RADIUS, pz=z*RADIUS;
      cloud.push(px,py,pz);
      if (Math.random()<0.018) nodes.push(px,py,pz);
    }
  }
  const keptDots = cloud.length/3;

  const cloudGeom = new THREE.BufferGeometry();
  cloudGeom.setAttribute('position', new THREE.Float32BufferAttribute(cloud,3));
  const cloudPts = new THREE.Points(cloudGeom, new THREE.PointsMaterial({
    color:0x00a8d8, size:0.017, transparent:true, opacity:0.75, sizeAttenuation:true,
    depthWrite:false, blending:THREE.AdditiveBlending
  }));
  const nodeGeom = new THREE.BufferGeometry();
  nodeGeom.setAttribute('position', new THREE.Float32BufferAttribute(nodes,3));
  const nodePts = new THREE.Points(nodeGeom, new THREE.PointsMaterial({
    color:0x9df9ff, size:0.08, transparent:true, opacity:1.0, sizeAttenuation:true,
    depthWrite:false, blending:THREE.AdditiveBlending
  }));
  const innerSphere = new THREE.Mesh(
    new THREE.SphereGeometry(RADIUS*0.94,32,32),
    new THREE.MeshBasicMaterial({ color:0x001020, transparent:true, opacity:0.6, depthWrite:false })
  );
  const linesGroup = new THREE.Group();
  function rebuildLines(){
    while(linesGroup.children.length) linesGroup.remove(linesGroup.children[0]);
    const nC = nodes.length/3;
    for (let i=0;i<28;i++){
      const a=Math.floor(Math.random()*nC), b=Math.floor(Math.random()*nC);
      if (a===b) continue;
      const pa=new THREE.Vector3(nodes[a*3],nodes[a*3+1],nodes[a*3+2]);
      const pb=new THREE.Vector3(nodes[b*3],nodes[b*3+1],nodes[b*3+2]);
      const d=pa.distanceTo(pb);
      if (d>1.7 || d<0.3) continue;
      linesGroup.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([pa,pb]),
        new THREE.LineBasicMaterial({ color:0x00d4ff, transparent:true, opacity:0.25+Math.random()*0.45 })
      ));
    }
  }
  rebuildLines();
  const linesInt = setInterval(rebuildLines, 900);

  const outer = new THREE.Mesh(
    new THREE.SphereGeometry(RADIUS*1.06,24,16),
    new THREE.MeshBasicMaterial({ color:0x003855, wireframe:true, transparent:true, opacity:0.12 })
  );
  const globe = new THREE.Group();
  globe.add(innerSphere); globe.add(cloudPts); globe.add(nodePts); globe.add(linesGroup); globe.add(outer);
  globe.rotation.x = 0.35;
  scene.add(globe);

  document.getElementById('loading-nodeCount').innerHTML = 'NODES ═ ' + keptDots.toLocaleString() + ' / ' + TOTAL.toLocaleString() + '<div class="dash">NETWORK ACTIVE</div>';
  const clockInt = setInterval(() => {
    document.getElementById('loading-clock').textContent = new Date().toTimeString().slice(0,8);
  }, 500);

  let rafId;
  function animate(){
    rafId = requestAnimationFrame(animate);
    globe.rotation.y += 0.0028;
    renderer.render(scene,camera);
  }
  animate();

  // ── Typing effect ──
  function typeText(el, text, msPerChar, keepCursor, done){
    let i=0;
    el.innerHTML='<span class="type-cursor"></span>';
    const iv=setInterval(()=>{
      i++;
      el.innerHTML=text.substring(0,i)+'<span class="type-cursor"></span>';
      if (i>=text.length){
        clearInterval(iv);
        if (!keepCursor) el.innerHTML=text;
        if (done) done();
      }
    }, msPerChar);
  }

  let dotsInt;
  setTimeout(()=>{
    typeText(document.getElementById('loading-prefix'), '> PROJECT', 50, false, ()=>{
      setTimeout(()=>{
        typeText(document.getElementById('loading-brand'), 'DOSCOM', 90, false, ()=>{
          const t = document.getElementById('loading-trailer');
          let n=0; t.innerHTML='LOADING';
          dotsInt = setInterval(()=>{ n=(n+1)%4; t.textContent='LOADING'+'.'.repeat(n); }, 220);
        });
      }, 120);
    });
  }, 150);

  // ── Progress bar — 3s total ──
  let p=0;
  const fill = document.getElementById('loading-fill');
  const pct  = document.getElementById('loading-pct');
  function tick(){
    p += Math.random()*3 + 2;
    if (p>100) p=100;
    fill.style.width = p + '%';
    pct.textContent = Math.floor(p) + '%';
    if (p<100) setTimeout(tick, 65);
    else setTimeout(fadeOut, 400);
  }
  setTimeout(tick, 200);

  function fadeOut(){
    const ov = document.getElementById('loading-overlay');
    ov.classList.add('hide');
    // Clean up after transition
    setTimeout(()=>{
      clearInterval(linesInt);
      clearInterval(clockInt);
      if (dotsInt) clearInterval(dotsInt);
      cancelAnimationFrame(rafId);
      renderer.dispose();
      if (ov.parentNode) ov.parentNode.removeChild(ov);
    }, 700);
  }
})();
</script>

<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;
const {
  LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid,
  Tooltip, Legend, ResponsiveContainer, ReferenceLine
} = Recharts;

const makeIcon = (emoji) => ({ className = "" } = {}) =>
  React.createElement("span", { className: "inline-flex items-center justify-center " + className, style: { fontSize: "1em", lineHeight: 1 } }, emoji);

const DollarSign        = makeIcon("💰");
const Eye               = makeIcon("👁️");

const TrendingUp        = makeIcon("📈");
const TrendingDown      = makeIcon("📉");

const Calendar          = makeIcon("📅");
const Package           = makeIcon("📦");
const Lightbulb         = makeIcon("💡");
const Award             = makeIcon("🏆");
const AlertTriangle     = makeIcon("⚠️");
const Search            = makeIcon("🔍");
const ExternalLink      = makeIcon("🔗");
const Globe             = makeIcon("🌐");
const Spy               = makeIcon("🕵️");
const Megaphone         = makeIcon("📣");
const Upload            = makeIcon("⬆️");
const Play              = makeIcon("▶️");
const Sparkles          = makeIcon("✨");
const Wand              = makeIcon("🪄");


// =============================================================
// DATA — 4 tài khoản Facebook Ads, daily breakdown đến 08/04/2026
// Conversion = complete_registration (lượt đăng ký hoàn tất)
// =============================================================
/*__DATA_PLACEHOLDER__*/

// =============================================================
// CONSTANTS & HELPERS
// =============================================================
// TODAY is computed at page load in Vietnam timezone (UTC+7). DATA is
// baked into index.html at build time by update_dashboard.py (runs during
// the Cloudflare Pages build), so TODAY must match that cutoff.
const TODAY = (() => {
  const vn = new Date(Date.now() + 7 * 3600 * 1000);
  return vn.toISOString().slice(0, 10);
})()

const ACCOUNT_COLOR = {
  "act_927390616363424": "#3b82f6",   // blue  — Doscom - Công nghệ nâng tầm cuộc sống
  "act_764394829882083": "#ef4444",   // red   — Doscom - Noma.vn - Giải Pháp Chăm Sóc Xe Hơi Toàn Diện
  "act_1655506672244826": "#10b981",  // green — HOLDINGS - Noma Việt Nam
  "act_1449385949897024": "#f59e0b",  // amber — HOLDINGS - Công nghệ nâng tầm cuộc sống
  "act_906015559004892": "#8b5cf6",   // purple — Doscom Mart
  "act_1416634670476226": "#06b6d4"   // cyan  — HOLDINGS - Doscom Mart
}

const PRODUCT_COLOR = {
  "D1": "#3b82f6",
  "Noma911": "#10b981",
  "Noma922": "#14b8a6",
  "DR1": "#f59e0b",
  "DA8.1": "#a855f7",
  "DA8.1 Pro": "#6366f1"
}

const TIME_FILTERS = [
  { key: "today",     label: "Hôm nay",       days: 0 },
  { key: "yesterday", label: "Hôm qua",       days: 1 },
  { key: "7d",        label: "7 ngày",        days: 7 },
  { key: "lastweek",  label: "Tuần trước",    days: 7 },
  { key: "thismonth", label: "Tháng này",     days: 0 },
  { key: "lastmonth", label: "Tháng trước",   days: 0 },
  { key: "30d",       label: "30 ngày",       days: 30 },
  { key: "90d",       label: "90 ngày",       days: 90 }
]

const fmtVND = (n) => {
  if (n == null || isNaN(n)) return "—"
  if (n >= 1e9) return (n / 1e9).toFixed(2) + " tỷ"
  if (n >= 1e6) return (n / 1e6).toFixed(1) + " tr"
  if (n >= 1e3) return (n / 1e3).toFixed(0) + "K"
  return Math.round(n).toString()
}
const fmtNum = (n) => {
  if (n == null) return "—"
  return new Intl.NumberFormat("vi-VN").format(Math.round(n))
}
const fmtDate = (d) => {
  const [y, m, day] = d.split("-")
  return `${day}/${m}`
}

// Get date range based on filter key.
// IMPORTANT: all Date math is done in UTC to avoid the browser-local-timezone
// bug where `new Date("2026-04-09T00:00:00")` in a UTC+7 browser becomes
// 2026-04-08T17:00Z, causing .toISOString() to return the wrong day.
function getDateRange(filterKey) {
  const today = new Date(TODAY + "T00:00:00Z")  // parse as UTC, not local
  if (filterKey === "today") {
    return { start: TODAY, end: TODAY }
  }
  if (filterKey === "yesterday") {
    const y = new Date(today); y.setUTCDate(y.getUTCDate() - 1)
    const ys = y.toISOString().slice(0, 10)
    return { start: ys, end: ys }
  }
  if (filterKey === "lastweek") {
    // Tuần trước: thứ 2 → chủ nhật của tuần liền trước (theo lịch ISO, tính ở UTC)
    const dow = today.getUTCDay() // 0=CN, 1=T2, ..., 6=T7
    const toMon = (dow === 0 ? 6 : dow - 1)
    const monThis = new Date(today); monThis.setUTCDate(monThis.getUTCDate() - toMon)
    const monLast = new Date(monThis); monLast.setUTCDate(monLast.getUTCDate() - 7)
    const sunLast = new Date(monLast); sunLast.setUTCDate(sunLast.getUTCDate() + 6)
    return { start: monLast.toISOString().slice(0, 10), end: sunLast.toISOString().slice(0, 10) }
  }
  if (filterKey === "thismonth") {
    // Ngày 1 của tháng hiện tại → hôm nay
    const y = today.getUTCFullYear(), m = today.getUTCMonth()
    const first = new Date(Date.UTC(y, m, 1))
    return { start: first.toISOString().slice(0, 10), end: TODAY }
  }
  if (filterKey === "lastmonth") {
    // Ngày 1 đến ngày cuối của tháng trước
    const y = today.getUTCFullYear(), m = today.getUTCMonth()
    const first = new Date(Date.UTC(y, m - 1, 1))
    const last  = new Date(Date.UTC(y, m, 0))  // day 0 của tháng này = ngày cuối tháng trước
    return { start: first.toISOString().slice(0, 10), end: last.toISOString().slice(0, 10) }
  }
  const f = TIME_FILTERS.find(f => f.key === filterKey)
  const start = new Date(today); start.setUTCDate(start.getUTCDate() - (f.days - 1))
  return { start: start.toISOString().slice(0, 10), end: TODAY }
}

// Filter daily array by date range
function filterDaily(daily, range) {
  return daily.filter(d => d.date >= range.start && d.date <= range.end)
}

// Sum daily metrics
function sumDaily(daily) {
  return daily.reduce((acc, d) => ({
    spend: acc.spend + (d.spend || 0),
    impressions: acc.impressions + (d.impressions || 0),
    clicks: acc.clicks + (d.clicks || 0),
    reach: acc.reach + (d.reach || 0),
    registrations: acc.registrations + (d.registrations || 0)
  }), { spend: 0, impressions: 0, clicks: 0, reach: 0, registrations: 0 })
}

// =============================================================
// REVENUE HELPERS (Pancake POS — data/product-revenue.json)
// =============================================================
// Ad data dùng tên rút gọn (D1, Noma911, DR1). Pancake dùng tên đầy đủ
// (D1, DR1, Noma 911, Noma 922, DA8.1, DA8.1 Pro). Normalize 2 chiều.
const AD_TO_REV_NAME = {
  "D1": "D1",
  "DR1": "DR1",
  "Noma911": "Noma 911",
  "Noma922": "Noma 922",
  "DA8.1": "DA8.1",
  "DA8.1 Pro": "DA8.1 Pro"
}

// Sum revenue of 1 product trong khoảng date range (inclusive)
function sumRevenueForProduct(adName, range) {
  const rev = (typeof DATA !== "undefined" ? DATA.revenue : null) || {}
  const products = rev.products || {}
  const revName = AD_TO_REV_NAME[adName] || adName
  const p = products[revName]
  if (!p || !p.by_date) return 0
  let total = 0
  for (const [date, amount] of Object.entries(p.by_date)) {
    if (date >= range.start && date <= range.end) total += amount || 0
  }
  return total
}

// Sum revenue cho nhiều products + build daily-by-date dataset
function revenueByDate(adNames, range) {
  const rev = (typeof DATA !== "undefined" ? DATA.revenue : null) || {}
  const products = rev.products || {}
  const map = {}
  adNames.forEach(adName => {
    const revName = AD_TO_REV_NAME[adName] || adName
    const p = products[revName]
    if (!p || !p.by_date) return
    for (const [date, amount] of Object.entries(p.by_date)) {
      if (date < range.start || date > range.end) continue
      map[date] = (map[date] || 0) + (amount || 0)
    }
  })
  return map
}

// =============================================================
// UI COMPONENTS
// =============================================================
function KpiCard({ icon: Icon, label, value, sub, color = "blue" }) {
  const colors = {
    blue: "bg-blue-50 text-blue-600 border-blue-200",
    red: "bg-red-50 text-red-600 border-red-200",
    green: "bg-emerald-50 text-emerald-600 border-emerald-200",
    amber: "bg-amber-50 text-amber-600 border-amber-200",
    purple: "bg-purple-50 text-purple-600 border-purple-200"
  }
  return (
    <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
      <div className="flex items-start justify-between">
        <div className="min-w-0">
          <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">{label}</p>
          <p className="text-2xl font-bold text-gray-900 mt-1 truncate">{value}</p>
          {sub && <p className="text-xs text-gray-500 mt-1 truncate">{sub}</p>}
        </div>
        <div className={`p-2 rounded-lg border ${colors[color]} flex-shrink-0`}>
          <Icon className="w-5 h-5" />
        </div>
      </div>
    </div>
  )
}

function CompareCard({ title, current, previous, isMoneyMetric, inverseGood }) {
  const delta = previous ? ((current - previous) / previous * 100) : (current > 0 ? 100 : 0)
  const good = inverseGood ? delta < 0 : delta > 0
  const fmt = isMoneyMetric ? (v) => fmtVND(v) + "₫" : fmtNum
  return (
    <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
      <p className="text-sm font-medium text-gray-500 mb-3">{title}</p>
      <div className="grid grid-cols-2 gap-4">
        <div>
          <p className="text-xs text-gray-400 uppercase">7 ngày gần nhất</p>
          <p className="text-2xl font-bold text-gray-900 mt-1">{fmt(current)}</p>
        </div>
        <div>
          <p className="text-xs text-gray-400 uppercase">7 ngày trước đó</p>
          <p className="text-2xl font-bold text-gray-500 mt-1">{fmt(previous)}</p>
        </div>
      </div>
      <div className={`mt-3 inline-flex items-center text-sm font-semibold px-3 py-1 rounded-full ${
        good ? "bg-emerald-50 text-emerald-700" : "bg-red-50 text-red-700"
      }`}>
        {delta >= 0 ? <TrendingUp className="w-4 h-4 mr-1" /> : <TrendingDown className="w-4 h-4 mr-1" />}
        {delta >= 0 ? "+" : ""}{delta.toFixed(1)}%
      </div>
    </div>
  )
}

// =============================================================
// MAIN COMPONENT
// =============================================================
function FacebookAdsDashboard() {
  const [currentView, setCurrentView] = useState("main")  // "main" | "competitors" | "ads-creator"
  const [selectedAccount, setSelectedAccount] = useState("all")
  const [timeFilter, setTimeFilter] = useState("30d")

  const dateRange = useMemo(() => getDateRange(timeFilter), [timeFilter])

  // Filter accounts
  const accounts = DATA.accounts
  const filteredAccounts = selectedAccount === "all" ? accounts : accounts.filter(a => a.id === selectedAccount)

  // Aggregate KPIs based on time filter
  const kpis = useMemo(() => {
    let totals = { spend: 0, impressions: 0, clicks: 0, reach: 0, registrations: 0 }
    filteredAccounts.forEach(a => {
      const t = sumDaily(filterDaily(a.daily, dateRange))
      Object.keys(totals).forEach(k => totals[k] += t[k])
    })
    totals.cpl = totals.registrations ? totals.spend / totals.registrations : 0
    totals.ctr = totals.impressions ? (totals.clicks / totals.impressions * 100) : 0
    return totals
  }, [filteredAccounts, dateRange])

  // 7d vs 7d comparison (always last 7 vs prev 7, regardless of filter)
  const weekComp = useMemo(() => {
    const last7Range = getDateRange("7d")
    const today = new Date(TODAY + "T00:00:00Z")  // UTC — tránh shift timezone
    const prevStart = new Date(today); prevStart.setUTCDate(prevStart.getUTCDate() - 13)
    const prevEnd = new Date(today); prevEnd.setUTCDate(prevEnd.getUTCDate() - 7)
    const prevRange = { start: prevStart.toISOString().slice(0,10), end: prevEnd.toISOString().slice(0,10) }
    const sumAcrossAccounts = (range) => {
      let s = { spend: 0, registrations: 0 }
      filteredAccounts.forEach(a => {
        const t = sumDaily(filterDaily(a.daily, range))
        s.spend += t.spend
        s.registrations += t.registrations
      })
      return s
    }
    return { last: sumAcrossAccounts(last7Range), prev: sumAcrossAccounts(prevRange) }
  }, [filteredAccounts])

  // Products data filtered by time + account (account filter doesn't affect products since products span accounts)
  const productsData = useMemo(() => {
    const list = Object.entries(DATA.products).map(([name, daily]) => {
      // If account filter is active, recompute from campaigns
      let dailyFiltered
      if (selectedAccount === "all") {
        dailyFiltered = filterDaily(daily, dateRange)
      } else {
        // Aggregate from campaigns of this product in selected account
        const camps = DATA.campaigns.filter(c => c.product === name && c.account_id === selectedAccount)
        const map = {}
        camps.forEach(c => {
          c.daily.forEach(d => {
            if (!map[d.date]) map[d.date] = { date: d.date, spend: 0, registrations: 0, impressions: 0, clicks: 0 }
            map[d.date].spend += d.spend
            map[d.date].registrations += d.registrations
            map[d.date].impressions += d.impressions
            map[d.date].clicks += d.clicks
          })
        })
        const arr = Object.values(map).sort((a, b) => a.date.localeCompare(b.date))
        dailyFiltered = filterDaily(arr, dateRange)
      }
      const totals = sumDaily(dailyFiltered)
      // Doanh thu Pancake (theo product name đã map) trong cùng date range
      const revenue = sumRevenueForProduct(name, dateRange)
      const revByDate = revenueByDate([name], dateRange)
      const roas = totals.spend > 0 ? revenue / totals.spend : null
      return { name, daily: dailyFiltered, totals, revenue, revByDate, roas }
    }).filter(p => p.totals.spend > 0 || p.revenue > 0)
    return list
  }, [selectedAccount, dateRange])

  // Tổng doanh thu & ROAS toàn bộ (các product đang có spend hoặc revenue)
  const revenueKpis = useMemo(() => {
    const total = productsData.reduce((s, p) => s + (p.revenue || 0), 0)
    const spend = productsData.reduce((s, p) => s + (p.totals.spend || 0), 0)
    return { total, roas: spend > 0 ? total / spend : null }
  }, [productsData])

  // Doanh thu tách theo status (đã giao / đang hoàn / đã hoàn / đã hủy / đang xử lý)
  const revenueByStatus = useMemo(() => {
    const rev = DATA.revenue || {}
    const byStatus = rev.products_by_status || {}
    const statusKeys = ["delivered", "returning", "returned", "canceled", "other"]
    const result = {} // { status: { products: {name: revenue}, total: sum } }
    statusKeys.forEach(sk => {
      const bucket = byStatus[sk] || {}
      const products = {}
      let total = 0
      for (const [revName, p] of Object.entries(bucket)) {
        if (!p || !p.by_date) { products[revName] = 0; continue }
        let sum = 0
        for (const [date, amount] of Object.entries(p.by_date)) {
          if (date >= dateRange.start && date <= dateRange.end) sum += amount || 0
        }
        products[revName] = sum
        total += sum
      }
      result[sk] = { products, total }
    })
    return result
  }, [dateRange])

  // Campaigns filtered by time + account
  const campaignsFiltered = useMemo(() => {
    const list = DATA.campaigns
      .filter(c => selectedAccount === "all" || c.account_id === selectedAccount)
      .map(c => {
        const daily = filterDaily(c.daily, dateRange)
        const t = sumDaily(daily)
        const cpl = t.registrations ? t.spend / t.registrations : null
        return { ...c, _daily: daily, _spend: t.spend, _reg: t.registrations, _clicks: t.clicks, _imp: t.impressions, _cpl: cpl }
      })
      .filter(c => c._spend > 0)
    return list
  }, [selectedAccount, dateRange])

  // Ads filtered
  const adsFiltered = useMemo(() => {
    return DATA.ads
      .filter(a => selectedAccount === "all" || a.account_id === selectedAccount)
      .map(a => {
        const daily = filterDaily(a.daily, dateRange)
        const t = sumDaily(daily)
        const cpl = t.registrations ? t.spend / t.registrations : null
        return { ...a, _spend: t.spend, _reg: t.registrations, _clicks: t.clicks, _imp: t.impressions, _cpl: cpl }
      })
      .filter(a => a._spend > 0)
      .sort((a, b) => b._spend - a._spend)
  }, [selectedAccount, dateRange])

  // Unified per-day dataset for product charts (one row per date, columns per product)
  const productChartData = useMemo(() => {
    const dateSet = new Set()
    productsData.forEach(p => p.daily.forEach(d => dateSet.add(d.date)))
    const dates = Array.from(dateSet).sort()
    return dates.map(date => {
      const row = { date }
      productsData.forEach(p => {
        const d = p.daily.find(x => x.date === date)
        row[p.name + "_reg"] = d ? (d.registrations || 0) : 0
        row[p.name + "_cpl"] = d && d.registrations ? Math.round(d.spend / d.registrations) : null
      })
      return row
    })
  }, [productsData])

  // Top spend / worst CPL campaigns
  const topSpendCamps = [...campaignsFiltered].sort((a, b) => b._spend - a._spend).slice(0, 5)
  const worstCplCamps = [...campaignsFiltered]
    .filter(c => c._reg > 0)
    .sort((a, b) => b._cpl - a._cpl)
    .slice(0, 5)
  const noConvCamps = campaignsFiltered.filter(c => c._reg === 0).sort((a, b) => b._spend - a._spend).slice(0, 5)

  const accountName = (id) => accounts.find(a => a.id === id)?.short || id

  return (
    <div className="min-h-screen bg-gray-50 p-4 md:p-6">
      <div className="max-w-7xl mx-auto">
        {/* HEADER */}
        <div className="mb-4">
          <div className="flex items-center gap-3 mb-2">
            <div className="p-2 bg-blue-600 rounded-lg">
              <BarChart3 className="w-6 h-6 text-white" />
            </div>
            <div>
              <h1 className="text-2xl font-bold text-gray-900">Dashboard Quảng Cáo Facebook</h1>
              <p className="text-sm text-gray-500">
                4 tài khoản · Conversion = lượt đăng ký hoàn tất · Cập nhật {DATA.generated_at}
              </p>
            </div>
          </div>
        </div>

        {/* MAIN TAB NAVIGATION */}
        <div className="mb-6 border-b border-gray-200">
          <nav className="flex gap-1">
            <button
              onClick={() => setCurrentView("main")}
              className={`px-5 py-3 text-sm font-semibold border-b-2 transition flex items-center gap-2 ${
                currentView === "main"
                  ? "border-blue-600 text-blue-600"
                  : "border-transparent text-gray-500 hover:text-gray-800 hover:border-gray-300"
              }`}
            >
              <BarChart3 /> Hiệu suất quảng cáo
            </button>
            <button
              onClick={() => setCurrentView("competitors")}
              className={`px-5 py-3 text-sm font-semibold border-b-2 transition flex items-center gap-2 ${
                currentView === "competitors"
                  ? "border-blue-600 text-blue-600"
                  : "border-transparent text-gray-500 hover:text-gray-800 hover:border-gray-300"
              }`}
            >
              <Spy /> Theo dõi đối thủ
            </button>
            <button
              onClick={() => setCurrentView("ads-creator")}
              className={`px-5 py-3 text-sm font-semibold border-b-2 transition flex items-center gap-2 ${
                currentView === "ads-creator"
                  ? "border-blue-600 text-blue-600"
                  : "border-transparent text-gray-500 hover:text-gray-800 hover:border-gray-300"
              }`}
            >
              <Megaphone /> Tạo quảng cáo
            </button>
          </nav>
        </div>

        {currentView === "competitors" && (
          <CompetitorResearch />
        )}

        {currentView === "ads-creator" && (
          <AdsCreatorPanel />
        )}

        {currentView === "main" && (<>

        {/* ACCOUNT SELECTOR */}
        <div className="mb-3">
          <p className="text-xs font-semibold text-gray-500 uppercase mb-2">Tài khoản</p>
          <div className="flex flex-wrap gap-2">
            <button
              onClick={() => setSelectedAccount("all")}
              className={`px-4 py-2 rounded-lg text-sm font-medium transition ${
                selectedAccount === "all" ? "bg-gray-900 text-white" : "bg-white text-gray-700 border border-gray-200 hover:bg-gray-100"
              }`}
            >
              Tất cả 4 tài khoản
            </button>
            {accounts.map(a => (
              <button
                key={a.id}
                onClick={() => setSelectedAccount(a.id)}
                className={`px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 ${
                  selectedAccount === a.id ? "text-white" : "bg-white text-gray-700 border border-gray-200 hover:bg-gray-100"
                }`}
                style={selectedAccount === a.id ? { backgroundColor: ACCOUNT_COLOR[a.id] } : {}}
              >
                <span className="w-2 h-2 rounded-full" style={{ backgroundColor: ACCOUNT_COLOR[a.id] }} />
                {a.short}
              </button>
            ))}
          </div>
        </div>

        {/* TIME FILTER */}
        <div className="mb-6">
          <p className="text-xs font-semibold text-gray-500 uppercase mb-2 flex items-center gap-1">
            <Calendar className="w-3 h-3" /> Bộ lọc thời gian
          </p>
          <div className="flex flex-wrap gap-2">
            {TIME_FILTERS.map(f => (
              <button
                key={f.key}
                onClick={() => setTimeFilter(f.key)}
                className={`px-4 py-2 rounded-lg text-sm font-medium transition ${
                  timeFilter === f.key
                    ? "bg-blue-600 text-white shadow-md"
                    : "bg-white text-gray-700 border border-gray-200 hover:bg-blue-50"
                }`}
              >
                {f.label}
              </button>
            ))}
            <div className="px-3 py-2 text-xs text-gray-500 italic">
              ({dateRange.start === dateRange.end ? fmtDate(dateRange.start) : `${fmtDate(dateRange.start)} → ${fmtDate(dateRange.end)}`})
            </div>
          </div>
        </div>

        {/* KPI SCORECARDS */}
        <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
          <KpiCard
            icon={DollarSign}
            label="Tổng chi tiêu"
            value={fmtVND(kpis.spend) + "₫"}
            sub={fmtNum(kpis.spend) + " VND"}
            color="blue"
          />
          <KpiCard
            icon={Eye}
            label="Impressions"
            value={fmtNum(kpis.impressions)}
            sub={`Reach: ${fmtNum(kpis.reach)}`}
            color="purple"
          />
          <KpiCard
            icon={MousePointerClick}
            label="Clicks / CTR"
            value={fmtNum(kpis.clicks)}
            sub={`CTR ${kpis.ctr.toFixed(2)}%`}
            color="green"
          />
          <KpiCard
            icon={Target}
            label="Đăng ký hoàn tất"
            value={fmtNum(kpis.registrations)}
            sub={kpis.registrations ? `CPL ${fmtVND(kpis.cpl)}₫` : "Chưa có đăng ký"}
            color="amber"
          />
          <KpiCard
            icon={Package}
            label="Doanh thu (Pancake)"
            value={fmtVND(revenueKpis.total) + "₫"}
            sub={revenueKpis.roas != null ? `ROAS ${revenueKpis.roas.toFixed(2)}x` : "—"}
            color="red"
          />
        </div>

        {/* COMPARISON 7d vs 7d */}
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
          <CompareCard
            title="So sánh chi tiêu — 7 ngày gần nhất vs 7 ngày trước đó"
            current={weekComp.last.spend}
            previous={weekComp.prev.spend}
            isMoneyMetric={true}
            inverseGood={false}
          />
          <CompareCard
            title="So sánh đăng ký hoàn tất — 7 ngày gần nhất vs 7 ngày trước đó"
            current={weekComp.last.registrations}
            previous={weekComp.prev.registrations}
            isMoneyMetric={false}
            inverseGood={false}
          />
        </div>

        {/* PER-PRODUCT DAILY TABLES */}
        <div className="mb-6">
          <h2 className="text-lg font-semibold text-gray-900 mb-3 flex items-center gap-2">
            <Package className="w-5 h-5 text-blue-600" />
            Chi tiêu & đăng ký theo ngày — từng sản phẩm
          </h2>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {productsData.map(p => (
              <ProductDailyTable key={p.name} product={p} />
            ))}
          </div>
        </div>

        {/* REVENUE BREAKDOWN BY STATUS */}
        <RevenueStatusBreakdown revenueByStatus={revenueByStatus} dateRange={dateRange} />

        {/* REVENUE BREAKDOWN BY SOURCE GROUP (5 nguồn: DUY / PHƯƠNG NAM / Website / Zalo OA / Hotline) */}
        <RevenueBySourceBreakdown dateRange={dateRange} />

        {/* CONVERSION PROGRESS + CPL CHART PER PRODUCT */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
          <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
            <h2 className="text-lg font-semibold text-gray-900 mb-1">Tiến độ đăng ký theo ngày — từng sản phẩm</h2>
            <p className="text-xs text-gray-500 mb-3">Tổng số đăng ký mỗi ngày, gộp tất cả campaign theo từng sản phẩm</p>
            <ResponsiveContainer width="100%" height={280}>
              <LineChart data={productChartData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6" />
                <XAxis dataKey="date" tick={{ fontSize: 11 }} tickFormatter={fmtDate} />
                <YAxis tick={{ fontSize: 11 }} allowDecimals={false} />
                <Tooltip labelFormatter={fmtDate} contentStyle={{ fontSize: 12, borderRadius: 8 }} />
                <Legend wrapperStyle={{ fontSize: 11 }} />
                {productsData.map(p => (
                  <Line
                    key={p.name}
                    type="monotone"
                    dataKey={p.name + "_reg"}
                    name={p.name}
                    stroke={PRODUCT_COLOR[p.name]}
                    strokeWidth={2.5}
                    dot={{ r: 3 }}
                  />
                ))}
              </LineChart>
            </ResponsiveContainer>
          </div>

          <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
            <h2 className="text-lg font-semibold text-gray-900 mb-1">Chi phí / mỗi đăng ký (CPL) theo ngày — từng sản phẩm</h2>
            <p className="text-xs text-gray-500 mb-3">CPL trung bình mỗi ngày, gộp tất cả campaign theo từng sản phẩm</p>
            <ResponsiveContainer width="100%" height={280}>
              <LineChart data={productChartData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6" />
                <XAxis dataKey="date" tick={{ fontSize: 11 }} tickFormatter={fmtDate} />
                <YAxis tick={{ fontSize: 11 }} tickFormatter={fmtVND} />
                <Tooltip
                  labelFormatter={fmtDate}
                  formatter={(v) => v != null ? fmtVND(v) + "₫" : "—"}
                  contentStyle={{ fontSize: 12, borderRadius: 8 }}
                />
                <Legend wrapperStyle={{ fontSize: 11 }} />
                {productsData.map(p => (
                  <Line
                    key={p.name}
                    type="monotone"
                    dataKey={p.name + "_cpl"}
                    name={p.name}
                    stroke={PRODUCT_COLOR[p.name]}
                    strokeWidth={2.5}
                    dot={{ r: 3 }}
                    connectNulls
                  />
                ))}
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* TOP CAMPAIGNS */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
          <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
            <h2 className="text-base font-semibold text-gray-900 mb-3 flex items-center gap-2">
              <Award className="w-5 h-5 text-emerald-600" />
              Top 5 campaign chi tiêu nhiều nhất
            </h2>
            <table className="w-full text-xs">
              <thead>
                <tr className="border-b border-gray-200 text-left text-gray-500">
                  <th className="py-2 px-1 font-medium">#</th>
                  <th className="py-2 px-1 font-medium">Campaign</th>
                  <th className="py-2 px-1 font-medium text-right">Spend</th>
                  <th className="py-2 px-1 font-medium text-right">Đăng ký</th>
                  <th className="py-2 px-1 font-medium text-right">CPL</th>
                </tr>
              </thead>
              <tbody>
                {topSpendCamps.map((c, i) => (
                  <tr key={c.id} className="border-b border-gray-100 hover:bg-gray-50">
                    <td className="py-2 px-1 text-emerald-700 font-bold">{i + 1}</td>
                    <td className="py-2 px-1">
                      <p className="font-medium text-gray-900 truncate max-w-[200px]" title={c.name}>{c.name}</p>
                      <p className="text-[10px] text-gray-400">{accountName(c.account_id)} · {c.product}</p>
                    </td>
                    <td className="py-2 px-1 text-right font-semibold">{fmtVND(c._spend)}₫</td>
                    <td className="py-2 px-1 text-right font-medium text-emerald-600">{c._reg}</td>
                    <td className="py-2 px-1 text-right text-gray-600">{c._cpl ? fmtVND(c._cpl) + "₫" : "—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
            <h2 className="text-base font-semibold text-gray-900 mb-3 flex items-center gap-2">
              <AlertTriangle className="w-5 h-5 text-red-600" />
              Top 5 campaign kém hiệu quả nhất (CPL cao nhất)
            </h2>
            <table className="w-full text-xs">
              <thead>
                <tr className="border-b border-gray-200 text-left text-gray-500">
                  <th className="py-2 px-1 font-medium">#</th>
                  <th className="py-2 px-1 font-medium">Campaign</th>
                  <th className="py-2 px-1 font-medium text-right">Spend</th>
                  <th className="py-2 px-1 font-medium text-right">Đăng ký</th>
                  <th className="py-2 px-1 font-medium text-right">CPL</th>
                </tr>
              </thead>
              <tbody>
                {worstCplCamps.length === 0 ? (
                  <tr><td colSpan={5} className="py-4 text-center text-gray-400">Chưa có campaign nào có đăng ký trong khoảng thời gian này</td></tr>
                ) : worstCplCamps.map((c, i) => (
                  <tr key={c.id} className="border-b border-gray-100 hover:bg-gray-50">
                    <td className="py-2 px-1 text-red-700 font-bold">{i + 1}</td>
                    <td className="py-2 px-1">
                      <p className="font-medium text-gray-900 truncate max-w-[200px]" title={c.name}>{c.name}</p>
                      <p className="text-[10px] text-gray-400">{accountName(c.account_id)} · {c.product}</p>
                    </td>
                    <td className="py-2 px-1 text-right">{fmtVND(c._spend)}₫</td>
                    <td className="py-2 px-1 text-right text-emerald-600">{c._reg}</td>
                    <td className="py-2 px-1 text-right font-bold text-red-600">{fmtVND(c._cpl)}₫</td>
                  </tr>
                ))}

// Current time in Vietnam timezone (+07:00) formatted as "YYYY-MM-DDTHH:MM"
// for <input type="datetime-local"> default value.
function nowVnDatetime() {
  const now = new Date()
  const vn = new Date(now.getTime() + (now.getTimezoneOffset() + 7 * 60) * 60000)
  const y = vn.getFullYear()
  const m = String(vn.getMonth() + 1).padStart(2, "0")
  const d = String(vn.getDate()).padStart(2, "0")
  const hh = String(vn.getHours()).padStart(2, "0")
  const mm = String(vn.getMinutes()).padStart(2, "0")
  return `${y}-${m}-${d}T${hh}:${mm}`
}
